<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seznam Spisů</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: bween;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        tr:hover {
            background-color: #f1f7fd;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-otevren { background: #e3f2fd; color: #1976d2; }
        .status-uzavren { background: #ffebee; color: #c62828; }
        .status-v-reseni { background: #fff3e0; color: #ef6c00; }

        .btn-detail {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        .btn-detail:hover {
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Seznam Spisů</h1>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Vyhledat podle čísla nebo názvu..." onkeyup="filterTable()">
    </div>

    <table id="spisyTable">
        <thead>
            <tr>
                <th>Číslo spisu</th>
                <th>Název / Předmět</th>
                <th>Datum vytvoření</th>
                <th>Status</th>
                <th>Akce</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2024/001</td>
                <td>Nájemní smlouva - Novák</td>
                <td>01.03.2024</td>
                <td><span class="status status-otevren">Otevřen</span></td>
                <td><a href="#" class="btn-detail">Otevřít</a></td>
            </tr>
            <tr>
                <td>2024/002</td>
                <td>Reklamace zboží - TechCorp</td>
                <td>15.03.2024</td>
                <td><span class="status status-v-reseni">V řešení</span></td>
                <td><a href="#" class="btn-detail">Otevřít</a></td>
            </tr>
            <tr>
                <td>2023/154</td>
                <td>Pracovní smlouva - vzor</td>
                <td>10.12.2023</td>
                <td><span class="status status-uzavren">Uzavřen</span></td>
                <td><a href="#" class="btn-detail">Otevřít</a></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = input.value.toUpperCase();
        const table = document.getElementById("spisyTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let visible = false;
            const tds = tr[i].getElementsByTagName("td");
            for (let j = 0; j < tds.length - 1; j++) {
                if (tds[j] && tds[j].innerText.toUpperCase().indexOf(filter) > -1) {
                    visible = true;
                    break;
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    }
</script>

</body>
</html>
