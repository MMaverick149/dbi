<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Katalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #1c212b; --gold: #ffcc00; --blue: #4a9eff; --border: #2d333b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .crime-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 6px; cursor: pointer; border-left: 4px solid var(--blue); }
        .crime-card.selected { border-color: var(--gold); background: rgba(255,204,0,0.1); }
        .code { color: var(--blue); font-weight: bold; font-size: 13px; }
        .name { font-weight: bold; margin: 5px 0; }
        .penalty { font-size: 11px; color: #888; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: #151921; display: flex; justify-content: center; gap: 20px; border-top: 1px solid var(--border); }
        .btn { padding: 12px 30px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-ok { background: var(--gold); color: black; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="color:var(--gold); margin:0;">PENAL CODE</h2>
        <div id="count">VYBRÁNO: 0</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="footer">
        <button class="btn btn-ok" onclick="finish()">POTVRDIT VÝBĚR</button>
    </div>
    <script>
        const crimes = [
            { id: "§7 a)", n: "Ublížení na zdraví (neúmyslně)", p: "1-5 let" },
            { id: "§7 c)", n: "Ublížení na zdraví (střelná zbraň)", p: "3-10 let" },
            { id: "§9", n: "Mučení a nelidské zacházení", p: "1-15 let" },
            { id: "§11", n: "Pokus o vraždu", p: "25 let - doživotí" },
            { id: "§12 b)", n: "Vražda (plánovaná)", p: "Doživotí" },
            { id: "§26 d)", n: "Loupež (centrální banka)", p: "15-30 let" },
            { id: "§48 c)", n: "Výroba drog (nad 1kg)", p: "10 let - doživotí" },
            { id: "§102", n: "Terorismus", p: "20 let - doživotí" }
        ];
        let sel = [];
        const g = document.getElementById('grid');
        crimes.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'crime-card';
            d.onclick = () => {
                d.classList.toggle('selected');
                const txt = `${c.id} ${c.n}`;
                if(sel.includes(txt)) sel = sel.filter(x => x !== txt); else sel.push(txt);
                document.getElementById('count').innerText = "VYBRÁNO: " + sel.length;
            };
            d.innerHTML = `<div class="code">${c.id}</div><div class="name">${c.n}</div><div class="penalty">${c.p}</div>`;
            g.appendChild(d);
        });
        function finish() { localStorage.setItem('temp_crimes', sel.join(', ')); window.close(); }
    </script>
</body>
</html>
