<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Katalog trestů</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #1c212b; --gold: #ffcc00; --blue: #4a9eff; --border: #2d333b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .crime-card { 
            background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 6px; 
            cursor: pointer; position: relative; transition: 0.2s; border-left: 4px solid var(--blue);
        }
        .crime-card:hover { border-color: var(--blue); transform: scale(1.02); }
        .crime-card.selected { border-color: var(--gold); background: rgba(255,204,0,0.05); }
        .code { color: var(--gold); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .name { font-weight: bold; font-size: 15px; line-height: 1.2; }
        .penalty { font-size: 11px; color: #888; margin-top: 10px; font-style: italic; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: #151921; display: flex; justify-content: center; border-top: 1px solid var(--border); }
        .btn-ok { background: var(--gold); color: black; border: none; padding: 12px 40px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h2 style="color:var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 15px;">Trestní zákoník</h2>
    <div class="grid" id="crime-grid"></div>
    <div style="height: 100px;"></div>
    <div class="footer"><button class="btn-ok" onclick="finish()">Uložit výběr do spisu</button></div>

    <script>
        // Data čerpám z tvého souboru tresty.html
        const crimes = [
            { id: "§7 a)", n: "Ublížení na zdraví (neúmyslně)", p: "1-5 let" },
            { id: "§7 c)", n: "Ublížení na zdraví (střelná zbraň)", p: "3-10 let" },
            { id: "§11", n: "Pokus o vraždu", p: "25 let - doživotí" },
            { id: "§12 b)", n: "Vražda (plánovaná)", p: "Doživotí" },
            { id: "§14 b)", n: "Únos osoby / Zbavení svobody", p: "1-10 let" },
            { id: "§18 a)", n: "Zneužití pravomoci úřední osoby", p: "5-20 let" },
            { id: "§26 d)", n: "Loupež (centrální banka)", p: "15-30 let" },
            { id: "§48 c)", n: "Výroba drog (nad 1kg)", p: "10 let - doživotí" },
            { id: "§52 c)", n: "Dealing a prodej (nad 1kg)", p: "20 let - doživotí" }
        ];

        let selected = [];
        const grid = document.getElementById('crime-grid');
        crimes.forEach(c => {
            const div = document.createElement('div');
            div.className = 'crime-card';
            div.onclick = () => {
                div.classList.toggle('selected');
                const val = `${c.id} ${c.n}`;
                if(selected.includes(val)) selected = selected.filter(x => x !== val); else selected.push(val);
            };
            div.innerHTML = `<div class="code">${c.id}</div><div class="name">${c.n}</div><div class="penalty">Trestní sazba: ${c.p}</div>`;
            grid.appendChild(div);
        });

        function finish() { localStorage.setItem('temp_crimes', selected.join(', ')); window.close(); }
    </script>
</body>
</html>
