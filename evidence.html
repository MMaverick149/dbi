<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }

        /* TAGY */
        .tags-container { border: 1px solid var(--border); background: #010409; padding: 10px; border-radius: 4px; min-height: 45px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: #238636; color: white; padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; }
        .tag span { cursor: pointer; opacity: 0.7; }

        /* KATALOG */
        .inline-catalog { border: 1px solid var(--border); background: #161b22; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-bottom: 20px; }
        .law-item { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .law-item:hover { background: #21262d; }
        .law-item small { display: block; color: #8b949e; font-size: 10px; }
        .law-category { color: #ffa657; font-weight: bold; padding: 5px 10px; background: #0d1117; position: sticky; top: 0; font-size: 10px; }

        /* DYNAMICKÉ OPP SEKCE */
        .opp-extra { background: #161b22; border: 1px dashed var(--accent); padding: 15px; border-radius: 4px; margin-top: 10px; display: none; }
        .section-title { border-left: 3px solid #ffa657; padding-left: 10px; margin: 20px 0 10px 0; font-weight: bold; }
        
        .btn-submit { background: #1f6feb; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

<div style="color: var(--accent); font-size: 18px; margin-bottom: 20px; font-weight: bold;">NOVÝ SPIS / ŽÁDOST O OPP</div>

<div class="grid">
    <div class="field"><label>👮 Vyžadující příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
    <div class="field"><label>🎖️ Hodnost</label><select id="hodnost"><option>Detective I</option><option>Detective II</option><option>Detective III</option><option>Sergeant</option><option>Lieutenant</option></select></div>
    <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
    <div class="field"><label>👤 Subjekt</label><input type="text" id="subjekt"></div>
    <div class="field"><label>📅 Narození</label><input type="text" id="narozeni"></div>
    <div class="field"><label>🆔 MDT ID</label><input type="text" id="mdtid"></div>
</div>

<div class="section-title">⚖️ PRÁVNÍ KVALIFIKACE</div>
<div class="tags-container" id="kvalifikace-list"></div>
<input type="text" id="lawSearch" placeholder="Hledat v zákoníku..." onkeyup="filterLaws()">
<div class="inline-catalog" id="laws-list"></div>

<div class="section-title">🛠️ VÝBĚR PROSTŘEDKU (OPP)</div>
<select id="typopp" onchange="updateOppFields()">
    <option value="">-- Vyberte typ OPP --</option>
    <option value="banka">Výpis z bankovního účtu / majetek</option>
    <option value="telefon">Odposlech / Výpis telekomunikačního provozu</option>
    <option value="sledovani">Sledování osob a věcí (GPS/Fyzické)</option>
</select>

<div id="opp-banka" class="opp-extra">
    <div class="field"><label>🏦 Číslo účtu (pokud je známo)</label><input type="text" id="b-ucet" placeholder="Např. 123456/0100"></div>
    <div class="field"><label>💰 Časové období výpisu</label><input type="text" id="b-obdobi" placeholder="Od - Do"></div>
</div>

<div id="opp-telefon" class="opp-extra">
    <div class="field"><label>📱 Telefonní číslo</label><input type="text" id="t-cislo" placeholder="Např. 555-0123"></div>
    <div class="field"><label>📡 Rozsah sledování</label><input type="text" id="t-rozsah" placeholder="Lokalizace, SMS, hovory..."></div>
</div>

<div id="opp-sledovani" class="opp-extra">
    <div class="field"><label>🚗 Registrační značka vozidla</label><input type="text" id="s-spz" placeholder="Např. 4A2 1234"></div>
    <div class="field"><label>📍 Typ sledování</label><input type="text" id="s-typ" placeholder="GPS tracker / skryté sledování příslušníky"></div>
</div>

<div class="section-title">📝 ZJIŠTĚNÉ SKUTEČNOSTI</div>
<textarea id="skutecnosti" placeholder="Podrobné odůvodnění..."></textarea>

<button class="btn-submit" onclick="vytvorZadost()">📥 GENEROVAT PRO DISCORD</button>

<script>
    let selectedLaws = [];

    // Přepínání políček podle typu OPP
    function updateOppFields() {
        document.querySelectorAll('.opp-extra').forEach(el => el.style.display = 'none');
        const val = document.getElementById('typopp').value;
        if (val) document.getElementById('opp-' + val).style.display = 'block';
    }

    // Katalog zákonů
    async function loadLaws() {
        const list = document.getElementById('laws-list');
        try {
            const res = await fetch('laws.json?v=' + Date.now());
            const data = await res.json();
            list.innerHTML = '';
            data.categories.forEach(cat => {
                const head = document.createElement('div'); head.className = 'law-category'; head.innerText = cat.name;
                list.appendChild(head);
                cat.laws.forEach(law => {
                    const subs = law.subs || [{label: '', text: law.description}];
                    subs.forEach(s => {
                        const div = document.createElement('div'); div.className = 'law-item';
                        const t = `${law.title} ${s.label}`.trim();
                        div.innerHTML = `<strong>${t}</strong><small>${s.text}</small>`;
                        div.onclick = () => { if(!selectedLaws.includes(t)) { selectedLaws.push(t); renderTags(); } };
                        list.appendChild(div);
                    });
                });
            });
        } catch(e) { list.innerHTML = "Chyba načítání."; }
    }

    function renderTags() {
        const c = document.getElementById('kvalifikace-list'); c.innerHTML = '';
        selectedLaws.forEach(l => {
            const s = document.createElement('div'); s.className = 'tag';
            s.innerHTML = `${l} <span onclick="selectedLaws=selectedLaws.filter(x=>x!=='${l}');renderTags()">✖</span>`;
            c.appendChild(s);
        });
    }

    function filterLaws() {
        let val = document.getElementById('lawSearch').value.toLowerCase();
        document.querySelectorAll('.law-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(val) ? '' : 'none');
    }

    function vytvorZadost() {
        const d = (id) => document.getElementById(id).value;
        const oppType = document.getElementById('typopp').options[document.getElementById('typopp').selectedIndex].text;
        
        // Sestavení extra informací podle OPP
        let extra = "";
        const val = d('typopp');
        if(val === 'banka') extra = `• 🏦 **Číslo účtu:** ${d('b-ucet')}\n• 📅 **Období:** ${d('b-obdobi')}`;
        if(val === 'telefon') extra = `• 📱 **Číslo:** ${d('t-cislo')}\n• 📡 **Rozsah:** ${d('t-rozsah')}`;
        if(val === 'sledovani') extra = `• 🚗 **SPZ:** ${d('s-spz')}\n• 📍 **Způsob:** ${d('s-typ')}`;

        const discordText = `**ŽÁDOST O UŽITÍ OPP** ⚖️\n\n` +
            `**Příslušník:** ${d('detektiv')} (${d('hodnost')})\n` +
            `**Case:** ${d('caseid')}\n` +
            `**Subjekt:** ${d('subjekt')} (${d('narozeni')}, ${d('mdtid')})\n\n` +
            `**Kvalifikace:** ${selectedLaws.join(', ')}\n` +
            `**Prostředek:** ${oppType}\n${extra}\n\n` +
            `**Skutečnosti:**\n${d('skutecnosti')}\n\n` +
            `**Přílohy:** 📁`;

        window.parent.postMessage(discordText, '*');
    }

    loadLaws();
</script>
</body>
</html>
