<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 100px; font-family: inherit; }

        /* TAGY */
        .tags-container { border: 1px solid var(--border); background: #010409; padding: 10px; border-radius: 4px; min-height: 45px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { background: #238636; color: white; padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; }
        .tag span { cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }

        /* INTEGROVANÝ KATALOG */
        .inline-catalog { border: 1px solid var(--border); background: #161b22; border-radius: 4px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; }
        .law-item { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .law-item:hover { background: #21262d; border-left: 3px solid var(--accent); }
        .law-item small { display: block; color: #8b949e; font-size: 10px; }
        .law-category { color: #ffa657; font-weight: bold; margin: 10px 0 5px 0; border-bottom: 1px solid #30363d; font-size: 11px; text-transform: uppercase; }
        #lawSearch { margin-bottom: 10px; border-color: var(--accent); }

        .btn-submit { background: #1f6feb; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; text-transform: uppercase; font-size: 14px; }
        .btn-submit:hover { background: #388bfd; }
    </style>
</head>
<body>

<div style="color: var(--accent); font-size: 18px; margin-bottom: 20px; font-weight: bold;">DETAIL SPISU</div>

<div class="grid">
    <div class="field"><label>👮 Vyžadující příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
    <div class="field"><label>🎖️ Hodnost</label>
        <select id="hodnost">
            <option>Detective I</option><option>Detective II</option><option>Detective III</option>
            <option>Sergeant</option><option>Lieutenant</option><option>DBI Trainee</option>
        </select>
    </div>
    <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
    <div class="field"><label>👤 Subjekt</label><input type="text" id="subjekt" placeholder="Jméno osoby"></div>
    <div class="field"><label>📅 Datum narození</label><input type="text" id="narozeni" placeholder="13.03.1993"></div>
    <div class="field"><label>🆔 Státní Indifikátor</label><input type="text" id="mdtid" placeholder="#YR4545"></div>
</div>

<label>⚖️ Vybrané trestné činy (kliknutím na X smažete)</label>
<div class="tags-container" id="kvalifikace-list">
    <span style="color: #484f58; font-style: italic; font-size: 11px;">Vyberte tresty z katalogu níže...</span>
</div>

<input type="text" id="lawSearch" placeholder="🔍 Rychlé hledání v katalogu..." onkeyup="filterLaws()">
<div class="inline-catalog" id="laws-list">Načítám laws.json...</div>

<label>🛠️ Prostředek (OPP)</label>
<select id="typopp" style="margin-bottom: 15px;">
    <option>Výpis a prověrka majetku a finančních prostředků</option>
    <option>Odposlech a záznam telekomunikačního provozu</option>
    <option>Sledování osob a věcí</option>
</select>

<label>📝 Zjištěné skutečnosti</label>
<textarea id="skutecnosti" placeholder="Zde popište důvody žádosti a zjištěné stopy..."></textarea>

<button class="btn-submit" onclick="vytvorZadost()">📥 GENEROVAT ŽÁDOST PRO DISCORD</button>

<script>
    let selectedLaws = [];

    async function loadLaws() {
        const list = document.getElementById('laws-list');
        try {
            // Použití relativní cesty, aby to fungovalo na mmaverick149.github.io/dbi/
            const response = await fetch('laws.json?v=' + Date.now());
            if (!response.ok) throw new Error('laws.json nenalezen');
            const data = await response.json();
            list.innerHTML = '';

            data.categories.forEach(cat => {
                const catTitle = document.createElement('div');
                catTitle.className = 'law-category';
                catTitle.innerText = cat.name;
                list.appendChild(catTitle);

                cat.laws.forEach(law => {
                    if (law.subs && law.subs.length > 0) {
                        law.subs.forEach(sub => {
                            const div = document.createElement('div');
                            div.className = 'law-item';
                            const title = `${law.title} ${sub.label}`;
                            div.innerHTML = `<strong>${title}</strong><small>${sub.text}</small>`;
                            div.onclick = () => addLaw(title);
                            list.appendChild(div);
                        });
                    } else {
                        const div = document.createElement('div');
                        div.className = 'law-item';
                        div.innerHTML = `<strong>${law.title}</strong><small>${law.description || ''}</small>`;
                        div.onclick = () => addLaw(law.title);
                        list.appendChild(div);
                    }
                });
            });
        } catch (e) {
            list.innerHTML = `<span style="color:#f85149">Chyba: ${e.message}. Ujistěte se, že soubor laws.json je ve stejné složce jako evidence.html.</span>`;
        }
    }

    function addLaw(title) {
        if (!selectedLaws.includes(title)) {
            selectedLaws.push(title);
            renderTags();
        }
    }

    function removeLaw(title) {
        selectedLaws = selectedLaws.filter(item => item !== title);
        renderTags();
    }

    function renderTags() {
        const container = document.getElementById('kvalifikace-list');
        if (selectedLaws.length === 0) {
            container.innerHTML = '<span style="color: #484f58; font-style: italic; font-size: 11px;">Vyberte tresty z katalogu níže...</span>';
            return;
        }
        container.innerHTML = '';
        selectedLaws.forEach(law => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${law} <span onclick="removeLaw('${law.replace(/'/g, "\\'")}')">✖</span>`;
            container.appendChild(tag);
        });
    }

    function filterLaws() {
        let input = document.getElementById('lawSearch').value.toLowerCase();
        let items = document.getElementsByClassName('law-item');
        for (let i = 0; i < items.length; i++) {
            items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function vytvorZadost() {
        const d = (id) => document.getElementById(id).value;
        const kvalifikaceFinal = selectedLaws.join(', ');

        const discordText = `**ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19** ⚖️\n\n` +
        `**Vyžadující příslušník:**\n• 👮 ${d('detektiv')}\n\n` +
        `**Prostředek:**\n• 🛠️ ${d('typopp')}\n\n` +
        `**Podezřelá osoba/Prověřovaná osoba (Oběť):**\n• 👤 ${d('subjekt')} (${d('narozeni')}, ${d('mdtid')})\n\n` +
        `**Trestné činy:**\n• ⚖️ ${kvalifikaceFinal || 'NEPROVĚŘENO'}\n\n` +
        `**Předmět vydání:**\n• 📑 Informace o veškerém majetku...\n\n` +
        `**Zjištěné skutečnosti:**\n${d('skutecnosti') || 'Nebyly doplněny.'}\n\n` +
        `**S pozdravem,**\n🏙️ San Andreas State Police\n🎖️ ${d('hodnost')} ${d('detektiv')}\n\n` +
        `**PŘÍLOHY:** 📁`;

        window.parent.postMessage(discordText, '*');
    }

    loadLaws();
</script>
</body>
</html>
