<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; --panel: #161b22; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        
        /* MENU DLAŽDICE */
        .opp-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .opp-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .opp-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #21262d; }
        .opp-card i { font-size: 24px; display: block; margin-bottom: 10px; }
        .opp-card span { font-weight: bold; color: var(--accent); text-transform: uppercase; font-size: 11px; }

        /* FORMULÁŘE */
        .form-section { display: none; background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select, textarea { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 100px; }

        .btn-back { background: transparent; color: #8b949e; border: 1px solid #8b949e; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .btn-back:hover { color: white; border-color: white; }
        
        .btn-submit { background: #238636; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; text-transform: uppercase; }

        /* KATALOG V SEKCI */
        .tags-container { border: 1px solid var(--border); background: #010409; padding: 10px; border-radius: 4px; min-height: 40px; display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .tag { background: #238636; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 5px; }
        .inline-catalog { border: 1px solid var(--border); background: #0d1117; max-height: 150px; overflow-y: auto; margin-top: 5px; }
        .law-item { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 11px; }
        .law-item:hover { background: #21262d; }
    </style>
</head>
<body>

<div id="main-menu">
    <h2 style="color: var(--accent); margin-bottom: 25px;">Vyberte typ žádosti / OPP</h2>
    <div class="opp-menu">
        <div class="opp-card" onclick="openForm('majetek')"><i>💰</i><span>Prověrka majetku</span></div>
        <div class="opp-card" onclick="openForm('agent')"><i>🕵️</i><span>Zastírající agent</span></div>
        <div class="opp-card" onclick="openForm('nemovitost')"><i>🏠</i><span>Výpis nemovitosti (SEC)</span></div>
        <div class="opp-card" onclick="openForm('prohlidka')"><i>🏚️</i><span>Domovní prohlídka</span></div>
    </div>
</div>

<div id="form-container" style="display: none;">
    <button class="btn-back" onclick="goBack()">← ZPĚT DO MENU</button>
    
    <div class="form-section" id="section-content">
        <h3 id="form-title" style="margin-top: 0; color: white;"></h3>
        
        <div class="grid">
            <div class="field"><label>👮 Vyžadující příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
            <div class="field"><label>🎖️ Hodnost</label>
                <select id="hodnost">
                    <option>Detective I</option><option>Detective II</option><option>Detective III</option>
                    <option>Sergeant</option><option>Lieutenant</option>
                </select>
            </div>
            <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
        </div>

        <div class="grid">
            <div class="field"><label>👤 Subjekt</label><input type="text" id="subjekt"></div>
            <div class="field"><label>📅 Datum narození</label><input type="text" id="narozeni"></div>
            <div class="field"><label>🆔 MDT ID</label><input type="text" id="mdtid"></div>
        </div>

        <div id="extra-fields"></div>

        <div id="law-section">
            <label>⚖️ Právní kvalifikace</label>
            <div class="tags-container" id="tags"></div>
            <input type="text" id="search" placeholder="Hledat trest..." onkeyup="filterLaws()">
            <div class="inline-catalog" id="laws-list"></div>
        </div>

        <label style="margin-top: 20px; display: block;">📝 Zjištěné skutečnosti</label>
        <textarea id="skutecnosti" placeholder="Popište důvody žádosti..."></textarea>

        <button class="btn-submit" onclick="generate()">📥 GENEROVAT PRO DISCORD</button>
    </div>
</div>

<script>
    let currentType = '';
    let selectedLaws = [];

    function openForm(type) {
        currentType = type;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('section-content').style.display = 'block';
        
        const extra = document.getElementById('extra-fields');
        const lawSec = document.getElementById('law-section');
        extra.innerHTML = '';
        lawSec.style.display = 'block';

        if (type === 'majetek') {
            document.getElementById('form-title').innerText = 'Žádost o prověrku majetku (§ 37)';
            extra.innerHTML = '<div class="field"><label>📑 Předmět vydání</label><input type="text" id="p-vydani" value="Informace o veškerém evidovaném majetku, bankovních účtech a vozidlech."></div>';
        } 
        else if (type === 'agent') {
            document.getElementById('form-title').innerText = 'Žádost o zastírajícího agenta';
            extra.innerHTML = '<div class="field"><label>🕵️ Prostředek</label><input type="text" value="Užití agenta zastírajícího svou příslušnost k S.O.S." readonly></div>' +
                             '<div class="field"><label>🎯 Cíl nasazení</label><input type="text" id="a-cil" placeholder="Název skupiny / účel"></div>';
        }
        else if (type === 'nemovitost') {
            document.getElementById('form-title').innerText = 'Žádost o výpis nemovitosti (SEC)';
            lawSec.style.display = 'none'; // SEC nepotřebuje paragrafy ze zákoníku
            extra.innerHTML = '<div class="field"><label>🏢 Určeno pro</label><input type="text" value="Komisařství pro ekonomickou a pracovní činnost (SEC)" readonly></div>';
        }
        else if (type === 'prohlidka') {
            document.getElementById('form-title').innerText = 'Podnět k domovní prohlídce (§ 38)';
            extra.innerHTML = '<div class="grid"><div class="field"><label>🏠 Typ</label><select id="p-typ"><option>Domovní</option><option>Jiných prostor</option></select></div>' +
                             '<div class="field"><label>📍 Adresa</label><input type="text" id="p-adresa"></div></div>' +
                             '<div class="field"><label>🔍 Předmět prohlídky</label><input type="text" id="p-objekt" placeholder="zbraně, drogy, důkazy..."></div>';
        }
        loadLaws();
    }

    function goBack() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('form-container').style.display = 'none';
        selectedLaws = [];
        renderTags();
    }

    async function loadLaws() {
        const list = document.getElementById('laws-list');
        try {
            const res = await fetch('laws.json?v=' + Date.now());
            const data = await res.json();
            list.innerHTML = '';
            data.categories.forEach(cat => {
                cat.laws.forEach(law => {
                    const subs = law.subs || [{label: '', text: law.description}];
                    subs.forEach(s => {
                        const div = document.createElement('div');
                        div.className = 'law-item';
                        const t = `${law.title} ${s.label}`.trim();
                        div.innerHTML = `<strong>${t}</strong>`;
                        div.onclick = () => { if(!selectedLaws.includes(t)) { selectedLaws.push(t); renderTags(); }};
                        list.appendChild(div);
                    });
                });
            });
        } catch(e) { list.innerHTML = "Chyba načítání laws.json"; }
    }

    function renderTags() {
        const c = document.getElementById('tags'); c.innerHTML = '';
        selectedLaws.forEach(l => {
            const s = document.createElement('div'); s.className = 'tag';
            s.innerHTML = `${l} <span style="cursor:pointer" onclick="selectedLaws=selectedLaws.filter(x=>x!=='${l}');renderTags()">✖</span>`;
            c.appendChild(s);
        });
    }

    function filterLaws() {
        let v = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.law-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    function generate() {
        const d = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
        let output = "";

        if (currentType === 'majetek') {
            output = `**ŽÁDOST O UŽITÍ OPP DLE § 37** ⚖️\n**Příslušník:** ${d('detektiv')}\n**Subjekt:** ${d('subjekt')} (${d('narozeni')})\n**Trestné činy:** ${selectedLaws.join(', ')}\n**Předmět:** ${d('p-vydani')}\n**Skutečnosti:** ${d('skutecnosti')}`;
        } else if (currentType === 'agent') {
            output = `**ŽÁDOST O ZASTÍRAJÍCÍHO AGENTA** 🕵️\n**Příslušník:** ${d('detektiv')}\n**Cíl:** ${d('a-cil')}\n**Skutečnosti:** ${d('skutecnosti')}`;
        } else if (currentType === 'nemovitost') {
            output = `**ŽÁDOST O VÝPIS NEMOVITOSTI (SEC)** 🏠\n\nVážená komise,\nžádám o výpis nemovitostí na osobu: **${d('subjekt')}**, DOB: **${d('narozeni')}**.\n\n**Důvod:** ${d('skutecnosti')}`;
        } else if (currentType === 'prohlidka') {
            output = `**PODNĚT K PROHLÍDCE DLE § 38** 🏚️\n**Příslušník:** ${d('detektiv')}\n**Typ:** ${d('p-typ')}\n**Adresa:** ${d('p-adresa')}\n**Subjekt:** ${d('subjekt')}\n**Předmět:** ${d('p-objekt')}\n**Trestný čin:** ${selectedLaws.join(', ')}\n**Skutečnosti:** ${d('skutecnosti')}`;
        }

        window.parent.postMessage(output, '*');
    }
</script>
</body>
</html>
