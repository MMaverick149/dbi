<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP COMMAND - OPP Evidence</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --success: #2ea043;
            --input-bg: #0d1117;
            --text: #c9d1d9;
            --warning: #ff9d00;
        }

        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 250px; background-color: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 10px; }
        .sidebar-header { color: var(--warning); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 30px; padding-left: 10px; }
        .menu-item { padding: 12px 15px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; color: #8b949e; text-decoration: none; display: flex; align-items: center; font-size: 14px; }
        .menu-item:hover { background-color: var(--card); color: white; }
        .menu-item.active { background-color: #1f6feb; color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .opp-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .opp-card { background: var(--card); border: 1px solid var(--border); padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .opp-card:hover { border-color: var(--accent); }
        .opp-card div { font-size: 30px; margin-bottom: 10px; }
        .opp-card span { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--accent); }

        #form-container { display: none; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        .section-title { color: var(--warning); margin: 25px 0 15px; font-weight: bold; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .grid-osoba { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; font-size: 12px; }

        .btn-add { background: none; border: 1px dashed var(--success); color: var(--success); width: 100%; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; font-size: 11px; margin-bottom: 20px; }

        .tags-container { background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 10px; min-height: 60px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #1f6feb; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 8px; }
        .tag-remove { cursor: pointer; font-weight: bold; }

        .law-list { max-height: 200px; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; }
        .law-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #161b22; font-size: 12px; }
        .law-item:hover { background: #1c2128; }
        .law-item strong { color: var(--accent); }

        .btn-gen { background: var(--success); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">SASP COMMAND</div>
        <a href="dashboard.html" class="menu-item">🏠 Přehled systému</a>
        <a href="evidence.html" class="menu-item active">📂 Seznam spisů / OPP</a>
        <a href="https://genk.cz/hry/gta5/zakony-fivem/the-penal-code-of-the-state-of-san-andreas-002-19-r17/" target="_blank" class="nav-item">📑 Zákoník</a>
        <a href="login.html" style="margin-top:auto; color:#f85149; text-decoration:none; font-size:12px; padding: 10px;">🔓Odhlásit se</a>
    </div>

    <div class="main-content">
        <div id="main-menu" class="opp-menu">
            <div class="opp-card" onclick="openForm('📡 Sledování osoby')"><div>📡</div><span>Sledování osoby</span></div>
            <div class="opp-card" onclick="openForm('📞 Výpis telekomunikace')"><div>📞</div><span>Výpis telekomunikace</span></div>
            <div class="opp-card" onclick="openForm('🔓 Prolomení telefonu')"><div>🔓</div><span>Prolomení telefonu</span></div>
            <div class="opp-card" onclick="openForm('💰 Prověrka majetku')"><div>💰</div><span>Prověrka majetku</span></div>
            <div class="opp-card" onclick="openForm('🕵️ Zastírající agent')"><div>🕵️</div><span>Zastírající agent</span></div>
            <div class="opp-card" onclick="openForm('🏠 Výpis nemovitosti')"><div>🏠</div><span>Výpis nemovitosti</span></div>
            <div class="opp-card" onclick="openForm('🏚️ Domovní prohlídka')"><div>🏚️</div><span>Domovní prohlídka</span></div>
        </div>

        <div id="form-container">
            <button onclick="closeForm()" style="background:none; border:1px solid var(--border); color:#8b949e; padding:6px 12px; cursor:pointer; margin-bottom:20px; border-radius:4px;">← ZPĚT DO MENU</button>
            <h2 id="form-title" style="margin:0; color:white; text-transform: uppercase; font-size: 20px;"></h2>
            
            <div class="section-title">👮 Vyžadující příslušník</div>
            <div class="grid-3">
                <div class="field"><label>👤 Příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
                <div class="field"><label>🎖️ Hodnost</label>
                    <select id="hodnost">
                        <option>Detective I</option><option>Detective II</option><option>Detective III</option>
                    </select>
                </div>
                <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
            </div>

            <div class="section-title">👥 Prověřované osoby</div>
            <div id="subjekty-list">
                <div class="grid-osoba">
                    <div class="field"><label>👤 Osoba</label><input type="text" placeholder="Jméno a příjmení"></div>
                    <div class="field"><label>🗓️ Narození</label><input type="text" placeholder="DD.MM.RRRR"></div>
                    <div class="field"><label>🆔 MDT ID</label><input type="text" placeholder="XXXXXX"></div>
                </div>
            </div>
            <button class="btn-add" onclick="addSubjekt()">+ Přidat osobu</button>

            <div class="section-title">⚖️ Kvalifikace (Tresty)</div>
            <div class="tags-container" id="selected-laws"></div>
            <input type="text" id="law-search" placeholder="Hledat v zákoníku...">
            <div class="law-list" id="law-list-box"></div>

            <button class="btn-gen">🚀 Generovat formáty</button>
        </div>
    </div>

    <script>
        let allLaws = [];

        function openForm(title) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('form-title').innerText = title;
            loadLaws();
        }

        function closeForm() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('form-container').style.display = 'none';
        }

        function addSubjekt() {
            const list = document.getElementById('subjekty-list');
            const div = document.createElement('div');
            div.className = 'grid-osoba';
            div.innerHTML = `
                <div class="field"><label>👤 Osoba</label><input type="text" placeholder="Jméno a příjmení"></div>
                <div class="field"><label>🗓️ Narození</label><input type="text" placeholder="DD.MM.RRRR"></div>
                <div class="field"><label>🆔 MDT ID</label><input type="text" placeholder="XXXXXX"></div>`;
            list.appendChild(div);
        }

        async function loadLaws() {
            const listBox = document.getElementById('law-list-box');
            try {
                const res = await fetch('laws.json');
                const data = await res.json();
                
                // OPRAVA: Pokud je JSON pole, vezmi ho, pokud ne, hledej pole v něm
                allLaws = Array.isArray(data) ? data : (data.laws || Object.values(data)[0] || []);
                
                renderLawList(allLaws);
            } catch (err) {
                listBox.innerHTML = `<div style="color:red; padding:10px;">Chyba při načítání laws.json</div>`;
            }
        }

        function renderLawList(laws) {
            const listBox = document.getElementById('law-list-box');
            listBox.innerHTML = '';
            
            laws.forEach(par => {
                if (par.subs) {
                    par.subs.forEach(sub => {
                        const item = document.createElement('div');
                        item.className = 'law-item';
                        const text = `${par.title} - ${sub.label} ${sub.text}`;
                        item.onclick = () => addTag(text);
                        item.innerHTML = `<strong>${par.title}</strong><br><small>${sub.label} ${sub.text}</small>`;
                        listBox.appendChild(item);
                    });
                } else {
                    const item = document.createElement('div');
                    item.className = 'law-item';
                    item.onclick = () => addTag(par.title);
                    item.innerHTML = `<strong>${par.title}</strong>`;
                    listBox.appendChild(item);
                }
            });
        }

        document.getElementById('law-search').oninput = function() {
            const q = this.value.toLowerCase();
            const filtered = allLaws.filter(l => 
                l.title.toLowerCase().includes(q) || 
                (l.subs && l.subs.some(s => s.text.toLowerCase().includes(q)))
            );
            renderLawList(filtered);
        };

        function addTag(text) {
            const container = document.getElementById('selected-laws');
            if ([...container.querySelectorAll('span')].some(s => s.innerText === text)) return;
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `<span>${text}</span><div class="tag-remove" onclick="this.parentElement.remove()">×</div>`;
            container.appendChild(tag);
        }
    </script>
</body>
</html>
