<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, select { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; outline: none; }
        
        /* ŠTÍTKY VYBRANÝCH TRESTŮ */
        .tags-container { border: 1px solid var(--border); background: #010409; padding: 10px; border-radius: 4px; min-height: 45px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        .tag { background: #238636; color: white; padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; animation: pop 0.2s ease; }
        .tag span { cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .tag span:hover { background: #f85149; }

        .btn-submit { background: #1f6feb; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; text-transform: uppercase; }
        .btn-laws { background: #ffa657; color: black; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 100%; font-size: 14px; }
        
        #modal-laws { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--accent); padding: 20px; border-radius: 8px; width: 85%; max-height: 85vh; overflow-y: auto; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .law-category { color: #ffa657; font-weight: bold; margin: 15px 0 5px 0; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-transform: uppercase; font-size: 11px; }
        .law-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .law-item:hover { background: #21262d; border-left: 3px solid var(--accent); }
        .law-item small { display: block; color: #8b949e; font-size: 11px; margin-top: 5px; line-height: 1.3; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 99; }
        #lawSearch { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--accent); color: white; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
        
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<button class="btn-laws" onclick="toggleLaws()">📖 OTEVŘÍT KATALOG A VYBRAT TRESTY</button>

<div id="form-title" style="color: var(--accent); font-size: 18px; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px;">DETAIL SPISU</div>

<div class="grid">
    <div class="field"><label>👮 Vyžadující příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
    <div class="field"><label>🎖️ Hodnost</label>
        <select id="hodnost">
            <option>Detective I</option><option>Detective II</option><option>Detective III</option>
            <option>Sergeant</option><option>Lieutenant</option><option>DBI Trainee</option>
        </select>
    </div>
    <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
    <div class="field"><label>👤 Subjekt</label><input type="text" id="subjekt" placeholder="Luis Vega"></div>
    <div class="field"><label>📅 Datum narození</label><input type="text" id="narozeni" placeholder="13.03.1993"></div>
    <div class="field"><label>🆔 MDT ID</label><input type="text" id="mdtid" placeholder="NC5422"></div>
</div>

<label>⚖️ Seznam vybraných trestných činů</label>
<div class="tags-container" id="kvalifikace-list">
    <span style="color: #484f58; font-style: italic; font-size: 11px;">Zatím nebyly vybrány žádné tresty...</span>
</div>

<label>🛠️ Prostředek (OPP)</label>
<select id="typopp" style="width:100%; margin-bottom: 15px;">
    <option>Výpis a prověrka majetku a finančních prostředků</option>
    <option>Odposlech a záznam telekomunikačního provozu</option>
    <option>Sledování osob a věcí</option>
</select>

<button class="btn-submit" onclick="vytvorZadost()">📥 GENEROVAT ŽÁDOST PRO DISCORD</button>

<div class="overlay" id="overlay" onclick="toggleLaws()"></div>
<div id="modal-laws">
    <h2 style="color:var(--accent); margin-top: 0;">Katalog trestů</h2>
    <input type="text" id="lawSearch" placeholder="Hledat trest (např. ublížení)..." onkeyup="filterLaws()">
    <div id="laws-list">Načítám laws.json...</div>
    <button onclick="toggleLaws()" style="margin-top: 20px; padding: 12px; width: 100%; cursor: pointer; background: #30363d; color: white; border: none; border-radius: 4px; font-weight: bold;">HOTOVO / ZAVŘÍT</button>
</div>

<script>
    let selectedLaws = [];

    // NAČTENÍ DAT
    async function loadLaws() {
        const list = document.getElementById('laws-list');
        try {
            const response = await fetch('laws.json?v=' + Date.now());
            if (!response.ok) throw new Error('Nepodařilo se stáhnout laws.json');
            const data = await response.json();
            list.innerHTML = '';

            data.categories.forEach(cat => {
                const catTitle = document.createElement('div');
                catTitle.className = 'law-category';
                catTitle.innerText = cat.name;
                list.appendChild(catTitle);

                cat.laws.forEach(law => {
                    if (law.subs && law.subs.length > 0) {
                        law.subs.forEach(sub => {
                            const div = document.createElement('div');
                            div.className = 'law-item';
                            const title = `${law.title} ${sub.label}`;
                            div.innerHTML = `<strong>${title}</strong><small>${sub.text}</small>`;
                            div.onclick = () => addLaw(title);
                            list.appendChild(div);
                        });
                    } else {
                        const div = document.createElement('div');
                        div.className = 'law-item';
                        div.innerHTML = `<strong>${law.title}</strong><small>${law.description || ''}</small>`;
                        div.onclick = () => addLaw(law.title);
                        list.appendChild(div);
                    }
                });
            });
        } catch (e) {
            list.innerHTML = `<span style="color:red">Chyba: ${e.message}</span>`;
        }
    }

    // PŘIDÁNÍ TRESTU
    function addLaw(title) {
        if (!selectedLaws.includes(title)) {
            selectedLaws.push(title);
            renderTags();
        }
    }

    // SMAZÁNÍ TRESTU
    function removeLaw(title) {
        selectedLaws = selectedLaws.filter(item => item !== title);
        renderTags();
    }

    // ZOBRAZENÍ ŠTÍTKŮ
    function renderTags() {
        const container = document.getElementById('kvalifikace-list');
        if (selectedLaws.length === 0) {
            container.innerHTML = '<span style="color: #484f58; font-style: italic; font-size: 11px;">Zatím nebyly vybrány žádné tresty...</span>';
            return;
        }
        
        container.innerHTML = '';
        selectedLaws.forEach(law => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            // Používáme speciální ošetření uvozovek pro ID v JS
            tag.innerHTML = `${law} <span onclick="removeLaw('${law.replace(/'/g, "\\'")}')">✖</span>`;
            container.appendChild(tag);
        });
    }

    function filterLaws() {
        let input = document.getElementById('lawSearch').value.toLowerCase();
        let items = document.getElementsByClassName('law-item');
        for (let i = 0; i < items.length; i++) {
            items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function toggleLaws() {
        const m = document.getElementById('modal-laws');
        const o = document.getElementById('overlay');
        const isVisible = m.style.display === 'block';
        m.style.display = isVisible ? 'none' : 'block';
        o.style.display = isVisible ? 'none' : 'block';
    }

    function vytvorZadost() {
        const d = (id) => document.getElementById(id).value;
        const kvalifikaceFinal = selectedLaws.join(', ');

        const pevnyText = `Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu, při kterém byly nalezeny osoby bez známek života s poraněními odpovídajícími násilnému útoku. V rámci probíhajícího vyšetřování byly zajištěny důkazní materiály a probíhá analýza stop z místa činu.\n\nZa účelem objasnění okolností případu je žádáno o poskytnutí informací o majetku a finančních prostředcích uvedených osob. Tyto informace mohou napomoci k identifikaci možného motivu trestné činnosti, prověření majetkových poměrů obětí a zjištění případných vazeb na další osoby, které by mohly souviset s vyšetřovaným případem.`;

        const discordText = `**ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19** ⚖️\n\n` +
        `**Vyžadující příslušník:**\n• 👮 ${d('detektiv')}\n\n` +
        `**Prostředek:**\n• 🛠️ ${d('typopp')}\n\n` +
        `**Podezřelá osoba/Prověřovaná osoba (Oběť):**\n• 👤 ${d('subjekt')} (${d('narozeni')}, ${d('mdtid')})\n\n` +
        `**Trestné činy:**\n• ⚖️ ${kvalifikaceFinal || 'NEVYBRÁNO'}\n\n` +
        `**Předmět vydání:**\n• 📑 Informace o veškerém evidovaném majetku osoby, zejména bankovních účtech, finančních prostředcích, registrovaných vozidlech, nemovitostech, movitém majetku vyšší hodnoty a případných závazcích či dluzích.\n\n` +
        `**Zjištěné skutečnosti:**\n${pevnyText}\n\n` +
        `**S pozdravem,**\n🏙️ San Andreas State Police\n🎖️ ${d('hodnost')} ${d('detektiv')}\n\n` +
        `**PŘÍLOHY:** 📁`;

        window.parent.postMessage(discordText, '*');
    }

    loadLaws();
</script>
</body>
</html>
