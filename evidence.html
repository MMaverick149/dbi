<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; --panel: #161b22; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        
        /* HLAVNÍ ROZCESTNÍK */
        #main-menu { max-width: 900px; margin: 0 auto; }
        .opp-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .opp-card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .opp-card:hover { border-color: var(--accent); transform: translateY(-5px); background: #21262d; }
        .opp-card div { font-size: 40px; margin-bottom: 15px; }
        .opp-card span { font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; display: block; }

        /* FORMULÁŘE */
        #form-container { max-width: 900px; margin: 0 auto; display: none; }
        .form-section { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 8px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select, textarea { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

        .btn-back { background: transparent; color: #8b949e; border: 1px solid #8b949e; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-weight: bold; transition: 0.2s; }
        .btn-back:hover { color: white; border-color: white; }
        
        .btn-submit { background: #238636; color: white; border: none; padding: 18px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 25px; text-transform: uppercase; font-size: 14px; }
        .btn-submit:hover { background: #2ea043; }

        /* KATALOG ZÁKONŮ */
        .tags-container { border: 1px solid var(--border); background: #010409; padding: 12px; border-radius: 4px; min-height: 45px; display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .tag { background: #238636; color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .tag span { cursor: pointer; background: rgba(0,0,0,0.2); width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 9px; }
        
        .catalog-wrapper { border: 1px solid var(--border); border-radius: 4px; background: #010409; overflow: hidden; }
        #search { border: none; border-bottom: 1px solid var(--border); border-radius: 0; }
        .inline-catalog { max-height: 200px; overflow-y: auto; }
        .law-item { padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .law-item:hover { background: #161b22; border-left: 4px solid var(--accent); }
        .law-item strong { color: #e6edf3; font-size: 12px; }
        .law-item small { color: #8b949e; display: block; margin-top: 3px; font-size: 11px; }

        .opp-extra { background: rgba(88, 166, 255, 0.05); border: 1px dashed var(--accent); padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="main-menu">
    <h2 style="color: var(--accent); text-align: center; letter-spacing: 2px;">VYBERTE TYP ŽÁDOSTI / OPP</h2>
    <div class="opp-menu">
        <div class="opp-card" onclick="openForm('majetek')"><div>💰</div><span>Prověrka majetku</span></div>
        <div class="opp-card" onclick="openForm('agent')"><div>🕵️</div><span>Zastírající agent</span></div>
        <div class="opp-card" onclick="openForm('nemovitost')"><div>🏠</div><span>Výpis nemovitosti (SEC)</span></div>
        <div class="opp-card" onclick="openForm('prohlidka')"><div>🏚️</div><span>Domovní prohlídka</span></div>
    </div>
</div>

<div id="form-container">
    <button class="btn-back" onclick="goBack()">← ZPĚT DO VÝBĚRU</button>
    
    <div class="form-section">
        <h3 id="form-title" style="margin-top: 0; color: #ffa657; text-transform: uppercase;"></h3>
        
        <div class="grid">
            <div class="field"><label>👮 Vyžadující příslušník</label><input type="text" id="detektiv" placeholder="Jméno Příjmení"></div>
            <div class="field"><label>🎖️ Hodnost</label>
                <select id="hodnost">
                    <option>Detective I</option><option>Detective II</option><option>Detective III</option>
                    <option>Sergeant</option><option>Lieutenant</option><option>DBI Trainee</option>
                </select>
            </div>
            <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
        </div>

        <div class="grid">
            <div class="field"><label>👤 Subjekt (Podezřelý / Oběť)</label><input type="text" id="subjekt"></div>
            <div class="field"><label>📅 Datum narození</label><input type="text" id="narozeni" placeholder="DD.MM.YYYY"></div>
            <div class="field"><label>🆔 MDT ID</label><input type="text" id="mdtid"></div>
        </div>

        <div id="extra-fields"></div>

        <div id="law-section">
            <label>⚖️ Právní kvalifikace (Vyberte kliknutím v katalogu)</label>
            <div class="tags-container" id="tags">
                <span style="color: #484f58; font-size: 11px; font-style: italic;">Zatím jste nevybrali žádný trest...</span>
            </div>
            <div class="catalog-wrapper">
                <input type="text" id="search" placeholder="🔍 Rychlé hledání v zákoníku (např. 'vražda' nebo '§7')..." onkeyup="filterLaws()">
                <div class="inline-catalog" id="laws-list">Načítám laws.json...</div>
            </div>
        </div>

        <label style="margin-top: 20px; display: block;">📝 Zjištěné skutečnosti (Odůvodnění)</label>
        <textarea id="skutecnosti" placeholder="Zde podrobně popište důvody, proč žádáte o užití tohoto opatření..."></textarea>

        <button class="btn-submit" onclick="generate()">📥 GENEROVAT FORMULÁŘ PRO DISCORD</button>
    </div>
</div>

<script>
    let currentType = '';
    let selectedLaws = [];

    function openForm(type) {
        currentType = type;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        
        const extra = document.getElementById('extra-fields');
        const lawSec = document.getElementById('law-section');
        extra.innerHTML = '';
        lawSec.style.display = 'block';

        if (type === 'majetek') {
            document.getElementById('form-title').innerText = 'Žádost o prověrku majetku (§ 37)';
            extra.innerHTML = `<div class="opp-extra">
                <div class="field"><label>📑 Předmět vydání</label>
                <textarea id="p-vydani">Informace o veškerém evidovaném majetku osoby, zejména bankovních účtech, finančních prostředcích, registrovaných vozidlech a nemovitostech.</textarea></div>
            </div>`;
        } 
        else if (type === 'agent') {
            document.getElementById('form-title').innerText = 'Žádost zastírajícího agenta';
            extra.innerHTML = `<div class="opp-extra">
                <div class="field"><label>🕵️ Prostředek</label><input type="text" value="Užití agenta zastírajícího svou příslušnost k S.O.S." readonly></div>
                <div class="field"><label>🎯 Cíl nasazení / Skupina</label><input type="text" id="a-cil" placeholder="Název prověřované skupiny"></div>
            </div>`;
        }
        else if (type === 'nemovitost') {
            document.getElementById('form-title').innerText = 'Žádost o výpis nemovitosti (SEC)';
            lawSec.style.display = 'none';
            extra.innerHTML = `<div class="opp-extra">
                <div class="field"><label>🏢 Určeno pro</label><input type="text" value="Komisařství pro ekonomickou a pracovní činnost (SEC)" readonly></div>
            </div>`;
        }
        else if (type === 'prohlidka') {
            document.getElementById('form-title').innerText = 'Podnět k prohlídce (§ 38)';
            extra.innerHTML = `<div class="opp-extra">
                <div class="grid" style="grid-template-columns: 1fr 2fr;">
                    <div class="field"><label>🏠 Prohlídka</label><select id="p-typ"><option>Domovní</option><option>Jiných prostor</option></select></div>
                    <div class="field"><label>📍 Adresa</label><input type="text" id="p-adresa" placeholder="Přesná poloha objektu"></div>
                </div>
                <div class="field"><label>🔍 Předmět domovní prohlídky</label><input type="text" id="p-objekt" placeholder="Co konkrétně hledáme?"></div>
            </div>`;
        }
        loadLaws();
    }

    function goBack() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('form-container').style.display = 'none';
        selectedLaws = [];
        renderTags();
    }

    async function loadLaws() {
        const list = document.getElementById('laws-list');
        try {
            const res = await fetch('laws.json?v=' + Date.now());
            const data = await res.json();
            list.innerHTML = '';
            data.categories.forEach(cat => {
                cat.laws.forEach(law => {
                    if (law.subs && law.subs.length > 0) {
                        law.subs.forEach(s => {
                            const div = document.createElement('div');
                            div.className = 'law-item';
                            const title = `${law.title} (${s.label})`;
                            div.innerHTML = `<strong>${title}</strong><small>${s.text}</small>`;
                            div.onclick = () => addLaw(`${title} - ${s.text}`);
                            list.appendChild(div);
                        });
                    } else {
                        const div = document.createElement('div');
                        div.className = 'law-item';
                        div.innerHTML = `<strong>${law.title}</strong><small>${law.description || ''}</small>`;
                        div.onclick = () => addLaw(law.title);
                        list.appendChild(div);
                    }
                });
            });
        } catch(e) { list.innerHTML = "<div style='padding:10px; color:red;'>Nelze načíst laws.json</div>"; }
    }

    function addLaw(val) {
        if(!selectedLaws.includes(val)) {
            selectedLaws.push(val);
            renderTags();
        }
    }

    function renderTags() {
        const c = document.getElementById('tags');
        if(selectedLaws.length === 0) {
            c.innerHTML = '<span style="color: #484f58; font-size: 11px; font-style: italic;">Nebyl vybrán žádný trest...</span>';
            return;
        }
        c.innerHTML = '';
        selectedLaws.forEach(l => {
            const s = document.createElement('div');
            s.className = 'tag';
            s.innerHTML = `${l} <span onclick="removeLaw('${l.replace(/'/g, "\\'")}')">✖</span>`;
            c.appendChild(s);
        });
    }

    function removeLaw(val) {
        selectedLaws = selectedLaws.filter(x => x !== val);
        renderTags();
    }

    function filterLaws() {
        let v = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.law-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    function generate() {
        const d = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
        let output = "";

        if (currentType === 'majetek') {
            output = `**ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19** ⚖️\n\n**Vyžadující příslušník:** 👮 ${d('detektiv')}\n**Prostředek:** 🛠️ Výpis a prověrka majetku\n**Subjekt:** 👤 ${d('subjekt')} (${d('narozeni')}, ${d('mdtid')})\n\n**Trestné činy:**\n• ${selectedLaws.join('\n• ')}\n\n**Předmět vydání:** 📑 ${d('p-vydani')}\n\n**Zjištěné skutečnosti:**\n${d('skutecnosti')}`;
        } 
        else if (currentType === 'agent') {
            output = `**ŽÁDOST O NASAZENÍ ZASTÍRAJÍCÍHO AGENTA** 🕵️\n\n**Příslušník:** ${d('detektiv')}\n**Case ID:** ${d('caseid')}\n**Prostředek:** Užití agenta zastírajícího svou příslušnost k S.O.S.\n\n**Cílový subjekt / skupina:** ${d('a-cil')}\n**Zjištěné skutečnosti:**\n${d('skutecnosti')}`;
        } 
        else if (currentType === 'nemovitost') {
            output = `**ŽÁDOST O VÝPIS NEMOVITOSTI (SEC)** 🏠\n\n**Určeno pro:** Komisařství pro ekonomickou a pracovní činnost (SEC)\n\n**Vážená komise,**\nTímto Vás žádám o poskytnutí informací z registru nemovitostí o výpis všech nemovitostí evidovaných na níže uvedenou osobu:\n\n**Jméno Příjmení:** ${d('subjekt')}\n**DOB:** ${d('narozeni')}\n\n**Zdůvodnění:** ${d('skutecnosti')}`;
        } 
        else if (currentType === 'prohlidka') {
            output = `**PODNĚT K PROVEDENÍ PROHLÍDKY DLE § 38 Z.Č. 006-19** 🏚️\n\n**Vyžadující příslušník:** ${d('detektiv')}\n**Prohlídka:** ${d('p-typ')}\n**Podezřelá osoba:** ${d('subjekt')} (${d('narozeni')})\n**Adresa:** ${d('p-adresa')}\n**Předmět prohlídky:** ${d('p-objekt')}\n\n**Trestný čin:** ${selectedLaws.join(', ')}\n\n**Zjištěné skutečnosti:**\n${d('skutecnosti')}`;
        }

        window.parent.postMessage(output, '*');
    }
</script>
</body>
</html>
