<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence OPP - Soukromý Systém</title>
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; --panel: #161b22; --at-color: #ffa657; --success: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; font-size: 13px; margin: 0; }
        
        #main-menu { max-width: 1100px; margin: 0 auto; }
        .opp-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        .opp-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .opp-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #21262d; }
        
        #form-container, #list-container { max-width: 900px; margin: 0 auto; display: none; }
        .form-section { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 8px; }

        .section-title { color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; font-size: 12px; font-weight: bold; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { color: #8b949e; font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select, textarea { background: #010409; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 100px; }

        .subjekt-row { border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 10px; position: relative; background: #0d1117; }
        .btn-add { background: transparent; color: var(--success); border: 1px dashed var(--success); padding: 8px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-size: 11px; width: 100%; font-weight: bold; }
        
        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }

        .output-modal { background: #161b22; border: 1px solid var(--border); padding: 25px; border-radius: 8px; margin-top: 40px; display: none; }
        .output-box { background: #010409; border: 1px solid #30363d; padding: 15px; color: #c9d1d9; font-family: monospace; white-space: pre-wrap; margin-bottom: 20px; border-radius: 4px; font-size: 12px; line-height: 1.6; }
        
        .spis-item { background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .login-box { text-align: center; margin-bottom: 30px; padding: 20px; border: 1px solid var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color: var(--accent); text-align: center;">DATABASE OPP & EVIDENCE</h1>
    
    <div class="login-box">
        <label>ZADEJ SVŮJ PRIVÁTNÍ KLÍČ (Pro tvé spisy)</label><br>
        <input type="password" id="user-key" style="width: 200px; text-align: center;" placeholder="Např. 1234 nebo Jméno" onchange="initSystem()">
        <p style="font-size: 10px; color: #8b949e;">Tento klíč určuje, které spisy uvidíš. Nikomu ho neříkej.</p>
    </div>

    <div class="opp-menu">
        <div class="opp-card" onclick="openForm('vypis')"><div>📞</div><span>Výpis telekomunikace</span></div>
        <div class="opp-card" onclick="openForm('prolomeni')"><div>🔓</div><span>Prolomení telefonu</span></div>
        <div class="opp-card" onclick="openForm('majetek')"><div>💰</div><span>Prověrka majetku</span></div>
        <div class="opp-card" onclick="viewList()"><div>📁</div><span>Moje uložené spisy</span></div>
    </div>
</div>

<div id="form-container">
    <button onclick="location.reload()" style="background:none; border:1px solid #8b949e; color:#8b949e; padding:5px 10px; cursor:pointer; margin-bottom:15px;">← MENU</button>
    <div class="form-section">
        <h2 id="form-title" style="margin: 0; color: var(--accent);"></h2>
        
        <div class="section-title">Vyžadující příslušník</div>
        <div class="grid">
            <div class="field"><label>👮 Příslušník</label><input type="text" id="detektiv"></div>
            <div class="field"><label>🎖️ Hodnost</label><select id="hodnost"><option>Detective I</option><option>Detective II</option><option>Sergeant</option></select></div>
            <div class="field"><label>📂 Case ID</label><input type="text" id="caseid" placeholder="#2026-XXXX"></div>
        </div>

        <div class="section-title">Podezřelé osoby</div>
        <div id="subjekty-list"></div>
        <button class="btn-add" onclick="addSubjekt()">+ PŘIDAT OSOBU</button>

        <div id="extra-fields"></div>

        <div class="field"><label>📝 Skutečnosti / Odůvodnění</label><textarea id="skutecnosti"></textarea></div>
        <div class="field"><label>📁 Přílohy</label><input type="text" id="prilohy" value="Kompletní spis, Souhlas SZ"></div>

        <button class="btn-submit" onclick="generate()">📥 GENEROVAT FORMÁTY</button>
        <button class="btn-save" onclick="saveToStorage()">💾 ULOŽIT DO MÉHO SEZNAMU</button>

        <div id="output-modal" class="output-modal">
            <div class="section-title" style="color: var(--accent);">📄 IC SPIS (PRO SOUD / SPIS)</div>
            <div class="output-box" id="output-ic"></div>

            <div id="at-section">
                <div class="section-title" style="color: var(--at-color);">⚙️ AT / FORENZNÍ TÝM</div>
                <div class="output-box" id="output-at"></div>
            </div>
        </div>
    </div>
</div>

<div id="list-container">
    <button onclick="location.reload()" style="background:none; border:1px solid #8b949e; color:#8b949e; padding:5px 10px; cursor:pointer; margin-bottom:15px;">← ZPĚT</button>
    <div class="form-section">
        <h2 style="color: var(--accent);">MOJE ULOŽENÉ SPISY</h2>
        <div id="my-spisy-list"></div>
    </div>
</div>

<script>
    let subCount = 0;
    let currentType = '';

    function initSystem() {
        const key = document.getElementById('user-key').value;
        if(key) { alert('Systém odemčen pro tvůj klíč.'); }
    }

    function openForm(type) {
        currentType = type;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('form-title').innerText = type.toUpperCase();
        
        const extra = document.getElementById('extra-fields');
        extra.innerHTML = '';
        if(type === 'vypis') {
            extra.innerHTML = `<div class="field"><label>Předmět výpisu</label><input type="text" id="v-predmet" value="Výpis hovorů a SMS zpráv"></div>`;
        }
        
        subCount = 0;
        document.getElementById('subjekty-list').innerHTML = '';
        addSubjekt();
    }

    function addSubjekt() {
        subCount++;
        const div = document.createElement('div'); div.className = 'subjekt-row';
        div.innerHTML = `<div class="grid"><div class="field"><label>Osoba</label><input type="text" class="sj"></div><div class="field"><label>Narození</label><input type="text" class="sd"></div><div class="field"><label>MDT ID</label><input type="text" class="si"></div></div>`;
        document.getElementById('subjekty-list').appendChild(div);
    }

    function generate() {
        const d = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
        const subs = Array.from(document.querySelectorAll('.subjekt-row')).map(r => ({
            n: r.querySelector('.sj').value, d: r.querySelector('.sd').value, i: r.querySelector('.si').value
        }));
        
        const sIC = subs.map(s => `${s.n} (${s.d}, MDT: ${s.i})`).join(', ');
        const sAT = subs.map(s => `**${s.n}**`).join('\n');

        // MEZERY V IC SPISU (Dvojité řádkování pro přehlednost)
        let ic = `**ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19**\n\n`;
        ic += `**Vyžadující příslušník:**\n${d('hodnost')} ${d('detektiv')}\n\n`;
        ic += `**Case ID:**\n${d('caseid')}\n\n`;
        ic += `**Podezřelá osoba:**\n${sIC}\n\n`;
        ic += `**Zjištěné skutečnosti:**\n${d('skutecnosti')}\n\n`;
        ic += `**Přílohy:**\n${d('prilohy')}`;

        let at = ""; let hasAt = false;
        if(currentType === 'prolomeni') {
            hasAt = true;
            at = `Dobrý den,\n\nna základě souhlasu SZ žádám o prolomení telefonů.\n\nOsoby:\n${sAT}\n\nŽádám o analýzu dat.\n\nSouhlas SZ přiložen.\n\n||<@654411469953302538>||`;
        } else if (currentType === 'vypis') {
            hasAt = true;
            at = `Dobrý den,\n\nna základě souhlasu SZ žádám o výpis telekomunikace.\n\nOsoby:\n${sAT}\n\nŽádám o: ${d('v-predmet')}.\n\nSouhlas SZ přiložen.\n\n||<@654411469953302538>||`;
        }

        document.getElementById('output-ic').innerText = ic;
        if(hasAt) { document.getElementById('output-at').innerText = at; document.getElementById('at-section').style.display = 'block'; }
        else { document.getElementById('at-section').style.display = 'none'; }
        
        document.getElementById('output-modal').style.display = 'block';
    }

    // SOUKROMÉ UKLÁDÁNÍ
    function saveToStorage() {
        const key = document.getElementById('user-key').value;
        if(!key) return alert("Zadej svůj klíč v hlavním menu!");

        const data = {
            id: Date.now(),
            case: document.getElementById('caseid').value,
            text: document.getElementById('output-ic').innerText,
            type: currentType
        };

        // Uloží se pod unikátním názvem spojeným s tvým klíčem
        let storageKey = "spisy_" + key;
        let existujici = JSON.parse(localStorage.getItem(storageKey)) || [];
        existujici.push(data);
        localStorage.setItem(storageKey, JSON.stringify(existujici));
        alert("Spis uložen do tvého soukromého seznamu!");
    }

    function viewList() {
        const key = document.getElementById('user-key').value;
        if(!key) return alert("Nejdříve zadej svůj klíč!");

        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('list-container').style.display = 'block';
        
        let storageKey = "spisy_" + key;
        let moje = JSON.parse(localStorage.getItem(storageKey)) || [];
        const container = document.getElementById('my-spisy-list');
        container.innerHTML = moje.length ? '' : 'Žádné spisy pod tímto klíčem.';

        moje.forEach(s => {
            const div = document.createElement('div'); div.className = 'spis-item';
            div.innerHTML = `<div><strong>${s.case}</strong> (${s.type})</div> <button onclick="alert('${s.text.replace(/\n/g, '\\n')}')">ZOBRAZIT</button>`;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
