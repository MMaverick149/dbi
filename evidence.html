<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP COMMAND - OPP Evidence</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --success: #2ea043;
            --text: #c9d1d9;
            --warning: #ff9d00;
            --danger: #f85149;
            --secondary: #21262d;
        }

        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 250px; border-right: 1px solid var(--border); padding: 20px 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { color: var(--warning); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 30px; padding-left: 10px; }
        .menu-item { padding: 12px 15px; border-radius: 6px; cursor: pointer; color: #8b949e; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .menu-item.active { background-color: #1f6feb; color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* TABULKA */
        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1c2128; padding: 12px; text-align: left; color: #8b949e; text-transform: uppercase; font-size: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .btn-table { padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--secondary); color: #c9d1d9; cursor: pointer; font-size: 11px; margin-right: 5px; }

        /* FORMULÁŘ */
        #form-container { display: none; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 8px; max-width: 900px; margin: 0 auto; }
        .section-title { color: var(--accent); margin: 25px 0 10px; font-weight: bold; font-size: 11px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .grid-pd { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background: #05070a; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; font-size: 13px; }

        /* MODAL PRO ZOBRAZENÍ */
        #view-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); width: 600px; max-height: 80vh; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }

        .opp-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .opp-card { background: var(--card); border: 1px solid var(--border); padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }
        .opp-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="view-modal" onclick="this.style.display='none'">
        <div class="modal-content" id="modal-text" onclick="event.stopPropagation()"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">SASP COMMAND</div>
        <div class="menu-item">🏠 Přehled systému</div>
        <div class="menu-item active">📂 Seznam spisů / OPP</div>
        <div class="menu-item">📜 Zákoník</div>
        <div style="margin-top: auto;" class="menu-item">🚪 Odhlásit se</div>
    </div>

    <div class="main-content">
        <div id="dashboard">
            <div class="opp-menu">
                <div class="opp-card" onclick="openForm('📡', 'Sledování osoby', '', 'Na základě výše uvedených skutečností, žádám o vydání příkazu ke sledování osob a věcí...')"><div>📡</div><span>Sledování</span></div>
                <div class="opp-card" onclick="openForm('📞', 'Výpis telekomunikace', 'Výpis hovorů a SMS', 'Žádám o vydání příkazu k výpisu z telekomunikačního provozu...')"><div>📞</div><span>Telekomunikace</span></div>
                <div class="opp-card" onclick="openForm('🔓', 'Prolomení telefonu', 'Mobilní telefon 777-777', 'Žádám o vydání příkazu k prolomení datového nosiče...')"><div>🔓</div><span>Telefon</span></div>
                <div class="opp-card" onclick="openForm('🏚️', 'Domovní prohlídka', 'Objekt / Adresa', 'Existuje důvodné podezření, že se v objektu nacházejí věci důležité pro trestní řízení.')"><div>🏚️</div><span>Prohlídka</span></div>
            </div>

            <div class="section-title">📊 Moje OPP</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Datum</th><th>Typ</th><th>Case ID</th><th>Osoba</th><th>Akce</th></tr>
                    </thead>
                    <tbody id="opp-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="form-container">
            <button onclick="hideForm()" style="background:var(--secondary); border:1px solid var(--border); color:#8b949e; cursor:pointer; padding:6px 12px; border-radius:4px; margin-bottom:20px;">← ZPĚT</button>
            <h2 id="form-title" style="margin:0; text-transform:uppercase; font-size: 20px;"></h2>
            
            <div class="section-title">👮 Vyžadující příslušník</div>
            <div class="grid-pd">
                <div><label>Příslušník</label><input type="text" id="off-name" placeholder="Jméno Příjmení"></div>
                <div><label>BN (4 čísla)</label><input type="text" id="off-bn" maxlength="4" placeholder="0000"></div>
                <div><label>Hodnost</label>
                    <select id="off-rank">
                        <option>Detective I</option><option>Detective II</option><option>Sergeant</option><option>Lieutenant</option>
                    </select>
                </div>
                <div><label>Case ID</label><input type="text" id="case-id" value="#2026-XXXX"></div>
            </div>

            <div class="section-title">👥 Podezřelá osoba</div>
            <div class="grid-3">
                <div><label>Jméno</label><input type="text" id="p-name" placeholder="Jméno Příjmení"></div>
                <div><label>Narození</label><input type="text" id="p-dob" placeholder="DD.MM.RRRR"></div>
                <div><label>MDT ID</label><input type="text" id="p-id" placeholder="XXXXXX"></div>
            </div>

            <div class="section-title">📦 Předmět / Zařízení</div>
            <input type="text" id="spec-val" placeholder="Specifikujte zařízení nebo objekt">

            <div class="section-title">⚖️ Kvalifikace (Trestný čin)</div>
            <div id="selected-laws" style="background:#000; padding:10px; border:1px solid var(--border); min-height:30px; border-radius:4px; margin-bottom:10px;"></div>
            <input type="text" id="law-search" placeholder="Hledat v zákoníku..." oninput="renderLaws(this.value)">
            <div id="law-list-box" style="max-height:150px; overflow-y:auto; background:#05070a; border:1px solid var(--border);"></div>

            <div class="section-title">📑 Zjištěné skutečnosti</div>
            <textarea id="oduvodneni" rows="5" placeholder="Zde vypište důvody žádosti a zjištěné poznatky z vyšetřování..."></textarea>

            <div class="section-title">📎 Přílohy</div>
            <textarea id="prilohy" rows="2" placeholder="Odkazy na záznamy..."></textarea>

            <button class="btn-gen" onclick="saveOPP()" style="background:var(--success); color:white; border:none; padding:15px; width:100%; font-weight:bold; cursor:pointer; margin-top:20px; border-radius:6px;">🚀 GENEROVAT A ULOŽIT</button>
        </div>
    </div>

    <script>
        let allLawsData = [];
        let savedOPPs = JSON.parse(localStorage.getItem('myOPPs')) || [];

        fetch('laws.json').then(res => res.json()).then(data => {
            allLawsData = data.categories;
            renderLaws();
            renderTable();
        });

        function renderLaws(filter = '') {
            const box = document.getElementById('law-list-box');
            box.innerHTML = '';
            allLawsData.forEach(cat => {
                cat.laws.forEach(law => {
                    law.subs.forEach(sub => {
                        if (`${law.title} ${sub.text}`.toLowerCase().includes(filter.toLowerCase())) {
                            const item = document.createElement('div');
                            item.style.padding = '8px';
                            item.style.cursor = 'pointer';
                            item.style.borderBottom = '1px solid #161b22';
                            item.innerHTML = `<strong>${law.title}</strong> <small>${sub.text}</small>`;
                            item.onclick = () => addLaw(`${law.title} ${sub.label}`);
                            box.appendChild(item);
                        }
                    });
                });
            });
        }

        function addLaw(text) {
            const container = document.getElementById('selected-laws');
            const div = document.createElement('div');
            div.className = 'law-tag';
            div.innerHTML = `<span class="txt">${text}</span> <span onclick="this.parentElement.remove()" style="color:red; cursor:pointer">×</span>`;
            container.appendChild(div);
        }

        function openForm(icon, title, spec, atText) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('form-title').innerText = title;
            document.getElementById('oduvodneni').value = atText;
            document.getElementById('spec-val').value = spec;
        }

        function hideForm() {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('form-container').style.display = 'none';
        }

        function saveOPP() {
            const opp = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                type: document.getElementById('form-title').innerText,
                caseId: document.getElementById('case-id').value,
                officer: document.getElementById('off-name').value,
                bn: document.getElementById('off-bn').value,
                rank: document.getElementById('off-rank').value,
                person: document.getElementById('p-name').value,
                spec: document.getElementById('spec-val').value,
                laws: [...document.querySelectorAll('#selected-laws .txt')].map(el => el.innerText).join(', '),
                text: document.getElementById('oduvodneni').value,
                att: document.getElementById('prilohy').value
            };
            savedOPPs.push(opp);
            localStorage.setItem('myOPPs', JSON.stringify(savedOPPs));
            renderTable();
            hideForm();
        }

        function renderTable() {
            const tbody = document.getElementById('opp-table-body');
            tbody.innerHTML = '';
            savedOPPs.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${o.date}</td><td>${o.type}</td><td>${o.caseId}</td><td>${o.person}</td>
                <td>
                    <button class="btn-table" onclick="viewOPP(${o.id})">Zobrazit</button>
                    <button class="btn-table" style="color:var(--success)" onclick="copyOPP(${o.id})">Kopírovat</button>
                    <button class="btn-table" style="color:red" onclick="deleteOPP(${o.id})">Smazat</button>
                </td>`;
                tbody.appendChild(tr);
            });
        }

        function formatSpis(o) {
            const isDP = o.type.includes("Domovní prohlídka");
            const header = isDP ? "**PODNĚT K VYDÁNÍ SOUHLASU STÁTNÍHO ZÁSTUPCE K PROVEDENÍ PROHLÍDKY DLE § 38 Z.Č. 006-19**" : "**ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19**";
            return `${header}\n\n` +
                `**Vyžadující příslušník:** ${o.officer} [${o.bn}]\n` +
                `**Prostředek:** ${o.type}\n` +
                `**Podezřelá osoba:** ${o.person}\n` +
                `**Trestný čin:** ${o.laws}\n` +
                `**Zařízení:** ${o.type.includes("Telefon") ? o.spec : "N/A"}\n` +
                `**Předmět vydání:** ${o.spec}\n` +
                `**Zjištěné skutečnosti:** ${o.text}\n\n` +
                `S pozdravem,\n\n` +
                `${o.officer}\n` +
                `*San Andreas State Police*\n` +
                `${o.rank}\n\n` +
                `**PŘILOHY:**\n${o.att || "Nebyly doloženy"}`;
        }

        function viewOPP(id) {
            const o = savedOPPs.find(x => x.id === id);
            document.getElementById('modal-text').innerText = formatSpis(o);
            document.getElementById('view-modal').style.display = 'flex';
        }

        function copyOPP(id) {
            const o = savedOPPs.find(x => x.id === id);
            navigator.clipboard.writeText(formatSpis(o));
            alert("Zkopírováno!");
        }

        function deleteOPP(id) {
            savedOPPs = savedOPPs.filter(x => x.id !== id);
            localStorage.setItem('myOPPs', JSON.stringify(savedOPPs));
            renderTable();
        }
    </script>
</body>
</html>
