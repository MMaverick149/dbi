<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Personnel Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; }
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        input, select { background: #0b0e14; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; }
        .btn { padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--success); color: white; }
        .btn-del { background: none; border: 1px solid var(--danger); color: var(--danger); }
        .nav-link { color: var(--accent-blue); text-decoration: none; display: block; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--gold); font-size: 18px;">LSPD ADMIN</h2>
    <p style="font-size: 11px; color: #9ba3af;">Správa divize a oprávnění</p>
    <a href="index.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Zpět do Terminálu</a>
</div>

<div class="main">
    <div class="card">
        <h3>Přidat nového člena</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="add-name" placeholder="Jméno a Příjmení" style="flex: 2;">
            <select id="add-rank" style="flex: 1;">
                <option value="DETECTIVE">Detektiv</option>
                <option value="COMMAND">Vedení</option>
            </select>
            <button class="btn btn-add" onclick="addNewUser()">PŘIDAT</button>
        </div>
    </div>

    <div class="card">
        <h3>Seznam členů divize</h3>
        <table>
            <thead>
                <tr><th>JMÉNO</th><th>VOLAČKA</th><th>POZICE</th><th>AKCE</th></tr>
            </thead>
            <tbody id="user-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('lspd_members')) || [
        { name: "Dorian Hall", callsign: "1D-01", rank: "COMMAND" }
    ];

    function renderMembers() {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = members.map((m, i) => `
            <tr>
                <td><b>${m.name}</b></td>
                <td>${m.callsign || '--'}</td>
                <td>
                    <select onchange="updateRank(${i}, this.value)">
                        <option value="DETECTIVE" ${m.rank === 'DETECTIVE' ? 'selected' : ''}>Detektiv</option>
                        <option value="COMMAND" ${m.rank === 'COMMAND' ? 'selected' : ''}>Vedení</option>
                    </select>
                </td>
                <td><button class="btn btn-del" onclick="deleteMember(${i})">ODSTRANIT</button></td>
            </tr>
        `).join('');
        localStorage.setItem('lspd_members', JSON.stringify(members));
    }

    function addNewUser() {
        const name = document.getElementById('add-name').value;
        const rank = document.getElementById('add-rank').value;
        if(!name) return;
        members.push({ name, rank, callsign: "" });
        document.getElementById('add-name').value = "";
        renderMembers();
    }

    function updateRank(index, newRank) {
        members[index].rank = newRank;
        renderMembers();
    }

    function deleteMember(index) {
        if(confirm("Opravdu odstranit tohoto člena?")) {
            members.splice(index, 1);
            renderMembers();
        }
    }

    renderMembers();
</script>
</body>
</html>
