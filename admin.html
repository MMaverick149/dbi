<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 240px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 6px; }
        .stat-val { font-size: 28px; font-weight: bold; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .history-box { background: #0b0e14; padding: 15px; border-radius: 4px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #9ba3af; line-height: 1.6; }
        .nav-back { color: var(--accent-blue); text-decoration: none; display: block; margin-bottom: 20px; font-size: 13px; }
        .btn-red { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Zpět</a>
    <h3 style="color: var(--gold); font-size: 16px;">COMMAND PANEL</h3>
</div>

<div class="main">
    <div class="stats-grid" id="stats-area">
        <div class="stat-card"><div>CELKEM</div><div class="stat-val" id="s-total">0</div></div>
        <div class="stat-card"><div>AKTIVNÍ</div><div class="stat-val" id="s-active" style="color:var(--gold)">0</div></div>
        <div class="stat-card"><div>HOTOVO</div><div class="stat-val" id="s-done" style="color:var(--success)">0</div></div>
    </div>

    <div class="card">
        <h3>Správa spisů</h3>
        <table>
            <thead><tr><th>ID</th><th>NÁZEV</th><th>AUTOR</th><th>STAV</th><th>AKCE</th></tr></thead>
            <tbody id="admin-table"></tbody>
        </table>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0;">Historie akcí</h3>
            <button class="btn-red" onclick="clearLogs()">Smazat logy</button>
        </div>
        <div id="history-content" class="history-box"></div>
    </div>
</div>

<script>
    function render() {
        const cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
        const logs = JSON.parse(localStorage.getItem('lspd_history')) || [];
        
        // Stats
        document.getElementById('s-total').innerText = cases.length;
        document.getElementById('s-active').innerText = cases.filter(c => c.status !== 'UZAVŘENÝ').length;
        document.getElementById('s-done').innerText = cases.filter(c => c.status === 'UZAVŘENÝ').length;

        // Table
        document.getElementById('admin-table').innerHTML = cases.map((c, i) => `
            <tr>
                <td>${c.id}</td>
                <td>${c.title}</td>
                <td>${c.author}</td>
                <td>${c.status}</td>
                <td>
                    <button class="btn-red" style="background:var(--success)" onclick="updateCase(${i}, 'UZAVŘENÝ')">ZAVŘÍT</button>
                    <button class="btn-red" onclick="updateCase(${i}, 'DELETE')">SMAZAT</button>
                </td>
            </tr>
        `).join('');

        // Logs
        document.getElementById('history-content').innerHTML = logs.map(l => `<div>${l}</div>`).join('');
    }

    function updateCase(i, action) {
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data'));
        let logs = JSON.parse(localStorage.getItem('lspd_history')) || [];
        const user = JSON.parse(localStorage.getItem('lspd_logged_session')).name;
        const time = new Date().toLocaleTimeString();

        if (action === 'DELETE') {
            if(!confirm("Smazat?")) return;
            logs.unshift(`[${time}] ${user} smazal spis ${cases[i].id}`);
            cases.splice(i, 1);
        } else {
            cases[i].status = "UZAVŘENÝ";
            logs.unshift(`[${time}] ${user} uzavřel spis ${cases[i].id}`);
        }

        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        localStorage.setItem('lspd_history', JSON.stringify(logs));
        render();
    }

    function clearLogs() {
        if(confirm("Smazat logy?")) {
            localStorage.setItem('lspd_history', JSON.stringify([]));
            render();
        }
    }

    render();
</script>
</body>
</html>
