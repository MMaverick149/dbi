<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }

        /* STATS BOXES */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-bottom: 3px solid var(--accent-blue); }
        .stat-val { font-size: 30px; font-weight: bold; margin-top: 5px; }
        .stat-label { font-size: 10px; color: #9ba3af; text-transform: uppercase; letter-spacing: 1px; }

        .layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 6px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        input, select { background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-top: 10px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .nav-back { color: var(--accent-blue); text-decoration: none; font-size: 13px; display: block; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Zpět do Terminálu</a>
    <h3 style="color: var(--gold); margin: 0;">COMMAND PANEL</h3>
    <p style="font-size: 11px; color: #9ba3af;">Vedení Detektivní Divize</p>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Evidence Spisů</div>
            <div class="stat-val" id="st-cases">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Aktivní Členové</div>
            <div class="stat-val" id="st-members">0</div>
        </div>
        <div class="stat-card" style="border-color: var(--gold);">
            <div class="stat-label">Probíhající šetření</div>
            <div class="stat-val" id="st-work" style="color: var(--gold);">0</div>
        </div>
        <div class="stat-card" style="border-color: var(--success);">
            <div class="stat-label">Uzavřené případy</div>
            <div class="stat-val" id="st-done" style="color: var(--success);">0</div>
        </div>
    </div>

    <div class="layout">
        <div class="card">
            <h3>Seznam Členů</h3>
            <table>
                <thead>
                    <tr><th>JMÉNO</th><th>VOLAČKA</th><th>HODNOST</th><th>AKCE</th></tr>
                </thead>
                <tbody id="member-table"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>Přidat Detektiva</h3>
            <input type="text" id="m-name" placeholder="Celé jméno (např. Dorian Hall)">
            <input type="text" id="m-call" placeholder="Volačka (např. 1D-01)">
            <select id="m-rank">
                <option value="DETECTIVE">DETECTIVE (Omezený přístup)</option>
                <option value="COMMAND">COMMAND (Administrátor)</option>
            </select>
            <button class="btn-add" onclick="addMember()">AKTIVOVAT PŘÍSTUP</button>
        </div>
    </div>
</div>

<script>
    function render() {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];

        // Výpočet statistik
        document.getElementById('st-cases').innerText = cases.length;
        document.getElementById('st-members').innerText = members.length;
        document.getElementById('st-work').innerText = cases.filter(c => c.status === 'V ŠETŘENÍ' || c.status === 'OTEVŘENÝ').length;
        document.getElementById('st-done').innerText = cases.filter(c => c.status === 'UZAVŘENÝ').length;

        // Tabulka členů
        const tbody = document.getElementById('member-table');
        tbody.innerHTML = members.map((m, i) => `
            <tr>
                <td><b>${m.name}</b></td>
                <td><span style="color:var(--gold)">${m.callsign || '--'}</span></td>
                <td><span style="font-size:10px; background:${m.rank === 'COMMAND' ? 'var(--gold)' : 'var(--accent-blue)'}; color:black; padding:2px 5px; border-radius:3px; font-weight:bold;">${m.rank}</span></td>
                <td>
                    <button onclick="delMember(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function addMember() {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        const name = document.getElementById('m-name').value;
        const call = document.getElementById('m-call').value;
        const rank = document.getElementById('m-rank').value;
        if(!name) return alert("Zadejte jméno!");
        
        members.push({ name, callsign: call, rank });
        localStorage.setItem('lspd_members', JSON.stringify(members));
        location.reload();
    }

    function delMember(i) {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        if(confirm("Odstranit přístup tohoto člena?")) {
            members.splice(i, 1);
            localStorage.setItem('lspd_members', JSON.stringify(members));
            location.reload();
        }
    }

    render();
</script>
</body>
</html>
