<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Management Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-bottom: 3px solid var(--accent-blue); }
        .stat-val { font-size: 32px; font-weight: bold; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .btn-action { padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; margin-right: 5px; }
        .nav-back { color: var(--accent-blue); text-decoration: none; display: block; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="nav-back"><i class="fa-solid fa-chevron-left"></i> Zpět do Terminálu</a>
    <h3 style="color: var(--gold);">COMMAND PANEL</h3>
    <div id="adm-user" style="font-size: 13px; font-weight: bold; margin-top: 20px;">--</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><div style="font-size:10px; color:#9ba3af;">CELKEM SPISŮ</div><div class="stat-val" id="st-total">0</div></div>
        <div class="stat-card"><div style="font-size:10px; color:#9ba3af;">DETEKTIVOVÉ</div><div class="stat-val" id="st-users">0</div></div>
        <div class="stat-card" style="border-color: var(--gold);"><div style="font-size:10px; color:#9ba3af;">V ŠETŘENÍ</div><div class="stat-val" id="st-work" style="color:var(--gold);">0</div></div>
        <div class="stat-card" style="border-color: var(--success);"><div style="font-size:10px; color:#9ba3af;">VYŘEŠENO</div><div class="stat-val" id="st-done" style="color:var(--success);">0</div></div>
    </div>

    <div class="card">
        <h3>Správa Všech Spisů</h3>
        <table>
            <thead><tr><th>ID</th><th>NÁZEV</th><th>AUTOR</th><th>STAV</th><th>AKCE</th></tr></thead>
            <tbody id="admin-case-table"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Historie Systémových Akcí</h3>
        <div id="history-log" style="font-size: 12px; color: #9ba3af; max-height: 200px; overflow-y: auto; line-height: 1.6;"></div>
    </div>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
    let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
    let history = JSON.parse(localStorage.getItem('lspd_history')) || [];
    let logged = JSON.parse(localStorage.getItem('lspd_logged_session'));

    function logAction(msg) {
        const time = new Date().toLocaleString('cs-CZ');
        history.unshift(`[${time}] ${logged.name}: ${msg}`);
        localStorage.setItem('lspd_history', JSON.stringify(history.slice(0, 50)));
        render();
    }

    function render() {
        if(logged) document.getElementById('adm-user').innerText = logged.name;
        
        // Stats
        document.getElementById('st-total').innerText = cases.length;
        document.getElementById('st-users').innerText = members.length;
        document.getElementById('st-work').innerText = cases.filter(c => c.status !== 'UZAVŘENÝ').length;
        document.getElementById('st-done').innerText = cases.filter(c => c.status === 'UZAVŘENÝ').length;

        // Cases Table
        const tbody = document.getElementById('admin-case-table');
        tbody.innerHTML = cases.map((c, i) => `
            <tr>
                <td><b>${c.id}</b></td>
                <td>${c.title}</td>
                <td>${c.author}</td>
                <td><span style="color:${c.status === 'UZAVŘENÝ' ? 'var(--success)' : 'var(--gold)'}">${c.status}</span></td>
                <td>
                    <button class="btn-action" style="background:var(--success); color:black;" onclick="closeCase(${i})">UZAVŘÍT</button>
                    <button class="btn-action" style="background:var(--danger); color:white;" onclick="deleteCase(${i})">SMAZAT</button>
                </td>
            </tr>
        `).join('');

        // History
        document.getElementById('history-log').innerHTML = history.map(h => `<div>${h}</div>`).join('');
    }

    function closeCase(i) {
        cases[i].status = "UZAVŘENÝ";
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        logAction(`Uzavřel spis ${cases[i].id}`);
    }

    function deleteCase(i) {
        if(confirm("Opravdu smazat tento spis nenávratně?")) {
            const id = cases[i].id;
            cases.splice(i, 1);
            localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
            logAction(`Smazal spis ${id}`);
        }
    }

    render();
</script>
</body>
</html>
