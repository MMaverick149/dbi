<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Management Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 32px; font-weight: bold; color: var(--accent-blue); margin-top: 5px; }
        .stat-label { font-size: 11px; color: #9ba3af; text-transform: uppercase; }

        .content-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 6px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        input, select { background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-top: 10px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .nav-back { color: var(--accent-blue); text-decoration: none; display: block; margin-bottom: 30px; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="nav-back"><i class="fa-solid fa-chevron-left"></i> Zpět do Terminálu</a>
    <h3 style="color: var(--gold); margin: 0;">COMMAND</h3>
    <p id="adm-name" style="font-weight: bold; margin-top: 20px;"></p>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Celkem Spisů</div>
            <div class="stat-val" id="st-cases">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Členové Divize</div>
            <div class="stat-val" id="st-members">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">V Šetření</div>
            <div class="stat-val" id="st-invest" style="color: var(--gold);">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Vyřešeno</div>
            <div class="stat-val" id="st-done" style="color: var(--success);">0</div>
        </div>
    </div>

    <div class="content-layout">
        <div class="card">
            <h3>Členové</h3>
            <table>
                <thead><tr><th>JMÉNO</th><th>VOLAČKA</th><th>HODNOST</th><th>AKCE</th></tr></thead>
                <tbody id="member-table"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Přidat člena</h3>
            <input type="text" id="m-name" placeholder="Jméno a Příjmení">
            <input type="text" id="m-call" placeholder="Volačka (1D-01)">
            <select id="m-rank">
                <option value="DETECTIVE">DETECTIVE</option>
                <option value="COMMAND">COMMAND</option>
            </select>
            <button class="btn-add" onclick="addMember()">PŘIDAT</button>
        </div>
    </div>
</div>

<script>
    function render() {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
        let logged = JSON.parse(localStorage.getItem('lspd_logged_session'));

        if(logged) document.getElementById('adm-name').innerText = logged.name;

        // Statistiky
        document.getElementById('st-cases').innerText = cases.length;
        document.getElementById('st-members').innerText = members.length;
        document.getElementById('st-invest').innerText = cases.filter(c => c.status === 'V ŠETŘENÍ').length;
        document.getElementById('st-done').innerText = cases.filter(c => c.status === 'UZAVŘENÝ').length;

        const tbody = document.getElementById('member-table');
        tbody.innerHTML = members.map((m, i) => `
            <tr><td><b>${m.name}</b></td><td>${m.callsign}</td><td>${m.rank}</td>
            <td><button onclick="delMember(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer;"><i class="fa-solid fa-trash"></i></button></td></tr>
        `).join('');
    }

    function addMember() {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        const name = document.getElementById('m-name').value;
        const call = document.getElementById('m-call').value;
        const rank = document.getElementById('m-rank').value;
        if(!name) return;
        members.push({ name, callsign: call, rank });
        localStorage.setItem('lspd_members', JSON.stringify(members));
        location.reload();
    }

    function delMember(i) {
        let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
        members.splice(i, 1);
        localStorage.setItem('lspd_members', JSON.stringify(members));
        location.reload();
    }

    render();
</script>
</body>
</html>
