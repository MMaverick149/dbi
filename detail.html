<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail záznamu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 3px; font-size: 13px; box-sizing: border-box; }
        
        .notes-card { border-top: 2px solid var(--gold); }
        .notes-header { display: flex; align-items: center; gap: 10px; color: var(--gold); margin-bottom: 15px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        
        textarea#case-notes { min-height: 250px; font-family: 'Consolas', monospace; line-height: 1.5; border-color: #3d444d; }
        .sys-record { border: 1px dashed var(--border); color: #9ba3af; font-size: 12px; font-style: italic; min-height: 140px; line-height: 1.4; background: rgba(0,0,0,0.2); margin-bottom: 15px; }
        
        .btn-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; margin-bottom: 30px; }
        .btn { border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-resolve { background: var(--success); color: white; }
        .btn-save { background: var(--accent-blue); color: black; }
        .locked-banner { background: var(--success); color: white; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; display: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="sidebar"><a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 12px;"><i class="fa-solid fa-arrow-left"></i> Zpět do Commandu</a></div>
<div class="main">
    <div id="locked-msg" class="locked-banner"><i class="fa-solid fa-lock"></i> TENTO ZÁZNAM JE UZAVŘEN A NENÍ MOŽNÉ JEJ EDITOVAT</div>
    
    <h2 style="font-weight: 300; margin-bottom: 20px;">Evidence Operativních Prostředků</h2>
    
    <div class="card">
        <div class="grid-3">
            <div><label>Vyšetřující detektiv</label><input type="text" id="det-name" placeholder="Jméno Příjmení"></div>
            <div><label>Hodnost</label>
                <select id="det-rank">
                    <option>DBI Trainee</option>
                    <option>Detective I</option>
                    <option>Detective II</option>
                    <option>Command</option>
                </select>
            </div>
            <div><label>Case ID</label><input type="text" id="case-id" placeholder="#2026-XXXX"></div>
        </div>
        
        <div class="grid-3">
            <div><label>Subjekt (Jméno Příjmení)</label><input type="text" id="sub-name" placeholder="John Doe"></div>
            <div><label>Datum narození</label><input type="text" id="sub-dob" placeholder="DD/MM/YYYY"></div>
            <div><label>MDT ID</label><input type="text" id="mdt-id" placeholder="8xxx"></div>
        </div>

        <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
            <div>
                <label>Právní kvalifikace</label>
                <select id="legal-qual">
                    <option>Vražda (§ 140 TZ)</option>
                    <option>Ublížení na zdraví (§ 146 TZ)</option>
                    <option>Loupež (§ 173 TZ)</option>
                    <option>Krádež (§ 205 TZ)</option>
                    <option>Obchod s drogami</option>
                </select>
            </div>
            <div>
                <label>Typ OPP</label>
                <select id="opp-type">
                    <option>Prověrka majetku a finančních prostředků</option>
                    <option>Sledování osob a věcí</option>
                    <option>Odposlech a záznam telekomunikačního provozu</option>
                    <option>Využití agenta</option>
                </select>
            </div>
        </div>

        <label>Zjištěné skutečnosti (Systémový záznam)</label>
        <textarea class="sys-record" readonly>Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu, při kterém byly nalezeny osoby bez známek života s poraněními odpovídajícími násilnému útoku. V rámci probíhajícího vyšetřování byly zajištěny důkazní materiály a probíhá analýza stop z místa činu.

Za účelem objasnění okolností případu je žádáno o poskytnutí informací o majetku a finančních prostředcích uvedených osob. Tyto informace mohou napomoci k identifikaci možného motivu trestné činnosti, prověření majetkových poměrů obětí a zjištění případných vazeb na další osoby, které by mohly souviset s vyšetřovaným případem.</textarea>

        <label>Doplňující odůvodnění žádosti</label>
        <textarea id="user-note" style="min-height: 80px;" placeholder="Vložte vlastní odůvodnění..."></textarea>
    </div>

    <div class="card notes-card">
        <div class="notes-header">
            <i class="fa-solid fa-clipboard-list"></i>
            Průběžné poznámky a operativní deník
        </div>
        <textarea id="case-notes" placeholder="Sem pište všechny detaily z vyšetřování..."></textarea>
    </div>

    <div class="btn-row" id="action-buttons">
        <button class="btn btn-save" onclick="saveData('OTEVŘENO')"><i class="fa-solid fa-save"></i> ULOŽIT ROZPRACAVANÉ</button>
        <button class="btn btn-resolve" onclick="saveData('VYŘEŠENO')"><i class="fa-solid fa-check-double"></i> UZAVŘÍT A VYŘEŠIT</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const caseIndex = urlParams.get('id');
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];

    if(caseIndex !== null && cases[caseIndex]) {
        let c = cases[caseIndex];
        document.getElementById('det-name').value = c.author || '';
        document.getElementById('case-id').value = c.id || '';
        document.getElementById('sub-name').value = c.subject || '';
        document.getElementById('legal-qual').value = c.legal || 'Vražda (§ 140 TZ)';
        document.getElementById('opp-type').value = c.opp || 'Prověrka majetku a finančních prostředků';
        document.getElementById('case-notes').value = c.notes || '';
        document.getElementById('user-note').value = c.note || '';
        
        if(c.status === 'VYŘEŠENO') {
            document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
            document.getElementById('locked-msg').style.display = 'block';
            document.getElementById('action-buttons').style.display = 'none';
        }
    }

    function saveData(status) {
        let entry = {
            id: document.getElementById('case-id').value || 'TBD',
            author: document.getElementById('det-name').value,
            subject: document.getElementById('sub-name').value,
            legal: document.getElementById('legal-qual').value,
            opp: document.getElementById('opp-type').value,
            notes: document.getElementById('case-notes').value,
            note: document.getElementById('user-note').value,
            status: status
        };
        
        if(caseIndex !== null) cases[caseIndex] = entry; else cases.push(entry);
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
