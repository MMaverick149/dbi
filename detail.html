<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #1c212b; --blue: #4a9eff; --gold: #ffcc00; --border: #2d333b; --success: #2ea043; --danger: #f85149; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 180px; background: #151921; border-right: 1px solid var(--border); padding: 15px; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { color: var(--blue); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #05070a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 3px; box-sizing: border-box; }
        .btn-catalog { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-catalog:hover { background: var(--gold); color: black; }
        .btn-save { background: var(--blue); color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-resolve { background: var(--success); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-left: 10px; }
        #lock-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: 15px solid var(--danger); pointer-events: none; z-index: 9999; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="lock-overlay"></div>
    <div class="sidebar"><a href="index.html" style="color:var(--blue); text-decoration:none;">← ZPĚT</a></div>
    <div class="main">
        <h2 id="page-title" style="color:var(--gold);">Evidence OPP</h2>
        <div class="card">
            <div class="grid">
                <div><label>Detektiv</label><input type="text" id="author"></div>
                <div><label>Case ID</label><input type="text" id="case-id"></div>
                <div><label>Subjekt</label><input type="text" id="subject"></div>
            </div>
            <div class="grid" style="grid-template-columns: 2fr 1fr;">
                <div>
                    <label>Právní kvalifikace</label>
                    <input type="text" id="legal" placeholder="Vyberte v katalogu..." readonly>
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button id="cat-btn" class="btn-catalog" onclick="window.open('trest.html','Katalog','width=1100,height=800')">OTEVŘÍT KATALOG TRESTŮ</button>
                </div>
            </div>
            <label>Zjištěné skutečnosti</label>
            <div style="background:rgba(0,0,0,0.2); padding:15px; font-size:13px; color:#aaa; margin-bottom:15px; border-radius:4px; border:1px dashed #444;">
                Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu...
            </div>
            <label>Doplňující odůvodnění</label>
            <textarea id="note" style="height:60px;"></textarea>
        </div>
        <div class="card" style="border-top: 4px solid var(--gold);">
            <label>Operativní deník / Poznámky</label>
            <textarea id="notes" style="height:250px; font-family: monospace;"></textarea>
        </div>
        <div id="btns">
            <button class="btn-save" onclick="save('OTEVŘENO')">ULOŽIT KONCEPT</button>
            <button class="btn-resolve" onclick="save('VYŘEŠENO')">SCHVÁLIT A UZAVŘÍT</button>
        </div>
    </div>
    <script>
        const DB = 'lspd_v15_data';
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('id');
        let data = JSON.parse(localStorage.getItem(DB)) || [];

        if(cid !== null && data[cid]) {
            let c = data[cid];
            document.getElementById('author').value = c.author;
            document.getElementById('case-id').value = c.id;
            document.getElementById('subject').value = c.subject;
            document.getElementById('legal').value = c.legal;
            document.getElementById('note').value = c.note;
            document.getElementById('notes').value = c.notes;
            if(c.status === 'VYŘEŠENO') {
                document.querySelectorAll('input, textarea, select').forEach(el => el.disabled = true);
                document.getElementById('btns').style.display = 'none';
                document.getElementById('cat-btn').style.display = 'none';
                document.getElementById('lock-overlay').style.display = 'block';
            }
        }

        function save(st) {
            let entry = {
                author: document.getElementById('author').value,
                id: document.getElementById('case-id').value,
                subject: document.getElementById('subject').value,
                legal: document.getElementById('legal').value,
                note: document.getElementById('note').value,
                notes: document.getElementById('notes').value,
                status: st
            };
            if(cid !== null) data[cid] = entry; else data.push(entry);
            localStorage.setItem(DB, JSON.stringify(data));
            window.location.href = 'index.html';
        }

        // Automatické načtení z katalogu
        setInterval(() => {
            const temp = localStorage.getItem('temp_crimes');
            if(temp) { document.getElementById('legal').value = temp; localStorage.removeItem('temp_crimes'); }
        }, 800);
    </script>
</body>
</html>
