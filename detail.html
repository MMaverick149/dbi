<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence Operativních Prostředků</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        h2 { font-size: 22px; font-weight: 300; margin-top: 0; margin-bottom: 20px; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .field-group { display: flex; flex-direction: column; gap: 5px; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        input, select, textarea { background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 3px; font-size: 13px; outline: none; }
        textarea { resize: vertical; min-height: 100px; font-family: 'Segoe UI', sans-serif; }
        
        .sys-record { background: transparent; border: 1px dashed var(--border); color: #9ba3af; font-size: 12px; font-style: italic; }
        
        .btn-approve { background: var(--accent-blue); color: black; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .btn-approve:hover { filter: brightness(1.1); }

        /* Wanted Alert */
        .wanted-alert { position:fixed; inset:0; background:rgba(139,0,0,0.98); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alertBox" class="wanted-alert">
    <i class="fa-solid fa-triangle-exclamation" style="font-size:100px; animation: pulse-red 1s infinite;"></i>
    <h1 style="font-size:60px; margin: 20px 0;">HLEDANÁ OSOBA!</h1>
    <h2 id="alertName" style="font-size:50px; text-decoration: underline; color: var(--gold); margin: 0;">--</h2>
    <p id="alertStatus" style="font-size:24px; margin-top: 10px;">--</p>
    <button onclick="document.getElementById('alertBox').style.display='none'" style="margin-top:40px; padding:15px 50px; background:white; color:black; border:none; font-weight:bold; cursor:pointer; border-radius:4px;">ZAVŘÍT VAROVÁNÍ</button>
</div>

<div class="sidebar">
    <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 11px;"><i class="fa-solid fa-arrow-left"></i> ZPĚT</a>
    <div style="flex-grow: 1;"></div>
    <button onclick="logout()" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:10px; border-radius:4px; cursor:pointer; font-size:11px;">ODHLÁSIT</button>
</div>

<div class="main">
    <h2>Evidence Operativních Prostředků</h2>
    
    <div class="card">
        <div class="grid-3">
            <div class="field-group">
                <label>Vyšetřující detektiv</label>
                <input type="text" id="det-name" placeholder="Jméno Příjmení">
            </div>
            <div class="field-group">
                <label>Hodnost</label>
                <select id="det-rank">
                    <option>DBI Trainee</option>
                    <option>Detective I</option>
                    <option>Detective II</option>
                    <option>Detective III</option>
                </select>
            </div>
            <div class="field-group">
                <label>Case ID</label>
                <input type="text" id="case-id" placeholder="#2026-XXXX">
            </div>
        </div>

        <div class="grid-3">
            <div class="field-group">
                <label>Subjekt (Jméno Příjmení)</label>
                <input type="text" id="sub-name" placeholder="John Doe" onchange="checkWanted(this.value)">
            </div>
            <div class="field-group">
                <label>Datum narození</label>
                <input type="text" id="sub-dob" placeholder="DD/MM/YYYY">
            </div>
            <div class="field-group">
                <label>MDT ID</label>
                <input type="text" id="mdt-id" placeholder="např. 8421">
            </div>
        </div>

        <div class="field-group" style="margin-bottom: 20px;">
            <label>Právní kvalifikace</label>
            <select id="crime-type">
                <option>Vražda (§ 140 TZ)</option>
                <option>Loupež (§ 173 TZ)</option>
                <option>Obchod s drogami</option>
                <option>Organizovaný zločin</option>
            </select>
        </div>

        <div class="field-group" style="margin-bottom: 20px;">
            <label>Typ OPP</label>
            <select id="opp-type">
                <option>Prověrka majetku a finančních prostředků</option>
                <option>Odposlech a záznam telekomunikačního provozu</option>
                <option>Sledování osob a věcí</option>
            </select>
        </div>

        <div class="field-group" style="margin-bottom: 20px;">
            <label>Zjištěné skutečnosti (Systémový záznam)</label>
            <textarea id="sys-note" class="sys-record" readonly>Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu, při kterém byly nalezeny osoby bez známek života s poraněními odpovídajícími násilnému útoku. V rámci probíhajícího vyšetřování byly zajištěny důkazní materiály a probíhá analýza stop z místa činu...</textarea>
        </div>

        <div class="field-group" style="margin-bottom: 25px;">
            <label>Doplňující odůvodnění (Vlastní text)</label>
            <textarea id="user-note" placeholder="Zde uveďte vaše doplňující odůvodnění..."></textarea>
        </div>

        <button class="btn-approve" onclick="archiveCase()">
            <i class="fa-solid fa-user-check"></i> SCHVÁLIT A ARCHIVOVAT
        </button>
    </div>
</div>

<script>
    let loggedUser = JSON.parse(localStorage.getItem('lspd_logged_session'));
    
    function checkWanted(val) {
        if(!val) return;
        let wantedList = JSON.parse(localStorage.getItem('sasp_wanted')) || [];
        let found = wantedList.find(p => p.name.toLowerCase() === val.toLowerCase());
        if(found) {
            document.getElementById('alertName').innerText = found.name;
            document.getElementById('alertStatus').innerText = found.status;
            document.getElementById('alertBox').style.display = 'flex';
        }
    }

    function archiveCase() {
        alert("Dokument byl schválen a archivován v systému.");
        window.location.href = 'index.html';
    }

    function logout() { localStorage.removeItem('lspd_logged_session'); window.location.href = 'login.html'; }

    // Předvyplnění detektiva
    if(loggedUser) {
        document.getElementById('det-name').value = loggedUser.name;
    }
</script>
</body>
</html>
