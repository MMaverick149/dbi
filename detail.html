<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Evidence Operativních Prostředků</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; position: relative; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 3px; font-size: 13px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        
        .sys-record { border: 1px dashed var(--border); color: #9ba3af; font-size: 12px; font-style: italic; }
        .btn-submit { background: var(--accent-blue); color: black; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; float: right; margin-top: 20px; }

        /* ALERT SYSTEM */
        #alert-overlay { position: fixed; inset: 0; background: rgba(139, 0, 0, 0.95); z-index: 1000; display: none; align-items: center; justify-content: center; text-align: center; }
        .pulse-text { color: white; font-size: 50px; font-weight: bold; animation: pulse-red 0.8s infinite; text-transform: uppercase; }
        @keyframes pulse-red { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="alert-overlay">
    <div>
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 80px; color: white; margin-bottom: 20px;"></i>
        <div class="pulse-text">Osoba je hledaná!</div>
        <div id="target-name" style="font-size: 30px; margin: 10px 0; color: var(--gold);"></div>
        <button onclick="document.getElementById('alert-overlay').style.display='none'" style="margin-top:30px; padding:10px 30px; cursor:pointer;">Zavřít</button>
    </div>
</div>

<div class="sidebar">
    <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 12px;"><i class="fa-solid fa-arrow-left"></i> Zpět</a>
</div>

<div class="main">
    <h2 style="font-weight: 300; margin-bottom: 25px;">Evidence Operativních Prostředků</h2>
    
    <div class="card">
        <div class="grid-3">
            <div><label>Vyšetřující detektiv</label><input type="text" id="det-name"></div>
            <div><label>Hodnost</label><select id="det-rank"><option>DBI Trainee</option><option>Detective</option></select></div>
            <div><label>Case ID</label><input type="text" id="case-id" placeholder="#2026-XXXX"></div>
        </div>

        <div class="grid-3">
            <div><label>Subjekt (Jméno Příjmení)</label><input type="text" id="sub-name" oninput="checkTarget(this.value)"></div>
            <div><label>Datum narození</label><input type="text" placeholder="DD/MM/YYYY"></div>
            <div><label>MDT ID</label><input type="text" placeholder="např. 8421"></div>
        </div>

        <label>Právní kvalifikace</label>
        <select style="margin-bottom: 20px;"><option>Vražda (§ 140 TZ)</option></select>

        <label>Typ OPP</label>
        <select style="margin-bottom: 20px;"><option>Prověrka majetku a finančních prostředků</option></select>

        <label>Zjištěné skutečnosti (Systémový záznam)</label>
        <textarea class="sys-record" readonly>Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu...</textarea>

        <label style="margin-top: 20px;">Doplňující odůvodnění (Vlastní text)</label>
        <textarea placeholder="Zde uveďte vaše doplňující odůvodnění..."></textarea>

        <button class="btn-submit" onclick="saveAndGo()"><i class="fa-solid fa-user-check"></i> SCHVÁLIT A ARCHIVOVAT</button>
    </div>
</div>

<script>
    // Seznam jmen, která vyvolají alert (můžeš si sem dopsat další)
    const wantedNames = ["John Doe", "Dorian Hall", "Michal"];

    function checkTarget(val) {
        if (wantedNames.some(name => val.toLowerCase().includes(name.toLowerCase()) && val.length > 3)) {
            document.getElementById('target-name').innerText = val;
            document.getElementById('alert-overlay').style.display = 'flex';
        }
    }

    function saveAndGo() {
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
        let logs = JSON.parse(localStorage.getItem('lspd_history')) || [];
        
        const newId = document.getElementById('case-id').value || "DB-" + Date.now().toString().slice(-4);
        cases.push({
            id: newId,
            title: "Operativní prostředek",
            author: document.getElementById('det-name').value || "Detektiv",
            status: "V ŠETŘENÍ"
        });
        
        logs.push(`[${new Date().toLocaleString()}] Vytvořen záznam OPP pro: ${document.getElementById('sub-name').value}`);
        
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        localStorage.setItem('lspd_history', JSON.stringify(logs));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
