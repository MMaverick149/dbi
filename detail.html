<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="breadcrumb"><a href="index.html">PŘEHLED</a> / <span style="color:white">DETAIL PŘÍPADU</span></div>
        <div id="case-num" style="color: var(--gold); font-weight: bold;">#NEW</div>
    </div>

    <div class="container">
        <div class="header-section">
            <h1>Evidence Operativních Prostředků</h1>
            <div id="status-tag" class="status-tag status-open">AKTIVNÍ</div>
        </div>

        <div id="form-content">
            <div class="card">
                <div class="section-title"><i class="fa-solid fa-user-shield"></i> Personální údaje</div>
                <div class="grid-3">
                    <div class="input-group"><label>Detektiv</label><input type="text" id="author"></div>
                    <div class="input-group"><label>Hodnost</label><select id="rank"><option>Detective I</option><option>Detective II</option><option>Command</option></select></div>
                    <div class="input-group"><label>Badge ID</label><input type="text" id="case-id"></div>
                </div>
                <div class="grid-3">
                    <div class="input-group"><label>Subjekt</label><input type="text" id="subject"></div>
                    <div class="input-group"><label>Narození</label><input type="text" id="birth"></div>
                    <div class="input-group"><label>MDT ID</label><input type="text" id="mdt-id"></div>
                </div>

                <label>Právní kvalifikace</label>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="legal" readonly placeholder="Vyberte v katalogu...">
                    <button id="cat-btn" class="btn btn-catalog" onclick="window.open('trest.html', 'PC', 'width=1100,height=800')">KATALOG</button>
                </div>

                <label>Webové oznámení (Popis skutku)</label>
                <textarea id="web-oznameni" class="web-oznameni"></textarea>

                <label>Doplňující odůvodnění (Interní)</label>
                <textarea id="note" style="height: 60px;"></textarea>
            </div>

            <div class="card" style="border-top: 2px solid var(--gold);">
                <div class="section-title"><i class="fa-solid fa-book"></i> Operativní deník</div>
                <textarea id="notes" style="height: 200px;"></textarea>
            </div>
        </div>

        <div class="footer-btns" id="action-area">
            <button class="btn btn-save" onclick="saveData('OTEVŘENO')">Uložit rozpracované</button>
            <button class="btn btn-close" onclick="saveData('VYŘEŠENO')">Schválit a archivovat</button>
        </div>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('id');
        let records = JSON.parse(localStorage.getItem(DB)) || [];

        if(cid !== null && records[cid]) {
            let r = records[cid];
            document.getElementById('author').value = r.author;
            document.getElementById('rank').value = r.rank;
            document.getElementById('case-id').value = r.id;
            document.getElementById('subject').value = r.subject;
            document.getElementById('birth').value = r.birth;
            document.getElementById('mdt-id').value = r.mdt;
            document.getElementById('legal').value = r.legal;
            document.getElementById('web-oznameni').value = r.webOznameni;
            document.getElementById('note').value = r.note;
            document.getElementById('notes').value = r.notes;
            document.getElementById('case-num').innerText = "#" + r.id;

            if(r.status === 'VYŘEŠENO') {
                const tag = document.getElementById('status-tag');
                tag.innerText = "ARCHIVOVÁNO";
                tag.className = "status-tag status-archived";
                document.getElementById('form-content').classList.add('locked-mode');
                document.getElementById('action-area').style.display = 'none';
                document.getElementById('cat-btn').style.display = 'none';
            }
        }

        function saveData(status) {
            let entry = {
                author: document.getElementById('author').value,
                rank: document.getElementById('rank').value,
                id: document.getElementById('case-id').value,
                subject: document.getElementById('subject').value,
                birth: document.getElementById('birth').value,
                mdt: document.getElementById('mdt-id').value,
                legal: document.getElementById('legal').value,
                webOznameni: document.getElementById('web-oznameni').value,
                note: document.getElementById('note').value,
                notes: document.getElementById('notes').value,
                status: status
            };
            if(cid !== null) records[cid] = entry; else records.push(entry);
            localStorage.setItem(DB, JSON.stringify(records));
            window.location.href = 'index.html';
        }
        setInterval(() => {
            const p = localStorage.getItem('temp_crimes');
            if(p) { document.getElementById('legal').value = p; localStorage.removeItem('temp_crimes'); }
        }, 800);
    </script>
</body>
</html>
