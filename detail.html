<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail záznamu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 20px 40px; overflow-y: auto; }
        .container-fluid { width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: #0b0e14; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 3px; font-size: 14px; box-sizing: border-box; }
        .sys-record { border: 1px dashed #444; color: #aaa; font-size: 13px; font-style: italic; min-height: 100px; background: rgba(0,0,0,0.3); padding: 15px; margin-bottom: 20px; }
        .notes-card { border-top: 3px solid var(--gold); }
        textarea#case-notes { min-height: 400px; font-family: 'Consolas', monospace; font-size: 15px; }
        .btn-row { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; margin-bottom: 50px; }
        .btn { border: none; padding: 14px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-resolve { background: var(--success); color: white; }
        .btn-save { background: var(--accent-blue); color: black; }
    </style>
</head>
<body>
<div class="sidebar"><a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 12px;"><i class="fa-solid fa-arrow-left"></i> Zpět do Commandu</a></div>
<div class="main">
    <div class="container-fluid">
        <h2 style="font-weight: 300; margin-bottom: 25px; color: var(--gold);">Evidence Operativních Prostředků</h2>
        
        <div class="card">
            <div class="grid-3">
                <div><label>Vyšetřující detektiv</label><input type="text" id="det-name"></div>
                <div><label>Hodnost</label><select id="det-rank"><option>DBI Trainee</option><option>Detective I</option><option>Detective II</option><option>Command</option></select></div>
                <div><label>Case ID</label><input type="text" id="case-id"></div>
            </div>
            
            <div class="grid-3">
                <div><label>Subjekt</label><input type="text" id="sub-name"></div>
                <div><label>Datum narození</label><input type="text" id="sub-dob"></div>
                <div><label>MDT ID</label><input type="text" id="mdt-id"></div>
            </div>

            <div class="grid-3">
                <div style="grid-column: span 2;">
                    <label>Právní kvalifikace (Trestné činy dle PC SA)</label>
                    <select id="legal-qual">
                        <optgroup label="§6 Zločin v organizaci">
                            <option>§6 a) Zločin v organizaci (15 let - doživotí)</option>
                            <option>§6 b) Zločin v organizaci (§9, §11, §12, §13, §18, §57) (Doživotí)</option>
                        </optgroup>
                        <optgroup label="§7 Ublížení na zdraví">
                            <option>§7 a) Neúmyslně a zbraní (1-5 let)</option>
                            <option>§7 b) Úmyslně a zbraní (1-5 let)</option>
                            <option>§7 c) Úmyslně a střelnou zbraní (3-10 let)</option>
                            <option>§7 d) Úmyslně proti úřední osobě (5-15 let)</option>
                            <option>§7 e) Úmyslně proti IZS (10-20 let)</option>
                        </optgroup>
                        <optgroup label="Trestné činy proti životu">
                            <option>§9 Vražda (Doživotí)</option>
                            <option>§11 Pokus o vraždu (20-30 let)</option>
                            <option>§12 Zabití (15-20 let)</option>
                            <option>§13 Napadení se smrtícím účinkem (10-20 let)</option>
                        </optgroup>
                        <optgroup label="Trestné činy proti svobodě">
                            <option>§14 Únos (10-20 let)</option>
                            <option>§15 Braní rukojmí (15-25 let)</option>
                            <option>§16 Omezování osobní svobody (2-10 let)</option>
                        </optgroup>
                        <optgroup label="Trestné činy proti majetku">
                            <option>§18 Loupežné přepadení (10-20 let)</option>
                            <option>§19 a) Krádež vniknutím (5-15 let)</option>
                            <option>§19 b) Krádež bez vniknutí (2-10 let)</option>
                            <option>§20 a) Vloupání do obydlí (10-20 let)</option>
                            <option>§20 b) Vloupání do objektu (5-15 let)</option>
                            <option>§23 Žhářství (10-20 let)</option>
                        </optgroup>
                        <optgroup label="Vlastizrada a Terorismus">
                            <option>§57 Terorismus (Doživotí)</option>
                            <option>§58 Vlastizrada (Doživotí)</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label>Typ OPP</label>
                    <select id="opp-type">
                        <option>Prověrka majetku a finančních prostředků</option>
                        <option>Sledování osob a věcí</option>
                        <option>Odposlech a záznam</option>
                    </select>
                </div>
            </div>

            <label>Zjištěné skutečnosti (Systémový záznam)</label>
            <textarea class="sys-record" readonly>Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu...</textarea>

            <label>Doplňující odůvodnění žádosti</label>
            <textarea id="user-note" style="min-height: 80px;" placeholder="Vložte vlastní text..."></textarea>
        </div>

        <div class="card notes-card">
            <div class="notes-header"><i class="fa-solid fa-clipboard-list"></i> PRŮBĚŽNÉ POZNÁMKY A OPERATIVNÍ DENÍK</div>
            <textarea id="case-notes" placeholder="Zde pište průběh vyšetřování..."></textarea>
        </div>

        <div class="btn-row">
            <button class="btn btn-save" onclick="saveData('OTEVŘENO')"><i class="fa-solid fa-save"></i> ULOŽIT</button>
            <button class="btn btn-resolve" onclick="saveData('VYŘEŠENO')"><i class="fa-solid fa-check-double"></i> SCHVÁLIT</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const caseIndex = urlParams.get('id');
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];

    if(caseIndex !== null && cases[caseIndex]) {
        let c = cases[caseIndex];
        document.getElementById('det-name').value = c.author || '';
        document.getElementById('case-id').value = c.id || '';
        document.getElementById('sub-name').value = c.subject || '';
        document.getElementById('legal-qual').value = c.legal || '';
        document.getElementById('opp-type').value = c.opp || '';
        document.getElementById('case-notes').value = c.notes || '';
        document.getElementById('user-note').value = c.note || '';
    }

    function saveData(status) {
        let entry = {
            id: document.getElementById('case-id').value || '---',
            author: document.getElementById('det-name').value || 'Michala',
            subject: document.getElementById('sub-name').value || '---',
            legal: document.getElementById('legal-qual').value,
            opp: document.getElementById('opp-type').value,
            notes: document.getElementById('case-notes').value,
            note: document.getElementById('user-note').value,
            status: status
        };
        if(caseIndex !== null) cases[caseIndex] = entry; else cases.push(entry);
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
