<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --card-bg: #151921; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; border-radius: 8px; width: 350px; text-align: center; }
        input { width: 100%; background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 12px; margin-top: 10px; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; background: var(--accent-blue); color: #0b0e14; border: none; padding: 14px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="login-card">
    <i class="fa-solid fa-building-shield" style="font-size: 50px; color: var(--accent-blue);"></i>
    <h2>LSPD LOGIN</h2>
    <input type="text" id="username" placeholder="Jméno a Příjmení">
    <input type="password" id="password" placeholder="Přístupový klíč">
    <div id="err" style="color:var(--danger); font-size:12px; margin-top:10px; display:none;">Chyba přihlášení!</div>
    <button class="btn-login" onclick="handleLogin()">VSTOUPIT</button>
</div>
<script>
    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const members = JSON.parse(localStorage.getItem('lspd_members')) || [{name:"Admin", password:"admin", rank:"COMMAND", callsign:"00"}];
        const found = members.find(m => m.name.toLowerCase() === u.toLowerCase() && m.password === p);
        if(found) {
            localStorage.setItem('lspd_logged_session', JSON.stringify(found));
            window.location.href = 'index.html';
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }
</script>
</body>
</html>
