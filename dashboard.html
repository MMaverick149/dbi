<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.8em; color: #8b949e; text-transform: uppercase; }
        .stat-card .value { font-size: 2.5em; font-weight: bold; color: #58a6ff; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="stats-grid">
        <div class="stat-card"><h3>Zatčení (24h)</h3><div class="value">14</div></div>
        <div class="stat-card"><h3>Aktivní spisy</h3><div class="value">8</div></div>
        <div class="stat-card"><h3>Hledané osoby</h3><div class="value">32</div></div>
    </div>
</body>
</html>
