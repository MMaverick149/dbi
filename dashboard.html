<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP Terminal - Dashboard</title>
    <style>
        :root { --bg: #0d1117; --accent: #2f81f7; --border: #30363d; --text: #c9d1d9; --panel: #161b22; --at-color: #ffa657; --success: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: #010409; border-right: 1px solid var(--border); padding: 25px 15px; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { background: none; border: 1px solid transparent; color: var(--text); padding: 12px 15px; border-radius: 8px; text-align: left; cursor: pointer; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #21262d; }
        .nav-item.active { background: var(--accent); color: white; }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .db-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1100px; margin: 0 auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .panel-h h3 { margin: 0; font-size: 11px; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td { padding: 12px 0; border-bottom: 1px solid #21262d; }
        .notes-area { width: 100%; height: 250px; background: #010409; border: 1px solid var(--border); color: white; padding: 15px; border-radius: 8px; resize: none; box-sizing: border-box; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="color:var(--at-color); font-weight:800; margin-bottom:30px; letter-spacing:2px;">SASP COMMAND</div>
        <a href="dashboard.html" class="nav-item active">🏠 Přehled systému</a>
        <a href="evidence.html" class="nav-item">🛡️ Seznam spisů</a>
        <a href="opp.html" class="nav-item">➕ Nový spis / OPP</a>
        <a href="https://genk.cz/hry/gta5/zakony-fivem/the-penal-code-of-the-state-of-san-andreas-002-19-r17/" target="_blank" class="nav-item">📑 Zákoník</a>
        <div style="margin-top:auto;"><a href="#" onclick="logout()" class="nav-item" style="color:#da3633">🚪 Odhlásit se</a></div>
    </div>

    <div class="main">
        <div class="db-grid">
            <div class="db-col">
                <div class="panel" style="margin-bottom:20px;">
                    <div class="panel-h"><h3>📝 Rychlé poznámky</h3></div>
                    <textarea id="dashNotes" class="notes-area" placeholder="Psát můžete zde..."></textarea>
                </div>
                <div class="panel">
                    <div class="panel-h"><h3>👥 Kolegové z DBI</h3></div>
                    <table>
                        <tbody id="col-list"></tbody>
                    </table>
                </div>
            </div>
            <div class="db-col">
                <div class="panel">
                    <div class="panel-h"><h3>🕵️ Detektivové</h3></div>
                    <div id="active-user"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kontrola, zda je uživatel přihlášen
        const userData = localStorage.getItem('sasp_user');
        if (!userData) {
            window.location.href = 'login.html';
        }

        const user = JSON.parse(userData);

        // Zobrazení dat
        document.getElementById('active-user').innerHTML = `<div style="font-size:13px; padding:10px 0;"><span class="status-dot"></span> [${user.callsign}] ${user.name}</div>`;
        document.getElementById('col-list').innerHTML = `<tr><td>${user.callsign}</td><td>${user.name}</td><td><input type="text" value="${user.phone}" style="background:none; border:1px solid var(--border); color:white; padding:2px 5px;" onchange="savePhone(this.value)"></td></tr>`;

        function savePhone(val) {
            user.phone = val;
            localStorage.setItem('sasp_user', JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem('sasp_user');
            window.location.href = 'login.html';
        }

        // Poznámky
        const notes = document.getElementById('dashNotes');
        notes.value = localStorage.getItem('sasp_dash_notes') || "";
        notes.addEventListener('input', () => {
            localStorage.setItem('sasp_dash_notes', notes.value);
        });
    </script>
</body>
</html>
