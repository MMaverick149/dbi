<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; --yellow: #d29922; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 25px; margin: 0; }
        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card .value { font-size: 2em; font-weight: bold; }
        .table-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75em; color: #8b949e; padding: 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #21262d; font-size: 0.85em; }
        .status { padding: 3px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .status-open { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border: 1px solid var(--yellow); }
        .btn-open { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">
            <span style="color:#8b949e; font-size:0.8em;">OTEVŘENÉ SPISY</span>
            <div class="value" style="color: var(--yellow);">2</div>
        </div>
        <div class="stat-card">
            <span style="color:#8b949e; font-size:0.8em;">VYŘEŠENÉ SPISY</span>
            <div class="value" style="color: var(--green);">3</div>
        </div>
    </div>

    <div class="table-section">
        <h3 style="color:var(--blue); margin:0; font-size:0.9em; text-transform:uppercase;">Aktivní případy</h3>
        <table>
            <thead>
                <tr><th>Case ID</th><th>Subjekt</th><th>Stav</th><th>Akce</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color:var(--yellow);">#re</td>
                    <td>---</td>
                    <td><span class="status status-open">OTEVŘENÝ</span></td>
                    <td><button class="btn-open" onclick="openCase('#re')">Otevřít</button></td>
                </tr>
                <tr>
                    <td style="color:var(--yellow);">#gs</td>
                    <td>---</td>
                    <td><span class="status status-open">OTEVŘENÝ</span></td>
                    <td><button class="btn-open" onclick="openCase('#gs')">Otevřít</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function openCase(id) {
            window.parent.postMessage({ action: 'open_case', caseId: id }, '*');
        }
    </script>
</body>
</html>
