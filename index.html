<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="breadcrumb"><a href="index.html">SASP COMMAND</a> / <span>EVIDENCE PŘÍPADU</span></div>
        <div id="case-num" style="color: var(--gold); font-weight: bold;">#NEW</div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>Evidence Operativních Prostředků</h1>
            <div id="status-tag" class="status-tag status-active">AKTIVNÍ</div>
        </div>

        <div id="form-wrapper">
            <div class="card">
                <label style="margin-bottom: 15px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Personální údaje</label>
                <div class="grid-3">
                    <div class="input-group"><label>Detektiv</label><input type="text" id="author"></div>
                    <div class="input-group">
                        <label>Hodnost</label>
                        <select id="rank">
                            <option>Detective I</option><option>Detective II</option><option>Detective III</option><option>Command Staff</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Case ID / Badge</label><input type="text" id="case-id"></div>
                </div>

                <label style="margin-bottom: 15px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Identifikace subjektu</label>
                <div class="grid-3">
                    <div class="input-group"><label>Jméno a Příjmení</label><input type="text" id="subject"></div>
                    <div class="input-group"><label>Datum narození</label><input type="text" id="birth"></div>
                    <div class="input-group"><label>MDT ID</label><input type="text" id="mdt-id"></div>
                </div>

                <div class="input-group">
                    <label>Právní kvalifikace</label>
                    <textarea id="legal" readonly style="height: 60px; margin-bottom: 10px;"></textarea>
                    <button id="cat-btn" class="btn btn-catalog" onclick="window.open('tresty.html', 'PC', 'width=1100,height=800')">OTEVŘÍT KATALOG</button>
                </div>
            </div>

            <div class="card">
                <label>Webové oznámení (Popis skutku)</label>
                <textarea id="web-oznameni" class="web-oznameni" placeholder="Zde vypište oficiální hlášení..."></textarea>
            </div>

            <div class="card" style="border-top: 2px solid var(--gold);">
                <label style="color: var(--gold);">Operativní deník (Interní poznámky)</label>
                <textarea id="notes" style="height: 200px; margin-top: 10px;" placeholder="Chronologický zápis vyšetřování..."></textarea>
            </div>
        </div>

        <div class="footer-btns" id="action-area">
            <button class="btn btn-save" onclick="saveData('OTEVŘENO')">Uložit rozpracované</button>
            <button class="btn btn-close" onclick="saveData('VYŘEŠENO')">Archivovat a uzavřít</button>
        </div>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('id');
        let records = JSON.parse(localStorage.getItem(DB)) || [];

        if(cid !== null && records[cid]) {
            let r = records[cid];
            document.getElementById('author').value = r.author || '';
            document.getElementById('rank').value = r.rank || 'Detective I';
            document.getElementById('case-id').value = r.id || '';
            document.getElementById('subject').value = r.subject || '';
            document.getElementById('birth').value = r.birth || '';
            document.getElementById('mdt-id').value = r.mdt || '';
            document.getElementById('legal').value = r.legal || '';
            document.getElementById('web-oznameni').value = r.webOznameni || '';
            document.getElementById('notes').value = r.notes || '';
            document.getElementById('case-num').innerText = "#" + (r.id || 'NEW');

            if(r.status === 'VYŘEŠENO') {
                const tag = document.getElementById('status-tag');
                tag.innerText = "ARCHIVOVÁNO";
                tag.className = "status-tag status-archived";
                document.getElementById('form-wrapper').classList.add('locked-mode');
                document.getElementById('action-area').style.display = 'none';
                document.getElementById('cat-btn').style.display = 'none';
            }
        }

        function saveData(status) {
            let entry = {
                author: document.getElementById('author').value,
                rank: document.getElementById('rank').value,
                id: document.getElementById('case-id').value,
                subject: document.getElementById('subject').value,
                birth: document.getElementById('birth').value,
                mdt: document.getElementById('mdt-id').value,
                legal: document.getElementById('legal').value,
                webOznameni: document.getElementById('web-oznameni').value,
                notes: document.getElementById('notes').value,
                status: status
            };
            if(cid !== null) records[cid] = entry; else records.push(entry);
            localStorage.setItem(DB, JSON.stringify(records));
            window.location.href = 'index.html';
        }

        setInterval(() => {
            const p = localStorage.getItem('temp_crimes');
            if(p) { document.getElementById('legal').value = p; localStorage.removeItem('temp_crimes'); }
        }, 800);
    </script>
</body>
</html>
