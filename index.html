<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Detective Bureau Case Manager v11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --text-white: #e1e4e8;
            --border: #2d333b;
            --input-bg: #0b0e14;
            --gold: #d4af37;
            --danger: #f85149;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { 
            background: none; border: 1px solid transparent; color: var(--text-gray); 
            padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px;
            display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 13px;
        }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }

        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: var(--card-bg); padding: 25px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .full { grid-column: span 3; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        input, select, textarea { background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-white); padding: 10px; border-radius: 3px; font-size: 13px; outline: none; }
        
        .btn-main { background: var(--accent-blue); color: #0b0e14; padding: 12px 25px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .btn-sec { background: #2d333b; color: white; border: 1px solid var(--border); padding: 8px 15px; border-radius: 3px; cursor: pointer; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .evidence-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .photo-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--input-bg); }
        .photo-card img { width: 100%; height: 100px; object-fit: cover; }
        
        .person-tag { display: inline-block; background: #343942; padding: 5px 10px; border-radius: 20px; font-size: 11px; margin-right: 5px; border: 1px solid var(--border); }
        
        .badge-area { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .badge-icon { font-size: 35px; color: var(--gold); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="badge-area">
        <div class="badge-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <div style="font-weight: bold; letter-spacing: 1px; margin-top: 5px;">DETEKTIVNÍ TERMINÁL</div>
        <div style="font-size: 9px; color: var(--text-gray);">LOS SANTOS POLICE DEPT.</div>
    </div>
    <button class="nav-btn active" onclick="switchTab('cases', this)"><i class="fa-solid fa-folder-open"></i> Správa Spisů</button>
    <button class="nav-btn" onclick="switchTab('opp', this)"><i class="fa-solid fa-file-invoice"></i> OPP Generátor</button>
</div>

<div class="main">
    
    <div id="view-cases" class="view active">
        <h2 style="font-weight: 300;">Vyšetřovací Spis</h2>
        <div class="grid">
            <div class="field"><label>Case ID</label><input type="text" id="case-id" placeholder="#2026-XXX"></div>
            <div class="field"><label>Název případu</label><input type="text" id="case-title"></div>
            <div class="field">
                <label>Status</label>
                <select id="case-status">
                    <option value="OTEVŘENÝ">OTEVŘENÝ</option>
                    <option value="V ŠETŘENÍ">V ŠETŘENÍ</option>
                    <option value="UZAVŘENÝ">UZAVŘENÝ (ARCHIV)</option>
                </select>
            </div>
            
            <div class="field full" style="border: 1px solid #2d333b; padding: 15px; border-radius: 4px; background: #151921;">
                <label>Osoby v případu (Podezřelí/Svědci)</label>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="p-name" placeholder="Jméno Příjmení" style="flex:2">
                    <input type="text" id="p-mdt" placeholder="MDT ID" style="flex:1">
                    <button class="btn-sec" onclick="addPersonToCase()"><i class="fa-solid fa-plus"></i> Přidat</button>
                </div>
                <div id="person-list-display" style="margin-top: 10px;"></div>
            </div>

            <div class="field full" style="border: 1px solid #2d333b; padding: 15px; border-radius: 4px; background: #151921;">
                <label>Fotodokumentace (FiveManager Odkazy)</label>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="p-url" placeholder="https://fivemanager.com/..." style="flex:1">
                    <button class="btn-sec" onclick="addPhotoToCase()"><i class="fa-solid fa-camera"></i> Vložit fotku</button>
                </div>
                <div id="photo-list-display" class="evidence-grid"></div>
            </div>

            <div class="field full"><label>Detaily vyšetřování & Důkazy</label><textarea id="case-desc" rows="6"></textarea></div>
            <div class="field full" style="text-align: right;"><button class="btn-main" onclick="saveCaseFile()">Uložit a Archivovat Spis</button></div>
        </div>
        
        <table>
            <thead><tr><th>CASE ID</th><th>NÁZEV</th><th>OSOBY</th><th>STATUS</th><th>AKCE</th></tr></thead>
            <tbody id="case-list-table"></tbody>
        </table>
    </div>

    <div id="view-opp" class="view">
        <h2 style="font-weight: 300;">Žádost o Operativní Prostředek</h2>
        
        <div style="background: #1c212b; padding: 20px; border-radius: 4px; border-bottom: 3px solid var(--accent-blue); margin-bottom: 20px;">
            <label>1. VYBERTE SPIS K PROPOJENÍ</label><br>
            <select id="import-case" style="width: 100%; margin-top: 10px;" onchange="handleCaseImport()">
                <option value="">-- Žádný (Manuální zadání) --</option>
            </select>
        </div>

        <div class="grid">
            <div class="field"><label>Detektiv</label><input type="text" id="opp-off"></div>
            <div class="field"><label>Hodnost</label><input type="text" id="opp-rank"></div>
            <div class="field"><label>Case ID</label><input type="text" id="opp-caseid"></div>
            
            <div class="field">
                <label>Subjekt (Vyberte ze spisu)</label>
                <select id="opp-sub-select"></select>
            </div>
            <div class="field"><label>Datum narození</label><input type="text" id="opp-birth"></div>
            <div class="field"><label>MDT ID</label><input type="text" id="opp-mdt"></div>

            <div class="field full">
                <label>Právní Kvalifikace (Penal Code)</label>
                <select id="opp-crime-select">
                    </select>
            </div>

            <div class="field full"><label>Odůvodnění pro DOJ</label><textarea id="opp-reason" rows="6"></textarea></div>
            <div class="field full" style="text-align: right;"><button class="btn-main" onclick="generateOPP()">Vytvořit Žádost</button></div>
        </div>

        <h3 style="font-weight: 300; margin-top: 40px;">Archiv žádostí</h3>
        <table id="opp-table">
            <thead><tr><th>SPIS</th><th>SUBJEKT</th><th>KVALIFIKACE</th><th>SPRÁVA</th></tr></thead>
            <tbody id="opp-list-table"></tbody>
        </table>
    </div>

</div>

<script>
    // --- DATA & KONSTANTY ---
    let dbCases = JSON.parse(localStorage.getItem('db_cases_v11')) || [];
    let dbOPP = JSON.parse(localStorage.getItem('db_opp_v11')) || [];
    
    let currentCasePersons = [];
    let currentCasePhotos = [];

    const CRIMES = [
        "§10 Zabití", "§11 Pokus o vraždu", "§12 (A) Vražda - Úmyslná", "§12 (B) Vražda - Plánovaná",
        "§13 Obchodování s lidmi", "§14 (A) Omezování svobody (bez přesunu)", "§14 (B) Omezování svobody (Únos)",
        "§14 (C) Omezování svobody (státní zaměstnanec)", "§15 (B) Vyhrožování (úřední osoba)",
        "§17 (B,C) Neoprávněné nakládání s údaji", "§18 (A,B) Zneužití pravomoci", "§23 (D) Pedofilní jednání",
        "§24 Znásilnění", "§25 (B,C,D) Krádež", "§28 (B,C,D) Zpronevěra", "§30 (B,C,D) Podvod",
        "§44 Obecné ohrožení", "§48 Výroba drog", "§52 Dealing a prodej", "§102 Terorismus"
    ];

    // Inicializace Crime Selectů
    const cSelect = document.getElementById('opp-crime-select');
    CRIMES.forEach(c => { let opt = new Option(c, c); cSelect.add(opt); });

    // --- LOGIKA SPISŮ ---
    function addPersonToCase() {
        const name = document.getElementById('p-name').value;
        const mdt = document.getElementById('p-mdt').value;
        if(!name) return;
        currentCasePersons.push({ name, mdt });
        renderCaseHelpers();
        document.getElementById('p-name').value = ""; document.getElementById('p-mdt').value = "";
    }

    function addPhotoToCase() {
        const url = document.getElementById('p-url').value;
        if(!url) return;
        currentCasePhotos.push(url);
        renderCaseHelpers();
        document.getElementById('p-url').value = "";
    }

    function renderCaseHelpers() {
        document.getElementById('person-list-display').innerHTML = currentCasePersons.map(p => `<span class="person-tag">${p.name} (${p.mdt})</span>`).join('');
        document.getElementById('photo-list-display').innerHTML = currentCasePhotos.map(url => `<div class="photo-card"><img src="${url}"></div>`).join('');
    }

    function saveCaseFile() {
        const id = document.getElementById('case-id').value;
        if(!id) return alert("Zadejte Case ID!");

        const caseData = {
            id,
            title: document.getElementById('case-title').value,
            status: document.getElementById('case-status').value,
            desc: document.getElementById('case-desc').value,
            persons: [...currentCasePersons],
            photos: [...currentCasePhotos],
            date: new Date().toLocaleDateString()
        };

        const idx = dbCases.findIndex(c => c.id === id);
        if(idx > -1) dbCases[idx] = caseData; else dbCases.unshift(caseData);

        localStorage.setItem('db_cases_v11', JSON.stringify(dbCases));
        currentCasePersons = []; currentCasePhotos = [];
        renderCaseHelpers();
        refreshAll();
        alert("Spis uložen.");
    }

    // --- LOGIKA OPP ---
    function handleCaseImport() {
        const cid = document.getElementById('import-case').value;
        if(!cid) return;
        const c = dbCases.find(x => x.id === cid);
        
        document.getElementById('opp-caseid').value = c.id;
        document.getElementById('opp-reason').value = `Na základě vyšetřování spisu ${c.title}:\n${c.desc}`;
        
        const subSel = document.getElementById('opp-sub-select');
        subSel.innerHTML = c.persons.map(p => `<option value="${p.name}" data-mdt="${p.mdt}">${p.name} (MDT: ${p.mdt})</option>`).join('');
        
        // Auto-fill MDT prvního člověka
        if(c.persons.length > 0) document.getElementById('opp-mdt').value = c.persons[0].mdt;
    }

    function generateOPP() {
        const data = {
            uid: Date.now(),
            off: document.getElementById('opp-off').value,
            rank: document.getElementById('opp-rank').value,
            cid: document.getElementById('opp-caseid').value,
            sub: document.getElementById('opp-sub-select').value,
            mdt: document.getElementById('opp-mdt').value,
            birth: document.getElementById('opp-birth').value,
            crime: document.getElementById('opp-crime-select').value,
            reason: document.getElementById('opp-reason').value
        };
        dbOPP.unshift(data);
        localStorage.setItem('db_opp_v11', JSON.stringify(dbOPP));
        refreshAll();
        alert("OPP žádost vytvořena.");
    }

    // --- GLOBÁLNÍ FUNKCE ---
    function switchTab(tabId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        btn.classList.add('active');
        refreshAll();
    }

    function refreshAll() {
        // Tabulka spisů
        document.getElementById('case-list-table').innerHTML = dbCases.map(c => `
            <tr>
                <td><b>${c.id}</b></td>
                <td>${c.title}</td>
                <td>${c.persons.length} osob</td>
                <td><span style="color:var(--accent-blue)">${c.status}</span></td>
                <td><button class="btn-sec" onclick="loadCaseToForm('${c.id}')">Otevřít</button></td>
            </tr>
        `).join('');

        // Import do OPP
        document.getElementById('import-case').innerHTML = '<option value="">-- Manuální zadání --</option>' + 
            dbCases.map(c => `<option value="${c.id}">${c.id} - ${c.title}</option>`).join('');

        // Tabulka OPP
        document.getElementById('opp-list-table').innerHTML = dbOPP.map(o => `
            <tr>
                <td>${o.cid}</td>
                <td>${o.sub}</td>
                <td style="font-size:11px">${o.crime}</td>
                <td><button class="btn-sec" style="color:var(--accent-blue)" onclick="copyDOJ(${o.uid})">Discord Copy</button></td>
            </tr>
        `).join('');
    }

    function loadCaseToForm(id) {
        const c = dbCases.find(x => x.id === id);
        document.getElementById('case-id').value = c.id;
        document.getElementById('case-title').value = c.title;
        document.getElementById('case-desc').value = c.desc;
        document.getElementById('case-status').value = c.status;
        currentCasePersons = [...c.persons];
        currentCasePhotos = [...c.photos];
        renderCaseHelpers();
    }

    function copyDOJ(uid) {
        const o = dbOPP.find(x => x.uid === uid);
        const msg = `**LSPD DETECTIVE BUREAU - ŽÁDOST O OPP**\n---\n**CASE ID:** \`${o.cid}\`\n**VYŠETŘOVATEL:** ${o.off} (${o.rank})\n**SUBJEKT:** ${o.sub} (MDT: ${o.mdt}, Nar: ${o.birth})\n**KVALIFIKACE:** ${o.crime}\n\n**ODŮVODNĚNÍ:**\n\`\`\`\n${o.reason}\n\`\`\``;
        navigator.clipboard.writeText(msg);
        alert("Zkopírováno pro Discord DOJ!");
    }

    refreshAll();
</script>

</body>
</html>
