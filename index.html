<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence Overview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        th { text-align: left; padding: 15px; border-bottom: 1px solid var(--border); color: var(--blue); font-size: 11px; text-transform: uppercase; background: var(--sidebar); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; color: #c9d1d9; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .action-link { color: var(--blue); text-decoration: none; font-weight: bold; font-size: 11px; margin-right: 15px; text-transform: uppercase; }
        .action-link:hover { text-decoration: underline; }
        .del-link { color: var(--danger); cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="breadcrumb">SASP COMMAND CENTER</div>
        <a href="detail.html" class="btn btn-save"><i class="fa-solid fa-plus"></i> NOVÝ ZÁZNAM</a>
    </div>

    <div class="container">
        <h1>Evidence Operativních Prostředků</h1>
        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">Case ID</th>
                    <th>Subjekt (Podezřelý)</th>
                    <th>Vyšetřující důstojník</th>
                    <th style="width: 150px;">Stav spisu</th>
                    <th style="width: 200px;">Administrace</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        function render() {
            const data = JSON.parse(localStorage.getItem(DB)) || [];
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            data.forEach((r, i) => {
                const tr = document.createElement('tr');
                const isDone = r.status === 'VYŘEŠENO';
                tr.innerHTML = `
                    <td style="color:var(--gold); font-weight:bold;">#${r.id || '---'}</td>
                    <td style="color:white; font-weight:600;">${r.subject || 'Neznámý'}</td>
                    <td>${r.author || 'Nepřiřazeno'}</td>
                    <td>
                        <span class="status-tag ${isDone ? 'status-archived' : 'status-active'}" style="font-size:9px; padding:4px 10px;">
                            ${isDone ? 'ARCHIVOVÁNO' : 'AKTIVNÍ'}
                        </span>
                    </td>
                    <td>
                        <a href="detail.html?id=${i}" class="action-link">${isDone ? '🔍 Detail' : '✒️ Editovat'}</a>
                        <span class="del-link" onclick="remove(${i})">🗑 Smazat</span>
                    </td>
                `;
                body.appendChild(tr);
            });
        }
        function remove(i) { if(confirm('Opravdu odstranit tento záznam?')) { let d = JSON.parse(localStorage.getItem(DB)); d.splice(i,1); localStorage.setItem(DB, JSON.stringify(d)); render(); } }
        render();
    </script>
</body>
</html>
