<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Detective Bureau Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --text-white: #e1e4e8;
            --border: #2d333b;
            --input-bg: #0b0e14;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .badge-area { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .badge-icon { font-size: 40px; color: var(--gold); margin-bottom: 10px; }

        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
            background: var(--card-bg); padding: 30px; border-radius: 4px; border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 3; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select, textarea {
            background-color: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-white); padding: 12px; border-radius: 3px; outline: none; font-size: 13px;
        }
        textarea { line-height: 1.5; resize: vertical; }

        .btn-group { display: flex; justify-content: flex-end; margin-top: 25px; }
        .btn {
            padding: 12px 30px; border: none; border-radius: 3px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 12px;
        }
        .btn-blue { background: var(--accent-blue); color: #0b0e14; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 30px; border: 1px solid var(--border); }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: #252d38; color: var(--text-white); font-size: 11px; }

        /* MODAL */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .paper { background: #fff; color: #1a1a1a; width: 700px; padding: 60px; position: relative; }
        .paper-header { border-bottom: 3px double #000; margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .det-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #555; }
        .det-value { font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .signature-font { font-family: 'Times New Roman', serif; font-style: italic; font-size: 30px; color: #1a2a6c; margin-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="badge-area">
        <div class="badge-icon"><i class="fa-solid fa-building-shield"></i></div>
        <div style="font-weight: bold; letter-spacing: 2px;">DETECTIVE BUREAU</div>
        <div style="font-size: 10px; color: var(--text-gray);">LOS SANTOS POLICE DEPT.</div>
    </div>
</div>

<div class="main">
    <h2 style="margin-top:0; font-weight: 300;">Evidence Operativních Prostředků</h2>
    
    <div class="grid">
        <div class="field">
            <label>Detektiv</label>
            <input type="text" id="officer" placeholder="Jméno Příjmení">
        </div>
        <div class="field">
            <label>Hodnost</label>
            <input type="text" id="rank" placeholder="např. Detective III">
        </div>
        <div class="field">
            <label>CASE ID</label>
            <input type="text" id="caseid" placeholder="#2026-XXXX">
        </div>
        <div class="field">
            <label>Subjekt šetření</label>
            <input type="text" id="subject" placeholder="Jméno / Firma">
        </div>
        <div class="field">
            <label>Právní kvalifikace</label>
            <select id="crime">
                <option value="Vražda (§ 140 TZ)">Vražda (§ 140 TZ)</option>
                <option value="Organizovaný zločin">Organizovaný zločin</option>
                <option value="Distribuce OPL">Distribuce OPL</option>
                <option value="Hospodářská kriminalita">Hospodářská kriminalita</option>
            </select>
        </div>
        <div class="field">
            <label>Typ OPP</label>
            <select id="type">
                <option value="Prověrka majetku a finančních prostředků">Prověrka majetku a finančních prostředků</option>
                <option value="Odposlech a záznam telekomunikačního provozu">Odposlech a záznam telekomunikačního provozu</option>
                <option value="Sledování osob a věcí">Sledování osob a věcí</option>
                <option value="Domovní prohlídka">Domovní prohlídka</option>
            </select>
        </div>
        <div class="field full">
            <label>Zjištěné skutečnosti</label>
            <textarea id="facts" rows="10">Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu, při kterém byly nalezeny osoby bez známek života s poraněními odpovídajícími násilnému útoku. V rámci probíhajícího vyšetřování byly zajištěny důkazní materiály a probíhá analýza stop z místa činu.

Za účelem objasnění okolností případu je žádáno o poskytnutí informací o majetku a finančních prostředcích uvedených osob. Tyto informace mohou napomoci k identifikaci možného motivu trestné činnosti, prověření majetkových poměrů obětí a zjištění případných vazeb na další osoby, které by mohly souviset s vyšetřovaným případem.</textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-blue" onclick="saveDetectiveCase()"><i class="fa-solid fa-folder-plus"></i> Schválit a Archivovat</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>CASE ID</th>
                <th>SUBJEKT</th>
                <th>DETEKTIV</th>
                <th>MOŽNOSTI</th>
            </tr>
        </thead>
        <tbody id="history-rows"></tbody>
    </table>
</div>

<div id="modal">
    <div class="paper">
        <button style="position:absolute; top:20px; right:20px; border:none; background:none; cursor:pointer;" onclick="document.getElementById('modal').style.display='none'"><i class="fa-solid fa-x"></i></button>
        <div class="paper-header">
            <div style="font-weight: 900; font-size: 20px;">INVESTIGATION REPORT: OPP</div>
            <div style="text-align: right; font-size: 10px;">CONFIDENTIAL DOCUMENT</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <div class="det-label">Detektiv</div>
                <div class="det-value" id="v-off"></div>
                <div class="det-label">Spis</div>
                <div class="det-value" id="v-case"></div>
            </div>
            <div>
                <div class="det-label">Datum</div>
                <div class="det-value" id="v-date"></div>
                <div class="det-label">Subjekt</div>
                <div class="det-value" id="v-sub"></div>
            </div>
        </div>

        <div class="det-label">Zjištěné skutečnosti</div>
        <div id="v-facts" style="font-size: 12px; line-height: 1.6; background: #fafafa; padding: 15px; border: 1px solid #eee;"></div>

        <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
            <div style="text-align: center; border-top: 1px solid #000; width: 220px;">
                <div class="signature-font" id="v-sign"></div>
                <div style="font-size: 10px; font-weight: bold;" id="v-rank"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK_URL = "SEM_VLOZ_TVUJ_WEBHOOK_URL";
    let cases = JSON.parse(localStorage.getItem('lspd_det_v6')) || [];
    updateTable();

    function saveDetectiveCase() {
        const data = {
            id: Date.now(),
            date: new Date().toLocaleString('cs-CZ'),
            officer: document.getElementById('officer').value,
            rank: document.getElementById('rank').value,
            caseid: document.getElementById('caseid').value,
            subject: document.getElementById('subject').value,
            type: document.getElementById('type').value,
            crime: document.getElementById('crime').value,
            facts: document.getElementById('facts').value
        };

        if(!data.officer || !data.caseid) return alert("Musíte vyplnit aspoň jméno a číslo spisu!");

        cases.unshift(data);
        localStorage.setItem('lspd_det_v6', JSON.stringify(cases));
        updateTable();

        if(DISCORD_WEBHOOK_URL !== "SEM_VLOZ_TVUJ_WEBHOOK_URL") {
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: `📁 **Nový detektivní záznam:** Spis ${data.caseid} | Detektiv ${data.officer}` })
            });
        }
        alert("Záznam uložen.");
    }

    function updateTable() {
        document.getElementById('history-rows').innerHTML = cases.map(c => `
            <tr>
                <td style="font-weight:bold; color:var(--accent-blue)">${c.caseid}</td>
                <td>${c.subject}</td>
                <td>${c.officer}</td>
                <td class="action-btns">
                    <button class="btn-sm" onclick="viewCase(${c.id})">Náhled</button>
                    <button class="btn-sm" style="color:#5865F2" onclick="copyForDOJ(${c.id})">DOJ Verze</button>
                    <button class="btn-sm" style="color:#f85149" onclick="generatePDF(${c.id})">PDF</button>
                </td>
            </tr>
        `).join('');
    }

    function viewCase(id) {
        const c = cases.find(x => x.id === id);
        document.getElementById('v-off').innerText = c.officer;
        document.getElementById('v-case').innerText = c.caseid;
        document.getElementById('v-date').innerText = c.date;
        document.getElementById('v-sub').innerText = c.subject;
        document.getElementById('v-facts').innerText = c.facts;
        document.getElementById('v-sign').innerText = c.officer;
        document.getElementById('v-rank').innerText = c.rank;
        document.getElementById('modal').style.display = 'flex';
    }

    function copyForDOJ(id) {
        const c = cases.find(x => x.id === id);
        const text = `**DETECTIVE BUREAU - ŽÁDOST O SCHVÁLENÍ OPP**
---
**CASE ID:** \`${c.caseid}\`
**DETEKTIV:** ${c.officer}
**SUBJEKT:** ${c.subject}

**ZJIŠTĚNÉ SKUTEČNOSTI:**
\`\`\`
${c.facts}
\`\`\`
*Zpracováno v MDT LSPD.*`;
        navigator.clipboard.writeText(text);
        alert("Zkopírováno pro Discord (DOJ).");
    }

    function generatePDF(id) {
        const c = cases.find(x => x.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("LSPD DETECTIVE BUREAU", 105, 20, {align:"center"});
        doc.setFontSize(10);
        doc.text(`SPIS: ${c.caseid}`, 20, 40);
        doc.text(`DATUM: ${c.date}`, 140, 40);
        doc.text(`SUBJEKT: ${c.subject}`, 20, 50);
        doc.text("ZJISTENE SKUTECNOSTI:", 20, 65);
        doc.setFont("helvetica", "normal");
        const splitText = doc.splitTextToSize(c.facts.normalize("NFD").replace(/[\u0300-\u036f]/g, ""), 170);
        doc.text(splitText, 20, 75);
        doc.setFont("times", "italic"); doc.setFontSize(22);
        doc.text(c.officer.normalize("NFD").replace(/[\u0300-\u036f]/g, ""), 140, 250);
        doc.save(`SPIS_${c.caseid}.pdf`);
    }
</script>

</body>
</html>
