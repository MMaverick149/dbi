<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Mobile Data Terminal</title>
    <style>
        /* Základní styl terminálu */
        body {
            background-color: #0a0e14;
            color: #d1d1d1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-transform: uppercase; /* Policejní systémy bývají často verzálkami */
        }

        .mdt-container {
            max-width: 900px;
            margin: auto;
            border: 2px solid #1a2634;
            background-color: #121921;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Horní lišta systému */
        .mdt-header {
            background-color: #1a2634;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2ecc71; /* Zelený akcent pro "Active" status */
        }

        .mdt-header h1 {
            margin: 0;
            font-size: 18px;
            color: #ecf0f1;
            letter-spacing: 2px;
        }

        .status-badge {
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 3px;
        }

        /* Obsahová část */
        .mdt-content {
            padding: 25px;
        }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-block {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            color: #5da2d5;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            background-color: #1b262c;
            border: 1px solid #3282b8;
            color: #bbe1fa;
            padding: 10px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #00b7ff;
            box-shadow: 0 0 5px rgba(0, 183, 255, 0.3);
        }

        .full-width {
            grid-column: span 2;
        }

        /* Tlačítka */
        .btn-execute {
            background-color: #3282b8;
            color: white;
            border: none;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-execute:hover {
            background-color: #0f4c75;
            color: #00b7ff;
        }

        /* Výstupní dokument */
        #spis-output {
            margin-top: 25px;
            background-color: #000;
            border: 1px solid #444;
            padding: 20px;
            color: #00ff00; /* Klasický "hacker/matrix" zelený text pro výpis */
            font-family: 'Courier New', monospace;
            display: none;
            position: relative;
        }

        #spis-output::before {
            content: "CONFIDENTIAL - OFFICIAL USE ONLY";
            position: absolute;
            top: -10px;
            right: 10px;
            background: #c0392b;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
        }
    </style>
</head>
<body>

<div class="mdt-container">
    <div class="mdt-header">
        <h1>POLICE DEPARTMENT | MDT v4.2</h1>
        <span class="status-badge">CONNECTED</span>
    </div>

    <div class="mdt-content">
        <div class="form-section">
            <div class="input-block">
                <label>Vyžadující jednotka/příslušník</label>
                <input type="text" id="officer" placeholder="Zadejte jméno...">
            </div>
            <div class="input-block">
                <label>Identifikace subjektu</label>
                <input type="text" id="subject" placeholder="Jméno, narození, ID...">
            </div>
            <div class="input-block full-width">
                <label>Klasifikace trestného činu</label>
                <select id="crime">
                    <option value="VRAŽDA - § 140 TZ">VRAŽDA - § 140 TZ</option>
                    <option value="LOUPEŽ - § 173 TZ">LOUPEŽ - § 173 TZ</option>
                    <option value="DROGOVÁ TRESTNÁ ČINNOST - § 283 TZ">DROGY - § 283 TZ</option>
                </select>
            </div>
            <div class="input-block full-width">
                <label>Zjištěné skutečnosti (Důvod žádosti)</label>
                <textarea id="facts" rows="5">Na základě prvotního ohledání místa činu...</textarea>
            </div>
        </div>

        <button class="btn-execute" onclick="generateReport()">AUTORIZOVAT A GENEROVAT ŽÁDOST</button>

        <div id="spis-output">
            </div>
    </div>
</div>

<script>
    function generateReport() {
        const officer = document.getElementById('officer').value || "NEUVEDENO";
        const subject = document.getElementById('subject').value || "NEZNÁMÝ";
        const crime = document.getElementById('crime').value;
        const facts = document.getElementById('facts').value;
        const date = new Date().toLocaleString('cs-CZ');

        const report = `
**********************************************************
        MINISTERSTVO VNITRA - ŽÁDOST O UŽITÍ OPP
        PROTOKOL ID: ${Math.floor(Math.random() * 90000) + 10000}
        DATUM: ${date}
**********************************************************

VYŽADUJÍCÍ: ${officer}
SUBJEKT:    ${subject}
ČIN:        ${crime}

PŘEDMĚT:    VÝPIS A PROVĚRKA MAJETKU A FINANČNÍCH PROSTŘEDKŮ
USTANOVENÍ: DLE § 37 Z.Č. 006-19

SOUHRN ZJIŠTĚNÝCH SKUTEČNOSTÍ:
${facts}

POZNÁMKA: Žádáme o výpis z bankovních účtů, evidenci vozidel 
          a nemovitostí za účelem zjištění motivu.

----------------------------------------------------------
VYGENEROVÁNO SYSTÉMEM MDT - KONEC PROTOKOLU
----------------------------------------------------------`;

        const output = document.getElementById('spis-output');
        output.innerText = report;
        output.style.display = 'block';
    }
</script>

</body>
</html>
