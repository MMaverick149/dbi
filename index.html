<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Case Management System v14</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --text-white: #e1e4e8;
            --border: #2d333b;
            --input-bg: #0b0e14;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* NOTIFIKACE */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--sidebar-bg); border-left: 4px solid var(--accent-blue); color: white; padding: 15px 25px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 15px; transform: translateX(120%); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }

        /* MODÁLNÍ OKNO PRO NOVÝ SPIS */
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--sidebar-bg); border: 1px solid var(--border); padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-box h3 { margin-top: 0; color: var(--accent-blue); text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        /* SIDEBAR */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--text-gray); padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 13px; }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }

        /* MAIN CONTENT */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* FULLSCREEN DETAIL */
        #case-detail-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: none; flex-direction: column; }
        .detail-header { padding: 20px 40px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .detail-content { padding: 40px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }

        /* INPUTS & CARDS */
        .section-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        input, select, textarea { background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-white); padding: 12px; border-radius: 4px; font-size: 13px; outline: none; width: 100%; box-sizing: border-box; margin-top: 8px; }
        input:focus { border-color: var(--accent-blue); }
        
        .btn-main { background: var(--accent-blue); color: #0b0e14; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-close { background: var(--danger); color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; }
        
        .tag { background: #343942; padding: 8px 12px; border-radius: 4px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border: 1px solid var(--border); }
        .tag i { cursor: pointer; color: var(--danger); }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .photo-item { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; height: 120px; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-item .del-img { position: absolute; top: 5px; right: 5px; background: rgba(248, 81, 73, 0.8); border: none; color: white; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3>Založit nový spis</h3>
        <label>Číslo Spisu</label>
        <input type="text" id="new-case-id-input" placeholder="#2026-001">
        <label style="margin-top: 15px; display: block;">Název případu</label>
        <input type="text" id="new-case-title-input" placeholder="Operace...">
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button class="btn-main" style="flex:1" onclick="confirmCreateCase()">VYTVOŘIT</button>
            <button class="btn-close" style="flex:1; background:#444" onclick="closeModal()">ZRUŠIT</button>
        </div>
    </div>
</div>

<div class="sidebar">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fa-solid fa-briefcase" style="font-size: 40px; color: var(--gold);"></i>
        <h3 style="margin: 10px 0 0 0; letter-spacing: 2px;">DB TERMINAL</h3>
        <span style="font-size: 10px; color: var(--text-gray);">LOS SANTOS POLICE DEPT.</span>
    </div>
    <button class="nav-btn active" onclick="switchTab('list', this)"><i class="fa-solid fa-folder-open"></i> Evidence</button>
    <button class="nav-btn" onclick="openCreateModal()"><i class="fa-solid fa-plus-circle"></i> Nový Spis</button>
    <button class="nav-btn" onclick="switchTab('opp', this)"><i class="fa-solid fa-stamp"></i> OPP Žádosti</button>
</div>

<div class="main">
    <div id="view-list" class="view active">
        <h2 style="font-weight: 300;">Aktivní vyšetřování</h2>
        <table>
            <thead><tr><th>CASE ID</th><th>NÁZEV</th><th>STAV</th><th>AKCE</th></tr></thead>
            <tbody id="main-case-list"></tbody>
        </table>
    </div>
    <div id="view-opp" class="view">
        <h2 style="font-weight: 300;">OPP Agenda</h2>
    </div>
</div>

<div id="case-detail-overlay">
    <div class="detail-header">
        <div>
            <span id="det-case-id" style="color: var(--accent-blue); font-weight: bold; font-size: 22px;"></span>
            <span id="det-case-title" style="margin-left: 15px; font-weight: 300; font-size: 22px; color: var(--text-gray);"></span>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn-main" style="background: var(--success); color: white;" onclick="saveCurrentCase()">
                <i class="fa-solid fa-save"></i> ULOŽIT SPIS
            </button>
            <button class="btn-close" onclick="closeDetail()">ZAVŘÍT</button>
        </div>
    </div>

    <div class="detail-content">
        <div class="left-col">
            <div class="section-card">
                <label>Vyšetřovací protokol</label>
                <textarea id="det-desc" rows="20" style="resize: none;"></textarea>
            </div>
            <div class="section-card">
                <label>Důkazní fotografie</label>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="det-photo-input" placeholder="URL z FiveManageru..." style="margin-top:0;">
                    <button class="btn-main" onclick="addPhoto()">PŘIDAT</button>
                </div>
                <div id="det-photo-grid" class="photo-grid"></div>
            </div>
        </div>
        <div class="right-col">
            <div class="section-card">
                <label>Stav případu</label>
                <select id="det-status">
                    <option value="OTEVŘENÝ">OTEVŘENÝ</option>
                    <option value="V ŠETŘENÍ">V ŠETŘENÍ</option>
                    <option value="UZAVŘENÝ">UZAVŘENÝ</option>
                </select>
            </div>
            <div class="section-card">
                <label>Podezřelé osoby</label>
                <input type="text" id="det-p-name" placeholder="Jméno">
                <input type="text" id="det-p-mdt" placeholder="MDT ID">
                <button class="btn-main" onclick="addPerson()" style="width:100%; margin-top:10px; background:#2d333b; color:white;">PŘIDAT OSOBU</button>
                <div id="det-person-list" style="margin-top:15px;"></div>
            </div>
            <div class="section-card">
                <label>Vozidla</label>
                <input type="text" id="det-v-plate" placeholder="SPZ">
                <input type="text" id="det-v-model" placeholder="Model">
                <button class="btn-main" onclick="addVehicle()" style="width:100%; margin-top:10px; background:#2d333b; color:white;">PŘIDAT VOZIDLO</button>
                <div id="det-vehicle-list" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v14_cases')) || [];
    let currentCaseId = null;

    function notify(message, icon = 'fa-check') {
        const container = document.getElementById('notification-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 4000);
    }

    // MODAL LOGIC
    function openCreateModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function confirmCreateCase() {
        const id = document.getElementById('new-case-id-input').value;
        const title = document.getElementById('new-case-title-input').value;
        if(!id || !title) return notify("Vyplňte všechna pole!", "fa-exclamation-triangle");

        const newCase = { id, title, status: 'OTEVŘENÝ', desc: '', persons: [], vehicles: [], photos: [] };
        cases.unshift(newCase);
        localStorage.setItem('lspd_v14_cases', JSON.stringify(cases));
        
        document.getElementById('new-case-id-input').value = '';
        document.getElementById('new-case-title-input').value = '';
        closeModal();
        renderList();
        notify(`Spis ${id} založen.`);
        openCase(id);
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        btn.classList.add('active');
        renderList();
    }

    function renderList() {
        document.getElementById('main-case-list').innerHTML = cases.map(c => `
            <tr>
                <td><b style="color:var(--accent-blue)">${c.id}</b></td>
                <td>${c.title}</td>
                <td>${c.status}</td>
                <td><button class="btn-main" onclick="openCase('${c.id}')">OTEVŘÍT</button></td>
            </tr>
        `).join('');
    }

    function openCase(id) {
        currentCaseId = id;
        const c = cases.find(x => x.id === id);
        document.getElementById('det-case-id').innerText = c.id;
        document.getElementById('det-case-title').innerText = c.title;
        document.getElementById('det-desc').value = c.desc;
        document.getElementById('det-status').value = c.status;
        renderDetails();
        document.getElementById('case-detail-overlay').style.display = 'flex';
    }

    function closeDetail() { document.getElementById('case-detail-overlay').style.display = 'none'; renderList(); }

    function renderDetails() {
        const c = cases.find(x => x.id === currentCaseId);
        document.getElementById('det-person-list').innerHTML = c.persons.map((p, i) => `
            <div class="tag">${p.name} (${p.mdt}) <i class="fa-solid fa-x" onclick="removeEntity('persons', ${i})"></i></div>
        `).join('');
        document.getElementById('det-vehicle-list').innerHTML = c.vehicles.map((v, i) => `
            <div class="tag">${v.plate} - ${v.model} <i class="fa-solid fa-x" onclick="removeEntity('vehicles', ${i})"></i></div>
        `).join('');
        document.getElementById('det-photo-grid').innerHTML = c.photos.map((url, i) => `
            <div class="photo-item"><img src="${url}"><button class="del-img" onclick="removeEntity('photos', ${i})">×</button></div>
        `).join('');
    }

    function addPerson() {
        const name = document.getElementById('det-p-name').value;
        const mdt = document.getElementById('det-p-mdt').value;
        if(!name) return;
        cases.find(x => x.id === currentCaseId).persons.push({name, mdt});
        document.getElementById('det-p-name').value = ''; document.getElementById('det-p-mdt').value = '';
        renderDetails();
    }

    function addVehicle() {
        const plate = document.getElementById('det-v-plate').value;
        const model = document.getElementById('det-v-model').value;
        if(!plate) return;
        cases.find(x => x.id === currentCaseId).vehicles.push({plate, model});
        document.getElementById('det-v-plate').value = ''; document.getElementById('det-v-model').value = '';
        renderDetails();
    }

    function addPhoto() {
        const url = document.getElementById('det-photo-input').value;
        if(!url) return;
        cases.find(x => x.id === currentCaseId).photos.push(url);
        document.getElementById('det-photo-input').value = '';
        renderDetails();
    }

    function removeEntity(type, index) {
        cases.find(x => x.id === currentCaseId)[type].splice(index, 1);
        renderDetails();
    }

    function saveCurrentCase() {
        const c = cases.find(x => x.id === currentCaseId);
        c.desc = document.getElementById('det-desc').value;
        c.status = document.getElementById('det-status').value;
        localStorage.setItem('lspd_v14_cases', JSON.stringify(cases));
        notify(`Spis ${c.id} uložen.`, 'fa-floppy-disk');
    }

    renderList();
</script>
</body>
</html>
