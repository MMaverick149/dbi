<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence</title>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 220px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; }
        .nav-item { width: 100%; padding: 10px; margin-bottom: 5px; background: #21262d; border: 1px solid var(--border); color: #8b949e; border-radius: 6px; cursor: pointer; text-align: left; }
        .nav-item:hover { background: #30363d; color: #fff; }
        .main { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .right-panel { width: 350px; background: var(--side); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; }
        textarea { flex-grow: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; resize: none; font-family: monospace; font-size: 11px; }
        .btn-copy { background: #238636; color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:#ffa657; font-size: 14px;">SASP COMMAND</h2>
    <button class="nav-item" onclick="document.getElementById('f').src='dashboard.html'">Přehled systému</button>
    <button class="nav-item" onclick="document.getElementById('f').src='evidence.html'">Evidence OPP</button>
    <button class="nav-item" onclick="document.getElementById('f').src='tresty.html'">Trestní zákoník</button>
</div>

<div class="main">
    <iframe id="f" src="evidence.html"></iframe>
</div>

<div class="right-panel">
    <h3 style="color:var(--accent); font-size: 13px;">GENERÁTOR SPISU</h3>
    <textarea id="report-area" placeholder="Zde se objeví vygenerovaná žádost..."></textarea>
    <button class="btn-copy" onclick="copyText()">KOPÍROVAT DO SCHRÁNKY</button>
</div>

<script>
    window.addEventListener('message', function(e) {
        if (typeof e.data === 'string') {
            document.getElementById('report-area').value = e.data;
        }
    });

    function copyText() {
        const area = document.getElementById('report-area');
        area.select();
        document.execCommand('copy');
        alert("Zkopírováno!");
    }
</script>

</body>
</html>
