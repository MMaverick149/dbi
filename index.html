<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Case Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #e1e4e8; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* FIX SIDEBARU - Pevná šířka, žádné přetékání */
        .sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; box-sizing: border-box; }
        
        .user-card { background: #0b0e14; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--border); }
        .role-badge { font-size: 10px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-top: 5px; display: inline-block; text-transform: uppercase; }

        .nav-group { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--text-gray); padding: 12px; text-align: left; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 13px; text-decoration: none; transition: 0.2s; }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }

        /* ADMINISTRACE DESIGN */
        .admin-link { color: var(--gold) !important; border: 1px solid rgba(212, 175, 55, 0.3) !important; margin-top: 10px; font-weight: bold; }
        .admin-link:hover { background: rgba(212, 175, 55, 0.1) !important; }

        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="user-card">
        <div id="u-name" style="font-weight: bold; font-size: 15px;">Načítání...</div>
        <div id="u-call" style="color: var(--gold); font-size: 11px;">--</div>
        <div id="u-role" class="role-badge">--</div>
    </div>
    
    <div class="nav-group">
        <button class="nav-btn active"><i class="fa-solid fa-folder"></i> Evidence Spisů</button>
        <button class="nav-btn" onclick="createNewCase()"><i class="fa-solid fa-plus-circle"></i> Nový Spis</button>
        
        <a href="admin.html" id="admin-btn" class="nav-btn admin-link" style="display: none;">
            <i class="fa-solid fa-user-shield"></i> ADMINISTRACE
        </a>
    </div>

    <button class="nav-btn" onclick="logout()" style="color: var(--danger); border-top: 1px solid var(--border); padding-top: 15px; margin-top: 10px;">
        <i class="fa-solid fa-power-off"></i> Odhlásit
    </button>
</div>

<div class="main">
    <h2 style="font-weight: 300; margin-bottom: 25px;">Centrální Databáze Spisů</h2>
    <table>
        <thead>
            <tr><th>STATUS</th><th>ID</th><th>NÁZEV</th><th>AUTOR</th><th>STAV</th></tr>
        </thead>
        <tbody id="case-table-body"></tbody>
    </table>
</div>

<script>
    // Inicializace dat
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
    let loggedUser = JSON.parse(localStorage.getItem('lspd_logged_session')) || { name: "Dorian Hall", rank: "COMMAND", callsign: "1D-01" };

    function init() {
        // Vynucení COMMAND pro Dorian Hall, pokud je v session chyba
        if (loggedUser.name === "Dorian Hall") loggedUser.rank = "COMMAND";
        
        document.getElementById('u-name').innerText = loggedUser.name;
        document.getElementById('u-call').innerText = loggedUser.callsign || "Bez volačky";
        document.getElementById('u-role').innerText = loggedUser.rank;

        // Zobrazení administrace jen pro vedení
        if (loggedUser.rank === "COMMAND") {
            document.getElementById('admin-btn').style.display = 'flex';
        }
        renderCases();
    }

    function createNewCase() {
        const id = prompt("Zadejte Číslo Spisu (např. #2026-001):");
        if (!id) return;
        const title = prompt("Zadejte Název Případu:");
        if (!title) return;

        cases.unshift({ id, title, author: loggedUser.name, status: "OTEVŘENÝ" });
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        renderCases();
    }

    function renderCases() {
        const tbody = document.getElementById('case-table-body');
        tbody.innerHTML = cases.map(c => `
            <tr>
                <td><i class="fa-solid fa-file-invoice" style="color:var(--accent-blue)"></i></td>
                <td><b>${c.id}</b></td>
                <td>${c.title}</td>
                <td>${c.author}</td>
                <td><span style="color:${c.status === 'UZAVŘENÝ' ? 'var(--success)' : 'var(--gold)'}">${c.status}</span></td>
            </tr>
        `).join('');
    }

    function logout() { localStorage.removeItem('lspd_logged_session'); location.reload(); }
    init();
</script>
</body>
</html>
