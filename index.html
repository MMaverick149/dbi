<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; }
        .user-card { background: #0b0e14; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--border); cursor: pointer; border-left: 3px solid var(--gold); }
        .role-badge { font-size: 10px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-top: 5px; display: inline-block; }
        .nav-group { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-btn { background: none; border: none; color: #9ba3af; padding: 12px; text-align: left; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 13px; }
        .nav-btn:hover, .nav-btn.active { background: var(--card-bg); color: white; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); }
        th { text-align: left; padding: 15px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--sidebar-bg); padding: 25px; border-radius: 8px; width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>
<div id="newCaseModal" class="modal-overlay">
    <div class="modal">
        <h3 style="color: var(--gold);">Nový vyšetřovací spis SASP</h3>
        <input type="text" id="caseId" placeholder="ID (např. #001)" style="width:100%; padding:10px; margin-bottom:10px; background:#0b0e14; border:1px solid var(--border); color:white;">
        <input type="text" id="caseTitle" placeholder="Název incidentu" style="width:100%; padding:10px; margin-bottom:15px; background:#0b0e14; border:1px solid var(--border); color:white;">
        <button onclick="confirmNewCase()" style="width:100%; padding:12px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; color:black;">VYTVOŘIT SPIS</button>
        <button onclick="closeModal()" style="width:100%; padding:10px; background:none; color:white; border:none; cursor:pointer;">Zrušit</button>
    </div>
</div>
<div class="sidebar">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fa-solid fa-shield-halved" style="font-size: 30px; color: var(--gold);"></i>
        <div style="font-weight: bold; font-size: 12px; margin-top: 5px;">SASP DATABASE</div>
    </div>
    <div class="user-card" onclick="window.location.href='profil.html'">
        <div id="u-name" style="font-weight: bold;">--</div>
        <div id="u-call" style="color: var(--gold); font-size: 11px;">--</div>
        <div id="u-role" class="role-badge">--</div>
    </div>
    <div class="nav-group">
        <a href="index.html" class="nav-btn active"><i class="fa-solid fa-folder-open"></i> Evidence Spisů</a>
        <button class="nav-btn" onclick="openModal()"><i class="fa-solid fa-plus-circle"></i> Nový Spis</button>
        <a href="opp.html" class="nav-btn"><i class="fa-solid fa-file-signature"></i> OPP Generátor</a>
        <a href="admin.html" id="admin-btn" class="nav-btn" style="display: none; color: var(--gold);"><i class="fa-solid fa-user-shield"></i> Administrace</a>
    </div>
    <button class="nav-btn" onclick="logout()" style="color: #f85149;"><i class="fa-solid fa-power-off"></i> Odhlásit</button>
</div>
<div class="main">
    <h2 style="font-weight: 300;">San Andreas State Police - Databáze</h2>
    <table>
        <thead><tr><th>ID SPISU</th><th>NÁZEV</th><th>ZPRACOVATEL</th><th>STAV</th></tr></thead>
        <tbody id="case-table-body"></tbody>
    </table>
</div>
<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
    let loggedUser = JSON.parse(localStorage.getItem('lspd_logged_session'));
    function init() {
        if(!loggedUser) return window.location.href = 'login.html';
        document.getElementById('u-name').innerText = loggedUser.name;
        document.getElementById('u-call').innerText = loggedUser.callsign;
        document.getElementById('u-role').innerText = loggedUser.rank;
        if (loggedUser.rank === "COMMAND") document.getElementById('admin-btn').style.display = 'flex';
        renderCases();
    }
    function openModal() { document.getElementById('newCaseModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('newCaseModal').style.display = 'none'; }
    function confirmNewCase() {
        const id = document.getElementById('caseId').value;
        const title = document.getElementById('caseTitle').value;
        if(!id || !title) return;
        cases.unshift({ id, title, author: loggedUser.name, status: "OTEVŘENÝ", description: "", persons: [], vehicles: [], evidence: [] });
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        location.reload();
    }
    function renderCases() {
        document.getElementById('case-table-body').innerHTML = cases.map((c, i) => `
            <tr onclick="window.location.href='detail.html?id=${i}'" style="cursor:pointer;">
                <td><b>${c.id}</b></td><td>${c.title}</td><td>${c.author}</td>
                <td><span style="color:${c.status === 'UZAVŘENÝ' ? '#2ea043' : 'var(--gold)'}">${c.status}</span></td>
            </tr>`).join('');
    }
    function logout() { localStorage.removeItem('lspd_logged_session'); window.location.href = 'login.html'; }
    init();
</script>
</body>
</html>
