<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Case Management System v12</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --text-white: #e1e4e8;
            --border: #2d333b;
            --input-bg: #0b0e14;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { 
            background: none; border: 1px solid transparent; color: var(--text-gray); 
            padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px;
            display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 13px;
        }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }

        /* MAIN CONTENT */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; position: relative; }
        .view { display: none; }
        .view.active { display: block; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* FULLSCREEN DETAIL OVERLAY */
        #case-detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000; display: none;
            flex-direction: column;
        }
        .detail-header {
            padding: 20px 40px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .detail-content { padding: 40px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }

        /* UI ELEMENTS */
        .section-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        input, select, textarea { background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-white); padding: 10px; border-radius: 3px; font-size: 13px; outline: none; }
        
        .btn-main { background: var(--accent-blue); color: #0b0e14; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-close { background: var(--danger); color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; }
        
        .tag { background: #343942; padding: 5px 12px; border-radius: 4px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border: 1px solid var(--border); }
        .tag i { cursor: pointer; color: var(--danger); }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .photo-item { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .photo-item img { width: 100%; height: 120px; object-fit: cover; }
        .photo-item .del-img { position: absolute; top: 5px; right: 5px; background: rgba(248, 81, 73, 0.8); border: none; color: white; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fa-solid fa-folder-tree" style="font-size: 40px; color: var(--gold);"></i>
        <h3 style="margin: 10px 0 0 0; letter-spacing: 2px;">DB TERMINAL</h3>
        <span style="font-size: 10px; color: var(--text-gray);">LOS SANTOS POLICE DEPT.</span>
    </div>
    <button class="nav-btn active" onclick="switchTab('list', this)"><i class="fa-solid fa-list-ul"></i> Seznam Spisů</button>
    <button class="nav-btn" onclick="createNewCase()"><i class="fa-solid fa-plus"></i> Nový Spis</button>
    <button class="nav-btn" onclick="switchTab('opp', this)"><i class="fa-solid fa-file-contract"></i> OPP Žádosti</button>
</div>

<div class="main">
    <div id="view-list" class="view active">
        <h2 style="font-weight: 300;">Databáze Vyšetřování</h2>
        <table>
            <thead><tr><th>CASE ID</th><th>NÁZEV</th><th>STATUS</th><th>VYŠETŘOVATEL</th><th>AKCE</th></tr></thead>
            <tbody id="main-case-list"></tbody>
        </table>
    </div>

    <div id="view-opp" class="view">
        <h2 style="font-weight: 300;">OPP Agenda</h2>
        <p style="color: var(--text-gray);">Zde se spravují schválené žádosti pro DOJ.</p>
    </div>
</div>

<div id="case-detail-overlay">
    <div class="detail-header">
        <div>
            <span id="det-case-id" style="color: var(--accent-blue); font-weight: bold; font-size: 20px;"></span>
            <span id="det-case-title" style="margin-left: 15px; font-weight: 300; font-size: 20px;"></span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" style="background: var(--success); color: white;" onclick="saveCurrentCase()"><i class="fa-solid fa-floppy-disk"></i> ULOŽIT SPIS</button>
            <button class="btn-close" onclick="closeDetail()"><i class="fa-solid fa-xmark"></i> ZAVŘÍT</button>
        </div>
    </div>

    <div class="detail-content">
        <div class="left-col">
            <div class="section-card">
                <label>Shrnutí případu a důkazní situace</label>
                <textarea id="det-desc" rows="15" style="width: 100%; margin-top: 10px; box-sizing: border-box; resize: vertical;"></textarea>
            </div>
            <div class="section-card">
                <label>Fotodokumentace (Odkazy na FiveManager)</label>
                <div style="display: flex; gap: 10px; margin: 10px 0;">
                    <input type="text" id="det-photo-input" placeholder="Vložte URL obrázku..." style="flex-grow: 1;">
                    <button class="btn-main" onclick="addPhoto()">PŘIDAT</button>
                </div>
                <div id="det-photo-grid" class="photo-grid"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="section-card">
                <label>Status Případu</label>
                <select id="det-status" style="width: 100%; margin-top: 10px;">
                    <option value="OTEVŘENÝ">OTEVŘENÝ</option>
                    <option value="V ŠETŘENÍ">V ŠETŘENÍ</option>
                    <option value="UZAVŘENÝ">UZAVŘENÝ</option>
                </select>
            </div>

            <div class="section-card">
                <label><i class="fa-solid fa-users"></i> Osoby (Podezřelí/Svědci)</label>
                <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                    <input type="text" id="det-p-name" placeholder="Jméno a Příjmení">
                    <input type="text" id="det-p-mdt" placeholder="MDT ID">
                    <button class="btn-sec" onclick="addPerson()" style="margin-bottom: 10px; cursor:pointer;">+ PŘIDAT OSOBU</button>
                </div>
                <div id="det-person-list"></div>
            </div>

            <div class="section-card">
                <label><i class="fa-solid fa-car"></i> Vozidla</label>
                <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                    <input type="text" id="det-v-plate" placeholder="SPZ / RZ">
                    <input type="text" id="det-v-model" placeholder="Model a Barva">
                    <button class="btn-sec" onclick="addVehicle()" style="margin-bottom: 10px; cursor:pointer;">+ PŘIDAT VOZIDLO</button>
                </div>
                <div id="det-vehicle-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v12_cases')) || [];
    let currentCaseId = null;

    // --- NAVIGACE ---
    function switchTab(tabId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        btn.classList.add('active');
        renderList();
    }

    // --- LISTING ---
    function renderList() {
        const tbody = document.getElementById('main-case-list');
        tbody.innerHTML = cases.map(c => `
            <tr>
                <td><b style="color:var(--accent-blue)">${c.id}</b></td>
                <td>${c.title}</td>
                <td><span style="color:var(--accent-blue)">${c.status}</span></td>
                <td>${c.officer || 'Nezadaný'}</td>
                <td><button class="btn-main" onclick="openCase('${c.id}')">OTEVŘÍT SPIS</button></td>
            </tr>
        `).join('');
    }

    // --- CASE LOGIC ---
    function createNewCase() {
        const id = prompt("Zadejte CASE ID (např. #2026-005):");
        const title = prompt("Zadejte název případu:");
        if(!id || !title) return;

        const newCase = {
            id, title, status: 'OTEVŘENÝ', officer: 'Detektiv',
            desc: '', persons: [], vehicles: [], photos: []
        };
        cases.unshift(newCase);
        saveToDB();
        openCase(id);
    }

    function openCase(id) {
        currentCaseId = id;
        const c = cases.find(x => x.id === id);
        
        document.getElementById('det-case-id').innerText = c.id;
        document.getElementById('det-case-title').innerText = c.title;
        document.getElementById('det-desc').value = c.desc;
        document.getElementById('det-status').value = c.status;
        
        renderDetails();
        document.getElementById('case-detail-overlay').style.display = 'flex';
    }

    function closeDetail() {
        document.getElementById('case-detail-overlay').style.display = 'none';
        renderList();
    }

    function renderDetails() {
        const c = cases.find(x => x.id === currentCaseId);
        
        // Osoby
        document.getElementById('det-person-list').innerHTML = c.persons.map((p, i) => `
            <div class="tag">${p.name} (${p.mdt}) <i class="fa-solid fa-trash" onclick="removeEntity('persons', ${i})"></i></div>
        `).join('');

        // Vozidla
        document.getElementById('det-vehicle-list').innerHTML = c.vehicles.map((v, i) => `
            <div class="tag">${v.plate} - ${v.model} <i class="fa-solid fa-trash" onclick="removeEntity('vehicles', ${i})"></i></div>
        `).join('');

        // Fotky
        document.getElementById('det-photo-grid').innerHTML = c.photos.map((url, i) => `
            <div class="photo-item">
                <img src="${url}">
                <button class="del-img" onclick="removeEntity('photos', ${i})">×</button>
            </div>
        `).join('');
    }

    // --- ADD / REMOVE ---
    function addPerson() {
        const name = document.getElementById('det-p-name').value;
        const mdt = document.getElementById('det-p-mdt').value;
        if(!name) return;
        cases.find(x => x.id === currentCaseId).persons.push({name, mdt});
        document.getElementById('det-p-name').value = ''; document.getElementById('det-p-mdt').value = '';
        renderDetails();
    }

    function addVehicle() {
        const plate = document.getElementById('det-v-plate').value;
        const model = document.getElementById('det-v-model').value;
        if(!plate) return;
        cases.find(x => x.id === currentCaseId).vehicles.push({plate, model});
        document.getElementById('det-v-plate').value = ''; document.getElementById('det-v-model').value = '';
        renderDetails();
    }

    function addPhoto() {
        const url = document.getElementById('det-photo-input').value;
        if(!url) return;
        cases.find(x => x.id === currentCaseId).photos.push(url);
        document.getElementById('det-photo-input').value = '';
        renderDetails();
    }

    function removeEntity(type, index) {
        cases.find(x => x.id === currentCaseId)[type].splice(index, 1);
        renderDetails();
    }

    function saveCurrentCase() {
        const c = cases.find(x => x.id === currentCaseId);
        c.desc = document.getElementById('det-desc').value;
        c.status = document.getElementById('det-status').value;
        saveToDB();
        alert("Změny ve spisu byly uloženy do databáze.");
    }

    function saveToDB() {
        localStorage.setItem('lspd_v12_cases', JSON.stringify(cases));
    }

    renderList();
</script>

</body>
</html>
