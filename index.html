<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Detective Bureau Unified Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --text-white: #e1e4e8;
            --border: #2d333b;
            --input-bg: #0b0e14;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { 
            background: none; border: 1px solid transparent; color: var(--text-gray); 
            padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }

        /* Main Content */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: var(--card-bg); padding: 25px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .full { grid-column: span 3; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        input, select, textarea { background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-white); padding: 10px; border-radius: 3px; font-size: 13px; outline: none; }
        
        .btn-main { background: var(--accent-blue); color: #0b0e14; padding: 12px 25px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .badge-area { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .badge-icon { font-size: 35px; color: var(--gold); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="badge-area">
        <div class="badge-icon"><i class="fa-solid fa-folder-tree"></i></div>
        <div style="font-weight: bold; letter-spacing: 1px; margin-top: 5px;">MDT TERMINAL</div>
        <div style="font-size: 9px; color: var(--text-gray);">DETECTIVE BUREAU LSPD</div>
    </div>
    <button class="nav-btn active" onclick="switchTab('cases', this)"><i class="fa-solid fa-box-archive"></i> Databáze Spisů</button>
    <button class="nav-btn" onclick="switchTab('opp', this)"><i class="fa-solid fa-file-signature"></i> Žádost o OPP</button>
</div>

<div class="main">
    
    <div id="view-cases" class="view active">
        <h2 style="font-weight: 300;">Správa Vyšetřovacích Spisů</h2>
        <div class="grid">
            <div class="field"><label>Case ID</label><input type="text" id="case-id" placeholder="#2026-001"></div>
            <div class="field"><label>Název případu</label><input type="text" id="case-title" placeholder="Operace Čistka"></div>
            <div class="field">
                <label>Status</label>
                <select id="case-status">
                    <option value="OTEVŘENÝ">OTEVŘENÝ</option>
                    <option value="V ŠETŘENÍ">V ŠETŘENÍ</option>
                    <option value="UZAVŘENÝ">UZAVŘENÝ</option>
                </select>
            </div>
            <div class="field full"><label>Shrnutí případu / Důkazy</label><textarea id="case-desc" rows="5" placeholder="Zde popište průběh vyšetřování..."></textarea></div>
            <div class="field full" style="text-align: right;"><button class="btn-main" onclick="saveCaseFile()">Založit / Aktualizovat Spis</button></div>
        </div>
        
        <table>
            <thead><tr><th>CASE ID</th><th>NÁZEV</th><th>STATUS</th><th>AKCE</th></tr></thead>
            <tbody id="case-list"></tbody>
        </table>
    </div>

    <div id="view-opp" class="view">
        <h2 style="font-weight: 300;">Generátor Operativních Prostředků (OPP)</h2>
        
        <div style="background: #252d38; padding: 15px; border-radius: 4px; border-left: 4px solid var(--accent-blue); margin-bottom: 20px;">
            <label style="color: var(--accent-blue); font-size: 11px;">IMPORT DATA ZE SPISU (VOLITELNÉ)</label><br>
            <select id="import-case" style="width: 100%; margin-top: 5px;" onchange="importCaseData()">
                <option value="">-- Vyberte existující spis pro automatické vyplnění --</option>
            </select>
        </div>

        <div class="grid">
            <div class="field"><label>Vyšetřovatel</label><input type="text" id="opp-off"></div>
            <div class="field"><label>Hodnost</label><input type="text" id="opp-rank"></div>
            <div class="field"><label>Case ID</label><input type="text" id="opp-id"></div>
            
            <div class="field"><label>Subjekt</label><input type="text" id="opp-sub"></div>
            <div class="field"><label>Datum Narození</label><input type="text" id="opp-birth"></div>
            <div class="field"><label>MDT ID</label><input type="text" id="opp-mdt"></div>

            <div class="field full">
                <label>Právní Kvalifikace</label>
                <select id="opp-crime">
                    <option value="§12 (B) Vražda - Plánovaná">§12 (B) Vražda - Plánovaná</option>
                    <option value="§14 (B) Omezování svobody (Únos)">§14 (B) Omezování svobody (Únos)</option>
                    <option value="§48 Výroba drog">§48 Výroba drog</option>
                    <option value="§102 Terorismus">§102 Terorismus</option>
                    </select>
            </div>

            <div class="field full"><label>Zjištěné skutečnosti (Systémové)</label><textarea id="fixed-facts" readonly rows="4">Na základě prvotního ohledání místa činu a zajištěných stop bylo zjištěno, že došlo k násilné trestné činnosti. Za účelem objasnění okolností případu a identifikace motivu je žádáno o OPP (finanční prověrku / odposlech / sledování) vůči uvedenému subjektu.</textarea></div>
            <div class="field full"><label>Vlastní odůvodnění detektiva</label><textarea id="opp-reason" rows="4"></textarea></div>
            
            <div class="field full" style="text-align: right;"><button class="btn-main" onclick="saveOPP()">Vygenerovat a Archivovat</button></div>
        </div>

        <table>
            <thead><tr><th>CASE ID</th><th>SUBJEKT</th><th>KVALIFIKACE</th><th>AKCE</th></tr></thead>
            <tbody id="opp-list"></tbody>
        </table>
    </div>

</div>

<script>
    // LocalStorage Data
    let dbCases = JSON.parse(localStorage.getItem('lspd_cases_v1')) || [];
    let dbOPP = JSON.parse(localStorage.getItem('lspd_opp_v1')) || [];

    // Přepínání záložek
    function switchTab(tabId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        btn.classList.add('active');
        refreshLists();
    }

    // --- SPISY (CASE FILES) ---
    function saveCaseFile() {
        const id = document.getElementById('case-id').value;
        const title = document.getElementById('case-title').value;
        const desc = document.getElementById('case-desc').value;
        const status = document.getElementById('case-status').value;

        if(!id || !title) return alert("Vyplňte Case ID a Název!");

        const idx = dbCases.findIndex(c => c.id === id);
        const data = { id, title, desc, status, updated: new Date().toLocaleDateString() };

        if(idx > -1) dbCases[idx] = data; else dbCases.unshift(data);
        
        localStorage.setItem('lspd_cases_v1', JSON.stringify(dbCases));
        refreshLists();
        alert("Spis uložen.");
    }

    // --- OPP ---
    function importCaseData() {
        const selId = document.getElementById('import-case').value;
        if(!selId) return;
        const c = dbCases.find(x => x.id === selId);
        if(c) {
            document.getElementById('opp-id').value = c.id;
            document.getElementById('opp-reason').value = `Odůvodnění na základě spisu "${c.title}":\n${c.desc}`;
        }
    }

    function saveOPP() {
        const data = {
            uid: Date.now(),
            off: document.getElementById('opp-off').value,
            rank: document.getElementById('opp-rank').value,
            cid: document.getElementById('opp-id').value,
            sub: document.getElementById('opp-sub').value,
            birth: document.getElementById('opp-birth').value,
            mdt: document.getElementById('opp-mdt').value,
            crime: document.getElementById('opp-crime').value,
            fixed: document.getElementById('fixed-facts').value,
            reason: document.getElementById('opp-reason').value
        };

        dbOPP.unshift(data);
        localStorage.setItem('lspd_opp_v1', JSON.stringify(dbOPP));
        refreshLists();
        alert("OPP záznam archivován.");
    }

    // --- OBECNÉ ---
    function refreshLists() {
        // Seznam spisů
        document.getElementById('case-list').innerHTML = dbCases.map(c => `
            <tr>
                <td><b>${c.id}</b></td>
                <td>${c.title}</td>
                <td><span style="color:${c.status === 'OTEVŘENÝ' ? '#4a9eff' : '#9ba3af'}">${c.status}</span></td>
                <td><button class="nav-btn" style="padding:4px 10px; font-size:10px;" onclick="editCase('${c.id}')">Upravit</button></td>
            </tr>
        `).join('');

        // Dropdown pro import
        const impSel = document.getElementById('import-case');
        impSel.innerHTML = '<option value="">-- Vyberte existující spis --</option>' + 
            dbCases.map(c => `<option value="${c.id}">${c.id} - ${c.title}</option>`).join('');

        // Seznam OPP
        document.getElementById('opp-list').innerHTML = dbOPP.map(o => `
            <tr>
                <td>${o.cid}</td>
                <td>${o.sub}</td>
                <td>${o.crime}</td>
                <td><button class="nav-btn" style="color:var(--accent-blue); border:1px solid" onclick="copyForDiscord(${o.uid})">Discord DOJ</button></td>
            </tr>
        `).join('');
    }

    function editCase(id) {
        const c = dbCases.find(x => x.id === id);
        document.getElementById('case-id').value = c.id;
        document.getElementById('case-title').value = c.title;
        document.getElementById('case-desc').value = c.desc;
        document.getElementById('case-status').value = c.status;
    }

    function copyForDiscord(uid) {
        const o = dbOPP.find(x => x.uid === uid);
        const text = `**LSPD DETECTIVE BUREAU - ŽÁDOST O OPP**\n---\n**CASE ID:** \`${o.cid}\`\n**VYŠETŘOVATEL:** ${o.off} (${o.rank})\n\n**SUBJEKT:** ${o.sub} (Nar: ${o.birth}, MDT: ${o.mdt})\n**KVALIFIKACE:** ${o.crime}\n\n**ODŮVODNĚNÍ:**\n\`\`\`\n${o.reason || o.fixed}\n\`\`\``;
        navigator.clipboard.writeText(text);
        alert("Zkopírováno pro Discord!");
    }

    refreshLists();
</script>

</body>
</html>
