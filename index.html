<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Operativní Terminál</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #1b2129;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --text-white: #c9d1d9;
            --border: #30363d;
            --input-bg: #0d1117;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #21262d;
            border-radius: 6px;
            border-left: 4px solid var(--accent-blue);
            margin-bottom: 20px;
        }

        /* HLAVNÍ OBSAH */
        .main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 2; }

        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* SJEDNOCENÝ STYL INPUTŮ */
        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-white);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        input:focus, select:focus { border-color: var(--accent-blue); }

        /* TLAČÍTKA */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-blue { background: var(--accent-blue); color: #0d1117; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-pdf { background: #f85149; color: white; }

        /* TABULKA HISTORIE */
        .history-box { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        .btn-view { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* MODAL */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
        }
        .modal-body { background: var(--card-bg); width: 700px; padding: 30px; border-radius: 8px; border: 1px solid var(--accent-blue); }
        pre { background: #000; padding: 20px; color: #00ff00; font-family: monospace; white-space: pre-wrap; border-radius: 5px; }

        .webhook-config { margin-top: auto; padding: 15px; background: #21262d; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item">
        <i class="fa-solid fa-shield-halved"></i>
        <span>MDT - EVIDENCE OPP</span>
    </div>
    
    <div class="webhook-config">
        <label>Discord Webhook URL</label>
        <input type="password" id="webhook-url" placeholder="https://discord.com/api/webhooks/1487754214041194596/KPNaj-qDPmVY_6yEsdKvGNri_8AbjS8JS3PBo8GvuKi2R1Qkgtx1iZjYEODUVVYI_Wux">
    </div>
</div>

<div class="main">
    <h2 style="margin-top:0;">Nový protokol žádosti</h2>
    
    <div class="grid">
        <div class="field">
            <label>Vyžadující příslušník</label>
            <input type="text" id="officer" placeholder="např. kpt. Jan Novák">
        </div>
        <div class="field">
            <label>Identifikace subjektu</label>
            <input type="text" id="subject" placeholder="Jméno a ID">
        </div>
        <div class="field">
            <label>Klasifikace případu</label>
            <select id="crime">
                <option value="Vražda (§ 140 TZ)">Vražda (§ 140 TZ)</option>
                <option value="Loupež (§ 173 TZ)">Loupež (§ 173 TZ)</option>
                <option value="Drogy / OPL">Drogy / OPL</option>
                <option value="Hospodářská kriminalita">Hospodářská kriminalita</option>
            </select>
        </div>
        <div class="field">
            <label>Typ OPP</label>
            <select id="type">
                <option value="Prolomení telefonu">Prolomení telefonu</option>
                <option value="Výpis z telekomunikace">Výpis z telekomunikace</option>
                <option value="Prověrka majetku a financí">Prověrka majetku a financí</option>
            </select>
        </div>
        <div class="field full">
            <label>Odůvodnění (Zjištěné skutečnosti)</label>
            <textarea id="facts" rows="5">Na základě ohledání místa činu...</textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-blue" onclick="saveRecord()">Uložit do historie</button>
        <button class="btn btn-discord" onclick="sendDiscord()"><i class="fa-brands fa-discord"></i> Odeslat na Discord</button>
        <button class="btn btn-pdf" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> Stáhnout PDF</button>
    </div>

    <div class="history-box">
        <label>Historie žádostí v systému</label>
        <table>
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Subjekt</th>
                    <th>Příslušník</th>
                    <th>Typ</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="history-rows"></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 id="modal-title">Detail protokolu</h3>
        <pre id="modal-text"></pre>
        <button class="btn btn-blue" onclick="document.getElementById('modal').style.display='none'">Zavřít</button>
    </div>
</div>

<script>
    let historyData = [];

    function saveRecord() {
        const record = {
            id: Date.now(),
            date: new Date().toLocaleString('cs-CZ'),
            officer: document.getElementById('officer').value,
            subject: document.getElementById('subject').value,
            crime: document.getElementById('crime').value,
            type: document.getElementById('type').value,
            facts: document.getElementById('facts').value
        };

        historyData.unshift(record);
        updateTable();
        alert("Záznam uložen do lokální historie.");
    }

    function updateTable() {
        const tbody = document.getElementById('history-rows');
        tbody.innerHTML = historyData.map(r => `
            <tr>
                <td>${r.date}</td>
                <td>${r.subject}</td>
                <td>${r.officer}</td>
                <td>${r.type}</td>
                <td><button class="btn-view" onclick="viewDetail(${r.id})">Detail</button></td>
            </tr>
        `).join('');
    }

    function viewDetail(id) {
        const r = historyData.find(x => x.id === id);
        const text = `PROTOKOL OPP\n\nVYSTAVIL: ${r.officer}\nSUBJEKT: ${r.subject}\nČIN: ${r.crime}\nTYP: ${r.type}\n\nSKUTEČNOSTI:\n${r.facts}`;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal').style.display = 'flex';
    }

    async function sendDiscord() {
        const url = document.getElementById('webhook-url').value;
        if(!url) return alert("Zadej Webhook URL v sidebaru!");

        const data = {
            embeds: [{
                title: "NOVÁ ŽÁDOST O OPP",
                color: 5814783,
                fields: [
                    { name: "Příslušník", value: document.getElementById('officer').value, inline: true },
                    { name: "Subjekt", value: document.getElementById('subject').value, inline: true },
                    { name: "Typ", value: document.getElementById('type').value, inline: true },
                    { name: "Odůvodnění", value: document.getElementById('facts').value }
                ],
                footer: { text: "LSPD - Operativní modul" }
            }]
        };

        await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Odesláno na Discord!");
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const officer = document.getElementById('officer').value;
        const subject = document.getElementById('subject').value;
        const facts = document.getElementById('facts').value;

        // Tady pak přidáme loga, až je pošleš
        doc.setFontSize(22);
        doc.text("ŽÁDOST O UŽITÍ OPP", 105, 20, { align: "center" });
        
        doc.setFontSize(12);
        doc.text(`Příslušník: ${officer}`, 20, 40);
        doc.text(`Subjekt: ${subject}`, 20, 50);
        doc.text(`Datum: ${new Date().toLocaleDateString()}`, 20, 60);
        
        doc.line(20, 65, 190, 65);
        
        doc.text("Odůvodnění:", 20, 75);
        doc.setFontSize(10);
        const splitText = doc.splitTextToSize(facts, 170);
        doc.text(splitText, 20, 85);

        doc.text("__________________________", 130, 150);
        doc.text("Podpis a razítko", 135, 155);

        doc.save(`Zadost_OPP_${subject}.pdf`);
    }
</script>

</body>
</html>
