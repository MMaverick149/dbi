<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detective Bureau</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: #9ba3af; padding: 10px; text-align: left; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 11px; margin-bottom: 5px; }
        .nav-btn:hover { background: var(--card-bg); color: white; }

        .main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; gap: 20px; }
        .content-area { flex-grow: 1; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        
        .side-info { width: 280px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 15px; display: flex; flex-direction: column; height: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); font-size: 12px; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        
        .log-list { overflow-y: auto; font-size: 11px; color: #9ba3af; }
        .log-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-del { color: var(--danger); cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fa-solid fa-magnifying-glass-chart" style="font-size: 24px; color: var(--accent-blue);"></i>
        <div style="font-weight: bold; font-size: 10px; margin-top: 5px; color: var(--gold);">COMMAND PANEL</div>
    </div>
    <button class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-sync"></i> Obnovit</button>
</div>

<div class="main">
    <div class="content-area">
        <div class="stats-grid">
            <div class="stat-card">CELKEM <span id="stat-total" class="stat-val">0</span></div>
            <div class="stat-card">AKTIVNÍ <span id="stat-active" class="stat-val" style="color:var(--gold)">0</span></div>
            <div class="stat-card">HOTOVO <span id="stat-done" class="stat-val" style="color:var(--success)">0</span></div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <h3 style="font-size: 14px; margin-bottom: 15px;">Správa spisů</h3>
            <table>
                <thead><tr><th>ID</th><th>NÁZEV</th><th>AUTOR</th><th>STAV</th><th>AKCE</th></tr></thead>
                <tbody id="case-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="side-info">
        <div class="info-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <label style="font-size: 10px; font-weight: bold; color: var(--accent-blue);">HISTORIE AKCÍ</label>
                <button onclick="clearLogs()" style="background:var(--danger); border:none; color:white; font-size:9px; padding:2px 5px; border-radius:2px; cursor:pointer;">Smazat logy</button>
            </div>
            <div id="log-list" class="log-list"></div>
        </div>
    </div>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
    let logs = JSON.parse(localStorage.getItem('lspd_history')) || [];

    function render() {
        document.getElementById('case-table-body').innerHTML = cases.map((c, i) => `
            <tr>
                <td><b>${c.id}</b></td><td>${c.title}</td><td>${c.author}</td>
                <td style="color:${c.status === 'UZAVŘENÝ' ? 'var(--success)' : 'var(--gold)'}">${c.status}</td>
                <td>
                    <button class="btn-del" onclick="deleteCase(${i})"><i class="fa-solid fa-trash"></i></button>
                    <button style="color:var(--accent-blue); background:none; border:none; cursor:pointer;" onclick="window.location.href='detail.html?id=${i}'"><i class="fa-solid fa-eye"></i></button>
                </td>
            </tr>`).join('');
        
        document.getElementById('log-list').innerHTML = logs.slice(-30).reverse().map(l => `<div class="log-item">${l}</div>`).join('');
        
        document.getElementById('stat-total').innerText = cases.length;
        document.getElementById('stat-active').innerText = cases.filter(c => c.status !== 'UZAVŘENÝ').length;
        document.getElementById('stat-done').innerText = cases.filter(c => c.status === 'UZAVŘENÝ').length;
    }

    function deleteCase(i) {
        if(confirm("Opravdu chcete tento spis trvale smazat?")) {
            logs.push(`[${new Date().toLocaleString()}] Smazán spis: ${cases[i].id}`);
            cases.splice(i, 1);
            save();
            render();
        }
    }

    function clearLogs() { logs = []; save(); render(); }
    function save() { localStorage.setItem('lspd_v15_data', JSON.stringify(cases)); localStorage.setItem('lspd_history', JSON.stringify(logs)); }
    render();
</script>
</body>
</html>
