<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Operativní Terminál OPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #1b2129;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --text-white: #c9d1d9;
            --border: #30363d;
            --input-bg: #0d1117;
            --danger: #f85149;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center; gap: 12px; padding: 12px;
            background: #21262d; border-radius: 6px;
            border-left: 4px solid var(--accent-blue);
        }

        /* MAIN CONTENT */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            background: var(--card-bg); padding: 25px; border-radius: 8px; border: 1px solid var(--border);
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 2; }
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }

        input, select, textarea {
            background-color: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-white); padding: 12px; border-radius: 4px; outline: none; font-size: 13px;
        }

        .btn-group { display: flex; justify-content: flex-end; margin-top: 20px; }
        .btn {
            padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }
        .btn-blue { background: var(--accent-blue); color: #0d1117; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 12px; color: var(--text-gray); border-bottom: 1px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .action-btns { display: flex; gap: 5px; }
        .btn-sm { padding: 6px 10px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-white); font-size: 11px; }
        .btn-view { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-pdf { border-color: var(--danger); color: var(--danger); }

        /* NOVÝ MODÁL - DOKUMENT */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .doc-preview {
            background: #fdfdfd; color: #1a1a1a; width: 650px; padding: 40px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; max-height: 90vh; overflow-y: auto;
        }
        .doc-header { border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .doc-title { font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .doc-section { margin-bottom: 15px; }
        .doc-label { font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .doc-value { font-size: 14px; border-bottom: 1px dotted #ccc; padding-bottom: 2px; }
        .doc-facts { font-size: 13px; line-height: 1.5; background: #f5f5f5; padding: 15px; border-radius: 4px; min-height: 100px; }
        .doc-signature-box { margin-top: 30px; display: flex; justify-content: flex-end; }
        .doc-sign { text-align: center; width: 200px; }
        .mea-culpa-font { font-family: 'Times New Roman', serif; font-style: italic; font-size: 28px; color: #1a2a6c; margin-bottom: -5px; }
        
        .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item">
        <i class="fa-solid fa-file-shield"></i>
        <span>LSPD - EVIDENCE OPP</span>
    </div>
</div>

<div class="main">
    <h2 style="margin-top:0;">Správa žádostí</h2>
    
    <div class="grid">
        <div class="field">
            <label>Vyžadující příslušník</label>
            <input type="text" id="officer" placeholder="např. kpt. Jan Novák">
        </div>
        <div class="field">
            <label>Identifikace subjektu</label>
            <input type="text" id="subject" placeholder="Jméno a ID">
        </div>
        <div class="field">
            <label>Klasifikace případu</label>
            <select id="crime">
                <option value="Vražda (§ 140 TZ)">Vražda (§ 140 TZ)</option>
                <option value="Loupež (§ 173 TZ)">Loupež (§ 173 TZ)</option>
                <option value="Drogy / OPL">Drogy / OPL</option>
                <option value="Hospodářská kriminalita">Hospodářská kriminalita</option>
            </select>
        </div>
        <div class="field">
            <label>Typ OPP (Prostředek)</label>
            <select id="type">
                <option value="Prolomení koncového zařízení">Prolomení koncového zařízení</option>
                <option value="Sledování a odposlech">Sledování a odposlech</option>
                <option value="Výpis bankovního tajemství">Výpis bankovního tajemství</option>
                <option value="Lokalizace polohy subjektu">Lokalizace polohy subjektu</option>
            </select>
        </div>
        <div class="field full">
            <label>Odůvodnění žádosti</label>
            <textarea id="facts" rows="4"></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-blue" onclick="processAndSave()"><i class="fa-solid fa-check"></i> Uložit a Schválit</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>DATUM</th>
                <th>SUBJEKT</th>
                <th>PŘÍSLUŠNÍK</th>
                <th>SPRÁVA</th>
            </tr>
        </thead>
        <tbody id="history-rows"></tbody>
    </table>
</div>

<div id="modal">
    <div class="doc-preview">
        <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">&times;</button>
        <div class="doc-header">
            <div class="doc-title">Protokol žádosti OPP</div>
            <div style="font-size: 10px; text-align: right; color: #666;">
                MDT SYSTEM v4.0<br>STAV: SCHVÁLENO
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="doc-section">
                <div class="doc-label">Příslušník</div>
                <div class="doc-value" id="view-officer"></div>
            </div>
            <div class="doc-section">
                <div class="doc-label">Datum vystavení</div>
                <div class="doc-value" id="view-date"></div>
            </div>
        </div>

        <div class="doc-section">
            <div class="doc-label">Subjekt šetření</div>
            <div class="doc-value" id="view-subject"></div>
        </div>

        <div class="doc-section">
            <div class="doc-label">Druh opatření a Klasifikace</div>
            <div class="doc-value"><span id="view-type" style="font-weight: bold;"></span> | <span id="view-crime"></span></div>
        </div>

        <div class="doc-section">
            <div class="doc-label">Odůvodnění a zjištěné skutečnosti</div>
            <div class="doc-facts" id="view-facts"></div>
        </div>

        <div class="doc-signature-box">
            <div class="doc-sign">
                <div class="mea-culpa-font" id="view-sign"></div>
                <div style="border-top: 1px solid #1a1a1a; font-size: 9px; padding-top: 5px;">
                    Digitální podpis vystavitele
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK_URL = "SEM_VLOZ_TVUJ_WEBHOOK_URL";
    let historyLog = JSON.parse(localStorage.getItem('lspd_history_v4')) || [];
    updateTable();

    async function processAndSave() {
        const officer = document.getElementById('officer').value;
        const subject = document.getElementById('subject').value;
        const type = document.getElementById('type').value;
        const facts = document.getElementById('facts').value;
        const crime = document.getElementById('crime').value;

        if(!officer || !subject || !facts) return alert("Vyplňte všechna pole!");

        const data = {
            id: Date.now(),
            date: new Date().toLocaleString('cs-CZ'),
            officer, subject, type, facts, crime
        };

        historyLog.unshift(data);
        localStorage.setItem('lspd_history_v4', JSON.stringify(historyLog));
        updateTable();

        // Discord Webhook
        if(DISCORD_WEBHOOK_URL !== "SEM_VLOZ_TVUJ_WEBHOOK_URL") {
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ embeds: [{ title: "Nová žádost OPP", fields: [{name: "Subjekt", value: subject}, {name: "Typ", value: type}] }] })
            });
        }
        viewDetail(data.id);
    }

    function updateTable() {
        document.getElementById('history-rows').innerHTML = historyLog.map(r => `
            <tr>
                <td>${r.date}</td>
                <td>${r.subject}</td>
                <td>${r.officer}</td>
                <td class="action-btns">
                    <button class="btn-sm btn-view" onclick="viewDetail(${r.id})"><i class="fa-solid fa-file-lines"></i> Náhled</button>
                    <button class="btn-sm btn-pdf" onclick="generatePDF(${r.id})"><i class="fa-solid fa-download"></i> PDF</button>
                    <button class="btn-sm" style="color:#666" onclick="deleteEntry(${r.id})">Smazat</button>
                </td>
            </tr>
        `).join('');
    }

    function viewDetail(id) {
        const r = historyLog.find(x => x.id === id);
        document.getElementById('view-officer').innerText = r.officer;
        document.getElementById('view-date').innerText = r.date;
        document.getElementById('view-subject').innerText = r.subject;
        document.getElementById('view-type').innerText = r.type;
        document.getElementById('view-crime').innerText = r.crime;
        document.getElementById('view-facts').innerText = r.facts;
        document.getElementById('view-sign').innerText = r.officer;
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteEntry(id) {
        if(confirm("Smazat záznam?")) {
            historyLog = historyLog.filter(x => x.id !== id);
            localStorage.setItem('lspd_history_v4', JSON.stringify(historyLog));
            updateTable();
        }
    }

    function generatePDF(id) {
        const r = historyLog.find(x => x.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("helvetica", "bold");
        doc.text("LSPD - ZADOST O OPP", 105, 20, {align: "center"});
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Subjekt: ${r.subject}`, 20, 40);
        doc.text(`Duvod: ${r.type}`, 20, 50);
        doc.text("________________________________________________", 20, 160);
        doc.setFont("times", "italic");
        doc.setFontSize(20);
        doc.text(r.officer, 140, 155);
        doc.save(`OPP_${r.subject}.pdf`);
    }
</script>

</body>
</html>
