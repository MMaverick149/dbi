<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence Overview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
        th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: var(--blue); font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .action-btn { color: var(--blue); text-decoration: none; font-weight: bold; margin-right: 10px; font-size: 12px; }
        .delete-btn { color: var(--danger); cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="breadcrumb">SASP COMMAND CENTER</div>
        <a href="detail.html" class="btn btn-save"><i class="fa-solid fa-plus"></i> NOVÝ PŘÍPAD</a>
    </div>

    <div class="container">
        <h1>Evidence Operativních Prostředků</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Case ID</th>
                    <th>Subjekt</th>
                    <th>Detektiv</th>
                    <th>Stav</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        function renderTable() {
            const records = JSON.parse(localStorage.getItem(DB)) || [];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            records.forEach((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--gold); font-weight:bold;">${r.id || 'N/A'}</td>
                    <td>${r.subject || 'Neznámý'}</td>
                    <td>${r.author || '---'}</td>
                    <td>
                        <span class="status-tag ${r.status === 'VYŘEŠENO' ? 'status-archived' : 'status-active'}" style="font-size:10px; padding:4px 10px;">
                            ${r.status === 'VYŘEŠENO' ? 'ARCHIVOVÁNO' : 'AKTIVNÍ'}
                        </span>
                    </td>
                    <td>
                        <a href="detail.html?id=${i}" class="action-btn">🔍 OTEVŘÍT</a>
                        <span class="delete-btn" onclick="deleteRec(${i})">🗑 SMAZAT</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteRec(i) {
            if(confirm('Opravdu chcete tento spis smazat?')) {
                let records = JSON.parse(localStorage.getItem(DB));
                records.splice(i, 1);
                localStorage.setItem(DB, JSON.stringify(records));
                renderTable();
            }
        }

        renderTable();
    </script>
</body>
</html>
