<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Bureau Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0e14; --sidebar-bg: #151921; --card-bg: #1c212b; --accent-blue: #4a9eff; --border: #2d333b; --gold: #d4af37; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: #9ba3af; padding: 10px; text-align: left; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 5px; }
        .nav-btn:hover { background: var(--card-bg); color: white; }
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; gap: 20px; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        h3 { font-size: 14px; margin: 0 0 15px 0; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; color: #9ba3af; border-bottom: 2px solid var(--border); font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .status-badge { padding: 4px 8px; border-radius: 3px; font-weight: bold; font-size: 10px; }
        .status-open { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .status-resolved { background: rgba(46, 160, 67, 0.1); color: var(--success); border: 1px solid var(--success); }
        .side-info { width: 300px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .log-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; display: flex; flex-direction: column; height: 100%; }
        .log-list { overflow-y: auto; font-size: 11px; color: #9ba3af; flex-grow: 1; }
        .log-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
<div class="sidebar">
    <div style="text-align: center; margin-bottom: 20px;"><i class="fa-solid fa-shield-halved" style="font-size: 24px; color: var(--gold);"></i></div>
    <button class="nav-btn" onclick="window.location.href='detail.html'"><i class="fa-solid fa-file-signature"></i> Nový záznam</button>
</div>
<div class="main">
    <div class="content-area">
        <div class="stats-grid">
            <div class="stat-card">CELKEM <span id="stat-total" class="stat-val">0</span></div>
            <div class="stat-card">OTEVŘENO <span id="stat-active" class="stat-val" style="color:var(--gold)">0</span></div>
            <div class="stat-card">VYŘEŠENO <span id="stat-done" class="stat-val" style="color:var(--success)">0</span></div>
        </div>
        <div class="card">
            <h3>Evidence vyšetřování</h3>
            <table>
                <thead><tr><th>ID</th><th>SUBJEKT</th><th>DETEKTIV</th><th>STAV</th><th>AKCE</th></tr></thead>
                <tbody id="case-table-body"></tbody>
            </table>
        </div>
    </div>
    <div class="side-info">
        <div class="log-card">
            <div style="font-size: 10px; font-weight: bold; color: var(--accent-blue); margin-bottom: 10px;">HISTORIE ÚKONŮ</div>
            <div id="log-list" class="log-list"></div>
        </div>
    </div>
</div>
<script>
    function render() {
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
        let logs = JSON.parse(localStorage.getItem('lspd_history')) || [];
        document.getElementById('case-table-body').innerHTML = cases.map((c, i) => `
            <tr>
                <td><b>${c.id}</b></td><td>${c.subject || '---'}</td><td>${c.author}</td>
                <td><span class="status-badge ${c.status === 'VYŘEŠENO' ? 'status-resolved' : 'status-open'}">${c.status}</span></td>
                <td>
                    <button style="color:var(--accent-blue); border:none; background:none; cursor:pointer;" onclick="window.location.href='detail.html?id=${i}'"><i class="fa-solid fa-eye"></i></button>
                    <button style="color:var(--danger); border:none; background:none; cursor:pointer;" onclick="deleteCase(${i})"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`).join('');
        document.getElementById('log-list').innerHTML = logs.slice(-20).reverse().map(l => `<div class="log-item">${l}</div>`).join('');
        document.getElementById('stat-total').innerText = cases.length;
        document.getElementById('stat-active').innerText = cases.filter(c => c.status !== 'VYŘEŠENO').length;
        document.getElementById('stat-done').innerText = cases.filter(c => c.status === 'VYŘEŠENO').length;
    }
    function deleteCase(i) { if(confirm("Smazat záznam?")) { 
        let cases = JSON.parse(localStorage.getItem('lspd_v15_data'));
        cases.splice(i, 1); 
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases)); 
        render(); 
    }}
    render();
</script>
</body>
</html>
