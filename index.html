<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="breadcrumb" style="color: var(--gold); font-weight: bold;">SASP COMMAND CENTER</div>
        <a href="detail.html" class="btn btn-save"><i class="fa-solid fa-plus"></i> NOVÝ ZÁZNAM</a>
    </div>

    <div class="container">
        <h1>Evidence Operativních Prostředků</h1>
        <div class="stats-container">
            <div class="stat-card"><span class="stat-label">Celkem</span><span id="stat-total" class="stat-value">0</span></div>
            <div class="stat-card"><span class="stat-label">📖 Otevřené</span><span id="stat-open" class="stat-value" style="color:var(--blue)">0</span></div>
            <div class="stat-card"><span class="stat-label">✅ Vyřešené</span><span id="stat-closed" class="stat-value" style="color:var(--success)">0</span></div>
            <div class="stat-card"><span class="stat-label">Detektivové</span><span id="stat-dets" class="stat-value">0</span></div>
        </div>

        <table>
            <thead><tr><th>Case ID</th><th>Subjekt</th><th>Detektiv</th><th>Stav</th><th>Akce</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        function renderTable() {
            const records = JSON.parse(localStorage.getItem(DB)) || [];
            const tbody = document.getElementById('table-body');
            let open = 0, closed = 0, dets = new Set();
            tbody.innerHTML = '';

            records.forEach((r, i) => {
                if(r.status === 'VYŘEŠENO') closed++; else open++;
                if(r.author) dets.add(r.author);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--gold); font-weight:bold;">${r.id}</td>
                    <td>${r.subject}</td>
                    <td>${r.author}</td>
                    <td><span class="status-tag ${r.status === 'VYŘEŠENO' ? 'status-closed' : 'status-open'}">${r.status === 'VYŘEŠENO' ? '✅ Vyřešeno' : '📖 Otevřený'}</span></td>
                    <td>
                        <a href="detail.html?id=${i}" class="action-link" style="color:var(--blue)">${r.status === 'VYŘEŠENO' ? '🔍 Zobrazit' : '✒️ Upravit'}</a>
                        <span class="action-link delete" onclick="deleteRec(${i})">🗑 Smazat</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-total').innerText = records.length;
            document.getElementById('stat-open').innerText = open;
            document.getElementById('stat-closed').innerText = closed;
            document.getElementById('stat-dets').innerText = dets.size;
        }
        function deleteRec(i) { if(confirm('Smazat?')) { let r = JSON.parse(localStorage.getItem(DB)); r.splice(i,1); localStorage.setItem(DB, JSON.stringify(r)); renderTable(); } }
        renderTable();
    </script>
</body>
</html>
