<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Operativní Terminál OPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #1b2129;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --text-white: #c9d1d9;
            --border: #30363d;
            --input-bg: #0d1117;
            --danger: #f85149;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #21262d;
            border-radius: 6px;
            border-left: 4px solid var(--accent-blue);
        }

        /* HLAVNÍ OBSAH */
        .main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .full { grid-column: span 2; }

        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; }

        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-white);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        /* TLAČÍTKA */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-blue { background: var(--accent-blue); color: #0d1117; }
        .btn-pdf { background: var(--danger); color: white; }

        /* TABULKA */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 12px; color: var(--text-gray); border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-white); font-size: 11px; }
        .btn-view { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-delete { border-color: var(--danger); color: var(--danger); }

        /* MODAL */
        #modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-body { background: var(--card-bg); width: 600px; padding: 30px; border-radius: 8px; border: 1px solid var(--accent-blue); }
        pre { background: #000; padding: 20px; color: #00ff00; font-family: monospace; white-space: pre-wrap; border-radius: 5px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item">
        <i class="fa-solid fa-file-invoice"></i>
        <span>LSPD - EVIDENCE OPP</span>
    </div>
</div>

<div class="main">
    <h2 style="margin-top:0;">Nový protokol</h2>
    
    <div class="grid">
        <div class="field">
            <label>Vyžadující příslušník</label>
            <input type="text" id="officer" placeholder="např. kpt. Jan Novák">
        </div>
        <div class="field">
            <label>Identifikace subjektu</label>
            <input type="text" id="subject" placeholder="Jméno a ID osoby">
        </div>
        <div class="field">
            <label>Klasifikace případu</label>
            <select id="crime">
                <option value="Vrazda (§ 140 TZ)">Vrazda (§ 140 TZ)</option>
                <option value="Loupez (§ 173 TZ)">Loupez (§ 173 TZ)</option>
                <option value="Drogy / OPL">Drogy / OPL</option>
                <option value="Hospodarska kriminalita">Hospodarska kriminalita</option>
            </select>
        </div>
        <div class="field">
            <label>Typ OPP</label>
            <select id="type">
                <option value="Prolomeni telefonu">Prolomeni telefonu</option>
                <option value="Vypis z telekomunikace">Vypis z telekomunikace</option>
                <option value="Proverka majetku a financi">Proverka majetku a financi</option>
            </select>
        </div>
        <div class="field full">
            <label>Odůvodnění žádosti</label>
            <textarea id="facts" rows="4"></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-blue" onclick="processAll()"><i class="fa-solid fa-check-double"></i> Uložit a Schválit</button>
        <button class="btn btn-pdf" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> Generovat PDF</button>
    </div>

    <div style="margin-top: 40px;">
        <label>Historie žádostí</label>
        <table>
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Subjekt</th>
                    <th>Příslušník</th>
                    <th>Správa</th>
                </tr>
            </thead>
            <tbody id="history-rows"></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h3>Protokol byl vytvořen a odeslán</h3>
        <pre id="modal-text"></pre>
        <button class="btn btn-blue" onclick="document.getElementById('modal').style.display='none'">Zavřít</button>
    </div>
</div>

<script>
    // --- KONFIGURACE WEBHOOKU ---
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1487754214041194596/KPNaj-qDPmVY_6yEsdKvGNri_8AbjS8JS3PBo8GvuKi2R1Qkgtx1iZjYEODUVVYI_Wux";

    let historyLog = JSON.parse(localStorage.getItem('lspd_history')) || [];
    updateTable();

    const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    async function processAll() {
        const officer = document.getElementById('officer').value;
        const subject = document.getElementById('subject').value;
        const type = document.getElementById('type').value;
        const facts = document.getElementById('facts').value;

        if(!officer || !subject) return alert("Chybí jméno příslušníka nebo subjektu!");

        // 1. Uložit do historie
        const data = {
            id: Date.now(),
            date: new Date().toLocaleString('cs-CZ'),
            officer, subject, type, facts,
            crime: document.getElementById('crime').value
        };
        historyLog.unshift(data);
        localStorage.setItem('lspd_history', JSON.stringify(historyLog));
        updateTable();

        // 2. Automaticky odeslat na Discord
        if(DISCORD_WEBHOOK_URL !== "SEM_VLOZ_TVUJ_WEBHOOK_URL") {
            const payload = {
                embeds: [{
                    title: "📁 NOVÁ ŽÁDOST O OPP",
                    color: 3447003,
                    fields: [
                        { name: "Příslušník", value: officer, inline: true },
                        { name: "Subjekt", value: subject, inline: true },
                        { name: "Typ", value: type, inline: false },
                        { name: "Odůvodnění", value: facts }
                    ],
                    timestamp: new Date()
                }]
            };
            fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        }

        // 3. Zobrazit detail
        viewDetail(data.id);
    }

    function updateTable() {
        const tbody = document.getElementById('history-rows');
        tbody.innerHTML = historyLog.map(r => `
            <tr>
                <td>${r.date}</td>
                <td>${r.subject}</td>
                <td>${r.officer}</td>
                <td class="action-btns">
                    <button class="btn-sm btn-view" onclick="viewDetail(${r.id})">Detail</button>
                    <button class="btn-sm btn-delete" onclick="deleteEntry(${r.id})"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function viewDetail(id) {
        const r = historyLog.find(x => x.id === id);
        const text = `PROTOKOL OPP\n----------\nVYSTAVIL: ${r.officer}\nSUBJEKT:  ${r.subject}\nTYP:      ${r.type}\n----------\nODŮVODNĚNÍ:\n${r.facts}`;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteEntry(id) {
        if(confirm("Opravdu smazat tento záznam z historie?")) {
            historyLog = historyLog.filter(x => x.id !== id);
            localStorage.setItem('lspd_history', JSON.stringify(historyLog));
            updateTable();
        }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const officer = removeAccents(document.getElementById('officer').value);
        const subject = removeAccents(document.getElementById('subject').value);
        const type = removeAccents(document.getElementById('type').value);
        const facts = removeAccents(document.getElementById('facts').value);
        const date = new Date().toLocaleDateString();

        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("PROTOKOL O ZADOSTI OPP", 105, 30, { align: "center" });
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Datum: ${date}`, 160, 45);

        doc.setLineWidth(0.5);
        doc.line(20, 50, 190, 50);

        doc.setFont("helvetica", "bold");
        doc.text("Zadajici prislusnik:", 20, 65);
        doc.setFont("helvetica", "normal");
        doc.text(officer, 70, 65);

        doc.setFont("helvetica", "bold");
        doc.text("Proverovany subjekt:", 20, 75);
        doc.setFont("helvetica", "normal");
        doc.text(subject, 70, 75);

        doc.setFont("helvetica", "bold");
        doc.text("Duvod zadosti:", 20, 90);
        doc.setFont("helvetica", "normal");
        const splitText = doc.splitTextToSize(facts, 160);
        doc.text(splitText, 20, 100);

        const pageHeight = doc.internal.pageSize.height;
        doc.line(130, pageHeight - 50, 190, pageHeight - 50);
        
        // --- SEKCE PODPISU ---
        // 1. "Ruční" podpis (kurzíva)
        doc.setFont("times", "italic");
        doc.setFontSize(18);
        doc.text(officer, 140, pageHeight - 55); 
        
        // 2. Klasické Jméno a Příjmení (tiskací)
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(officer, 135, pageHeight - 45);
        doc.setFontSize(8);
        doc.text("Jmeno a prijmeni / Digitalni podpis", 135, pageHeight - 40);

        doc.save(`Protokol_OPP_${subject}.pdf`);
    }
</script>

</body>
</html>
