<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence Operativních Prostředků</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --sidebar: #151921; --card: #1c212b; --blue: #4a9eff; --gold: #ffcc00; --border: #2d333b; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .sidebar-title { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        .btn-new { background: var(--gold); color: black; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-decoration: none; text-align: center; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        h1 { color: var(--gold); text-transform: uppercase; font-size: 24px; margin-bottom: 30px; }

        /* Stats Row */
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 4px; display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--blue); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; color: white; }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
        th { text-align: left; padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--blue); text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; color: #ccc; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-tag { padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .status-open { background: rgba(74, 158, 255, 0.2); color: var(--blue); }
        .status-closed { background: rgba(46, 160, 67, 0.2); color: var(--success); }

        .action-link { text-decoration: none; font-weight: bold; font-size: 12px; margin-right: 15px; display: inline-flex; align-items: center; gap: 4px; }
        .view { color: var(--blue); }
        .edit { color: var(--gold); }
        .delete { color: var(--danger); cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">SASP COMMAND</div>
        <a href="detail.html" class="btn-new"><i class="fa-solid fa-plus"></i> NOVÝ ZÁZNAM</a>
    </div>

    <div class="main-content">
        <h1>Evidence Operativních Prostředků</h1>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Celkem záznamů</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">V řešení (Otevřené)</span>
                <span class="stat-value" id="stat-open" style="color: var(--blue);">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Archivováno (Vyřešené)</span>
                <span class="stat-value" id="stat-closed" style="color: var(--success);">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Aktivní detektivové</span>
                <span class="stat-value" id="stat-dets">0</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Case ID</th>
                    <th>Subjekt</th>
                    <th>Detektiv</th>
                    <th>Stav</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        const DB = 'lspd_v15_data';
        
        function renderTable() {
            const records = JSON.parse(localStorage.getItem(DB)) || [];
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // Statistiky
            let openCount = 0;
            let closedCount = 0;
            let detectives = new Set();

            records.forEach((r, index) => {
                if(!r) return;

                // Výpočet statistik
                if(r.status === 'VYŘEŠENO') closedCount++; else openCount++;
                if(r.author) detectives.add(r.author);

                const tr = document.createElement('tr');
                
                // Formátování stavu s emoji
                const statusHtml = r.status === 'VYŘEŠENO' 
                    ? `<span class="status-tag status-closed">✅ Vyřešeno</span>`
                    : `<span class="status-tag status-open">📖 Otevřený</span>`;

                // Tlačítka s emoji
                const actionHtml = r.status === 'VYŘEŠENO'
                    ? `<a href="detail.html?id=${index}" class="action-link view">🔍 Zobrazit</a>`
                    : `<a href="detail.html?id=${index}" class="action-link edit">✒️ Upravit</a>`;

                tr.innerHTML = `
                    <td style="color: var(--gold); font-weight: bold;">${r.id || '---'}</td>
                    <td>${r.subject || '---'}</td>
                    <td>${r.author || '---'}</td>
                    <td>${statusHtml}</td>
                    <td>
                        ${actionHtml}
                        <span class="action-link delete" onclick="deleteRecord(${index})">🗑 Smazat</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Aktualizace čísel ve statistikách
            document.getElementById('stat-total').innerText = records.length;
            document.getElementById('stat-open').innerText = openCount;
            document.getElementById('stat-closed').innerText = closedCount;
            document.getElementById('stat-dets').innerText = detectives.size;
        }

        function deleteRecord(index) {
            if(confirm('Opravdu chcete tento záznam smazat?')) {
                let records = JSON.parse(localStorage.getItem(DB)) || [];
                records.splice(index, 1);
                localStorage.setItem(DB, JSON.stringify(records));
                renderTable();
            }
        }

        // Prvotní načtení
        renderTable();
    </script>
</body>
</html>
