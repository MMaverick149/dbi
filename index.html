<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD MDT - Profil Občana</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #1b2129;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --text-white: #c9d1d9;
            --border: #30363d;
            --success: #238636;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            font-size: 13px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .user-profile i { font-size: 30px; color: var(--accent-blue); }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #21262d;
            color: var(--text-white);
        }

        /* MAIN CONTENT */
        .main-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* HORNÍ KARTA PROFILU */
        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .photo-placeholder {
            width: 150px;
            height: 180px;
            background-color: #0d1117;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            flex-grow: 1;
        }

        .info-item label { color: var(--text-gray); display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; }
        .info-item input, .info-item select {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-white);
            width: 100%;
            padding: 5px 0;
            outline: none;
        }

        /* TABULKA JAKO NA OBRÁZKU */
        .records-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .records-table th {
            background-color: rgba(255,255,255,0.05);
            text-align: left;
            padding: 12px;
            color: var(--text-gray);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .records-table td {
            padding: 12px;
            border-bottom: 1px dotted var(--border);
        }

        .records-table tr:hover { background-color: rgba(255,255,255,0.02); }

        .btn-add {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* STATUS TEXTY */
        .status-ok { color: #3fb950; display: flex; align-items: center; gap: 5px; }

        /* TEXTAREA PRO DŮVOD */
        .reason-box {
            grid-column: span 2;
            background: #0d1117;
            border: 1px solid var(--border);
            color: var(--text-white);
            padding: 10px;
            border-radius: 4px;
            resize: none;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="user-profile">
        <i class="fa-solid fa-circle-user"></i>
        <div>
            <strong>Emily Carter</strong><br>
            <span style="color: var(--text-gray); font-size: 11px;">Trooper</span>
        </div>
    </div>
    
    <nav>
        <a href="#" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="#" class="menu-item active"><i class="fa-solid fa-users"></i> Registr občanů</a>
        <a href="#" class="menu-item"><i class="fa-solid fa-car"></i> Registr vozidel</a>
        <a href="#" class="menu-item"><i class="fa-solid fa-gun"></i> Registr zbraní</a>
        <a href="#" class="menu-item"><i class="fa-solid fa-file-invoice"></i> Registr faktur</a>
    </nav>
</div>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">Občan #1877</h2>
        <button class="btn-add" onclick="pridatDoSpisu()">PŘIDAT DO SPISU</button>
    </div>

    <div class="profile-card">
        <div class="photo-placeholder">
            <i class="fa-solid fa-camera fa-2x"></i>
        </div>
        <div class="info-grid">
            <div class="info-item">
                <label>Jméno a Příjmení</label>
                <input type="text" id="jmeno" value="Luis Vega">
            </div>
            <div class="info-item">
                <label>Datum Narození</label>
                <input type="text" id="narozeni" value="13.03.1993">
            </div>
            <div class="info-item">
                <label>Pohlaví</label>
                <select id="pohlavi">
                    <option>Muž</option>
                    <option>Žena</option>
                </select>
            </div>
            <div class="info-item">
                <label>Státní identifikátor</label>
                <input type="text" id="identifikator" value="#NC5422">
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <label>Zjištěné skutečnosti (Důvod žádosti o OPP)</label>
                <textarea id="skutecnosti" class="reason-box" rows="3">Násilný trestný čin na místě činu, nalezeny osoby bez známek života.</textarea>
            </div>
        </div>
    </div>

    <h3 style="color: var(--text-gray); font-size: 14px; margin-bottom: 10px;">HISTORIE ŽÁDOSTÍ A ZÁZNAMŮ</h3>
    <table class="records-table">
        <thead>
            <tr>
                <th>Paragraf / Předmět</th>
                <th>Datum uložení</th>
                <th>Vyřizuje</th>
                <th>Stav žádosti</th>
            </tr>
        </thead>
        <tbody id="vysledky">
            <tr>
                <td>§ 37 Z.Č. 006-19 (OPP - Výpis majetku)</td>
                <td>28.03.2026</td>
                <td>Emily Carter</td>
                <td><span class="status-ok"><i class="fa-solid fa-check"></i> Schváleno</span></td>
            </tr>
            </tbody>
    </table>
</div>

<script>
    function pridatDoSpisu() {
        const jmeno = document.getElementById('jmeno').value;
        const skutecnosti = document.getElementById('skutecnosti').value;
        const dnes = new Date().toLocaleDateString('cs-CZ');
        
        const tabulka = document.getElementById('vysledky');
        const novyRadek = tabulka.insertRow(0); // Přidá na začátek
        
        novyRadek.innerHTML = `
            <td>Žádost OPP: ${jmeno}</td>
            <td>${dnes}</td>
            <td>Emily Carter</td>
            <td><span style="color: #f85149;">V řešení...</span></td>
        `;

        alert("Záznam byl přidán do databáze MDT.");
    }
</script>

</body>
</html>
