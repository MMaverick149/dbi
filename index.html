<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT 2.0 - Správa OPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Definice barev podle vzoru */
        :root {
            --bg-color: #1a1b26; /* Tmavé pozadí */
            --sidebar-bg: #11121d; /* Ještě tmavší sidebar */
            --content-bg: #1f202e; /* Mírně světlejší panel */
            --card-bg: #272839; /* Barva karty/boxu */
            --text-main: #c0caf5; /* Hlavní text */
            --text-muted: #7983a5; /* Tlumený text */
            --accent: #bb9af7; /* Fialový akcent */
            --success: #9ece6a; /* Zelená barva (šipky) */
            --border-color: #2f334d; /* Barva ohraničení */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LEVÝ SIDEBAR --- */
        .sidebar {
            width: 70px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
            align-items: center;
        }

        .sidebar-top i, .sidebar-bottom i {
            font-size: 20px;
            color: var(--text-muted);
            margin-bottom: 30px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .sidebar-top i:hover, .sidebar-top i.active {
            color: var(--accent);
        }

        .sidebar-bottom i:hover {
            color: #f7768e; /* Červená pro odhlášení */
        }

        /* --- HLAVNÍ OBSAH --- */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            background-color: var(--content-bg);
            display: flex;
            flex-direction: column;
        }

        /* Hlavička jako ve vzoru */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .header-controls i {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
        }

        /* Sekce filtrů/zadávání */
        .controls-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            grid-column: span 3;
            margin-bottom: 10px;
        }

        input, select, textarea {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        textarea {
            grid-column: span 3;
            font-family: 'Courier New', monospace; /* Pro zjištěné skutečnosti */
        }

        /* --- VÝSTUPNÍ KARTA --- */
        .output-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px; /* pro scrollbar */
        }

        #spis-output {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: none;
            position: relative;
        }

        /* Zelený status box z obrázku, přizpůsobený naší zprávě */
        .output-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .status-icon {
            background-color: rgba(158, 206, 106, 0.1);
            color: var(--success);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .output-title-info {
            flex-grow: 1;
        }

        .output-title {
            font-weight: 600;
            font-size: 14px;
        }

        .output-meta {
            color: var(--text-muted);
            font-size: 12px;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background-color: var(--accent);
            color: var(--sidebar-bg);
        }

        .output-body {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Tlačítko pro generování */
        .btn-action {
            grid-column: span 3;
            background-color: var(--accent);
            color: var(--sidebar-bg);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">
            <i class="fa-solid fa-grip-vertical"></i> <i class="fa-solid fa-id-card active"></i> <i class="fa-solid fa-car"></i>
            <i class="fa-solid fa-briefcase"></i>
        </div>
        <div class="sidebar-bottom">
            <i class="fa-solid fa-sun"></i> <i class="fa-solid fa-sign-out-alt"></i> </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <div class="header-title">
                <i class="fa-solid fa-id-card" style="color: var(--accent);"></i>
                <h2>Podání Žádosti OPP</h2>
            </div>
            <div class="header-controls">
                <i class="fa-solid fa-history"></i>
            </div>
        </div>

        <div class="controls-row">
            <input type="text" id="officer" placeholder="Vyžadující příslušník (např. kpt. Jan Novák)" class="search-input">
            <input type="text" id="subject" placeholder="Podezřelá osoba (např. Luis Vega, 13.03.1993, NC5422)">
            
            <select id="crime">
                <option value="" disabled selected>Vyberte trestný čin...</option>
                <option value="Vražda (§ 140 TZ)">Vražda - § 140 TZ</option>
                <option value="Loupež (§ 173 TZ)">Loupež - § 173 TZ</option>
                <option value="Drogy (§ 283 TZ)">Drogy - § 283 TZ</option>
            </select>

            <input type="date" id="reportDate" title="Datum podání">

            <textarea id="facts" rows="4" placeholder="Zjištěné skutečnosti (Důvod žádosti)...">Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu, při kterém byly nalezeny osoby bez známek života s poranjenja odpovídajícími násilnému útoku. </textarea>
            
            <button class="btn-action" onclick="generateReport()">VYGENEROVAT SPIS</button>
        </div>

        <div class="output-container">
            <div id="spis-output">
                <div class="output-header">
                    <div class="status-icon">
                        <i class="fa-solid fa-arrow-right"></i> </div>
                    <div class="output-title-info">
                        <div class="output-title">ŽÁDOST O OPP - FORMULÁŘ GENEROVÁN</div>
                        <div class="output-meta">Systém MDT | Kancelář OPP | Vygenerováno: <span id="meta-date"></span></div>
                    </div>
                    <button class="copy-btn" onclick="copyReport()">Kopírovat</button>
                </div>
                <div class="output-body" id="output-text">
                    </div>
            </div>
        </div>
    </div>

<script>
    // Přednastavit dnešní datum
    document.getElementById('reportDate').valueAsDate = new Date();

    function generateReport() {
        const officer = document.getElementById('officer').value || "[NEUVEDENO]";
        const subject = document.getElementById('subject').value || "[NEZADÁNO]";
        const crime = document.getElementById('crime').value || "[NEVYBRÁNO]";
        const facts = document.getElementById('facts').value;
        const formDate = new Date(document.getElementById('reportDate').value).toLocaleDateString('cs-CZ');
        const now = new Date().toLocaleString('cs-CZ');

        const report = `ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19
Datum podání: ${formDate}
----------------------------------------------------------
VYŽADUJÍCÍ PŘÍSLUŠNÍK: ${officer}
PODEZŘELÁ OSOBA:     ${subject}
TRESTNÝ ČIN:         ${crime}

PROSTŘEDEK: 
• Výpis a prověrka majetku a finančních prostředků

PŘEDMĚT VYDÁNÍ:
• Informace o veškerém evidovaném majetku osoby, zejména bankovních 
  účtech, finančních prostředcích, registrovaných vozidlech, 
  nemovitostech, movitém majetku vyšší hodnoty a případných závazcích.

ZJIŠTĚNÉ SKUTEČNOSTI:
${facts}

Za účelem objasnění okolností případu je žádáno o poskytnutí informací 
o majetku. Tyto informace mohou napomoci k identifikaci možného motivu 
a zjištění vazeb na další osoby.

S pozdravem,
_________________________
Podpis příslušníka
${officer}`;

        const outputDiv = document.getElementById('spis-output');
        document.getElementById('output-text').innerText = report;
        document.getElementById('meta-date').innerText = now;
        outputDiv.style.display = 'block';
        
        // Posunout na výstup
        outputDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function copyReport() {
        const textToCopy = document.getElementById('output-text').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('Spis byl zkopírován do schránky.');
        }).catch(err => {
            console.error('Chyba při kopírování:', err);
        });
    }
</script>

</body>
</html>
