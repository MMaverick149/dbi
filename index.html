<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>MDT - Operativní Modul OPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #1b2129;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --text-white: #c9d1d9;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            font-size: 13px;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .system-title {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            text-align: center;
        }

        .system-title strong {
            color: var(--accent-blue);
            font-size: 16px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-white);
            border-radius: 6px;
            background-color: #21262d;
            border-left: 3px solid var(--accent-blue);
        }

        /* MAIN CONTENT */
        .main-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* VSTUPNÍ KARTA */
        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .info-item label { 
            color: var(--accent-blue); 
            display: block; 
            margin-bottom: 6px; 
            font-size: 11px; 
            font-weight: bold;
            text-transform: uppercase; 
        }

        input, textarea {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-white);
            padding: 10px;
            border-radius: 4px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        /* ČERNÝ TEXT PRO SELECTY */
        select {
            background: #ffffff; /* Bílé pozadí pro kontrast */
            color: #000000;    /* Černý text */
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-weight: 500;
        }

        .full-width { grid-column: span 2; }

        /* TABULKA HISTORIE */
        .table-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
        }

        .records-table th {
            background-color: rgba(255,255,255,0.03);
            text-align: left;
            padding: 12px;
            color: var(--text-gray);
            font-size: 11px;
            border-bottom: 1px solid var(--border);
        }

        .records-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-white);
        }

        /* MODAL */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            width: 650px;
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            padding: 20px;
        }

        #report-text {
            background: #0d1117;
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            border-radius: 4px;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: #0d1117;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-close {
            background: #f85149;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="system-title">
        <strong>LSPD TERMINÁL</strong><br>
        <span style="color: var(--text-gray); font-size: 10px;">OPERATIVNÍ MODUL OPP</span>
    </div>
    <nav>
        <div class="menu-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Evidence žádostí</span>
        </div>
    </nav>
</div>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin:0; font-size: 18px;">Vytvořit nový záznam OPP</h1>
        <button class="btn-primary" onclick="schvalitZpravu()">Schválit a odeslat</button>
    </div>

    <div class="profile-card">
        <div class="info-grid">
            <div class="info-item">
                <label>Vyžadující příslušník</label>
                <input type="text" id="officer" placeholder="Zadejte jméno...">
            </div>
            <div class="info-item">
                <label>Identifikace subjektu</label>
                <input type="text" id="subject" placeholder="Jméno a ID osoby...">
            </div>
            <div class="info-item">
                <label>Klasifikace případu</label>
                <select id="crime">
                    <option value="Vražda (§ 140 TZ)">Vražda (§ 140 TZ)</option>
                    <option value="Loupež (§ 173 TZ)">Loupež (§ 173 TZ)</option>
                    <option value="Drogová kriminalita">Drogová kriminalita</option>
                    <option value="Únos / Omezení svobody">Únos / Omezení svobody</option>
                </select>
            </div>
            <div class="info-item">
                <label>Typ OPP</label>
                <select id="type">
                    <option value="Prolomení telefonu">Prolomení telefonu</option>
                    <option value="Výpis z telekomunikace">Výpis z telekomunikace</option>
                    <option value="Prověrka majetku a financí">Prověrka majetku a financí</option>
                </select>
            </div>
            <div class="info-item full-width">
                <label>Odůvodnění žádosti (Zjištěné skutečnosti)</label>
                <textarea id="facts" rows="4">Na základě vyšetřování...</textarea>
            </div>
        </div>
    </div>

    <h3 style="margin: 10px 0 5px 0; color: var(--text-gray); font-size: 12px;">HISTORIE POSLEDNÍCH ŽÁDOSTÍ</h3>
    <div class="table-section">
        <table class="records-table">
            <thead>
                <tr>
                    <th>Typ</th>
                    <th>Subjekt</th>
                    <th>Příslušník</th>
                    <th>Datum podání</th>
                </tr>
            </thead>
            <tbody id="history-log">
                </tbody>
        </table>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong style="color: var(--accent-blue);">AUTORIZOVANÝ PROTOKOL</strong>
            <button class="btn-close" onclick="zavritModal()">X</button>
        </div>
        <div id="report-text"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-primary" onclick="copyText()">Kopírovat do schránky</button>
            <button class="btn-close" style="background: #30363d;" onclick="zavritModal()">Zavřít</button>
        </div>
    </div>
</div>

<script>
    function schvalitZpravu() {
        const officer = document.getElementById('officer').value || "NEUVEDENO";
        const subject = document.getElementById('subject').value || "NEZNÁMÝ";
        const crime = document.getElementById('crime').value;
        const type = document.getElementById('type').value;
        const facts = document.getElementById('facts').value;
        const datum = new Date().toLocaleDateString('cs-CZ');

        const zprava = `ŽÁDOST O UŽITÍ OPP DLE § 37 Z.Č. 006-19
==================================================
VYSTAVIL:     ${officer}
TYP ŽÁDOSTI:  ${type}
SUBJEKT:      ${subject}
PŘÍPAD:       ${crime}
DATUM:        ${datum}
==================================================

ZJIŠTĚNÉ SKUTEČNOSTI:
${facts}

Tato žádost byla schválena v systému MDT a je 
považována za oficiální dokumentaci vyšetřování.`;

        // Zobrazení výsledku
        document.getElementById('report-text').innerText = zprava;
        document.getElementById('modal-overlay').style.display = 'flex';

        // Přidání do historie (tabulky)
        const log = document.getElementById('history-log');
        const radek = log.insertRow(0);
        radek.innerHTML = `
            <td>${type}</td>
            <td>${subject}</td>
            <td>${officer}</td>
            <td>${datum}</td>
        `;
    }

    function zavritModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function copyText() {
        const text = document.getElementById('report-text').innerText;
        navigator.clipboard.writeText(text);
        alert("Protokol byl zkopírován!");
    }
</script>

</body>
</html>
