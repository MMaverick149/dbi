<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Operativní Terminál</title>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-side: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --yellow: #d29922;
            --text: #c9d1d9;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEVÝ PANEL - NAVIGACE */
        .sidebar {
            width: 240px;
            background-color: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 0.9em;
            color: var(--yellow);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-group {
            padding: 20px 10px;
            flex-grow: 1;
        }

        .nav-item {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 5px;
            background: transparent;
            border: 1px solid transparent;
            color: #8b949e;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            background: #21262d;
            color: #fff;
        }

        .nav-item.active {
            background: #1f6feb;
            color: #fff;
            border-color: var(--accent);
        }

        /* HLAVNÍ OBSAHOVÁ PLOCHA */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 50px;
            background: var(--bg-side);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            font-size: 0.8em;
            color: #8b949e;
        }

        .content-frame-container {
            flex-grow: 1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-deep);
        }

        /* PRAVÝ PANEL - GENERÁTOR / POZNÁMKY */
        .right-panel {
            width: 320px;
            background: var(--bg-side);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .right-panel h3 {
            font-size: 0.8em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        #report-text-area {
            flex-grow: 1;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            resize: none;
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .btn-action {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .btn-copy { background: var(--green); color: white; }
        .btn-clear { background: #f85149; color: white; margin-left: 5px; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>SASP Command</h2>
        </div>
        <div class="nav-group">
            <button class="nav-item active" onclick="changeTab(this, 'dashboard.html')">🏠 Přehled systému</button>
            <button class="nav-item" onclick="changeTab(this, 'evidence.html')">📁 Operativní prostředky</button>
            <button class="nav-item" onclick="changeTab(this, 'tresty.html')">⚖️ Trestní zákoník</button>
            <button class="nav-item" onclick="alert('Databáze v údržbě')">👤 Evidence osob</button>
            <button class="nav-item" onclick="alert('Databáze v údržbě')">🚘 Registr vozidel</button>
        </div>
        <div style="padding: 20px; font-size: 0.7em; color: #484f58; text-align: center;">
            v2.4.0-STABLE <br> San Andreas State Police
        </div>
    </div>

    <div class="main-wrapper">
        <div class="top-bar">
            <div>SASP / TERMINÁL / <span id="current-section">PŘEHLED</span></div>
            <div id="clock">00:00:00</div>
        </div>
        <div class="content-frame-container">
            <iframe id="main-frame" src="dashboard.html"></iframe>
        </div>
    </div>

    <div class="right-panel">
        <h3>
            Generátor Spisu
            <span style="color: #484f58; font-size: 0.8em;">ID: #AUTO</span>
        </h3>
        <textarea id="report-text-area" placeholder="Zde se budou skládat paragrafy a poznámky..."></textarea>
        <div style="display: flex;">
            <button class="btn-action btn-copy" style="flex: 2;" onclick="copyReport()">Kopírovat spis</button>
            <button class="btn-action btn-clear" style="flex: 1;" onclick="document.getElementById('report-text-area').value=''">Smazat</button>
        </div>
    </div>

    <script>
        // Funkce pro přepínání oken
        function changeTab(element, url) {
            // Změna barvy tlačítka
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // Změna nadpisu v top-baru
            document.getElementById('current-section').innerText = element.innerText.split(' ').slice(1).join(' ').toUpperCase();
            
            // Načtení stránky do iframe
            document.getElementById('main-frame').src = url;
        }

        // Přijímání zpráv z iframe (např. z tresty.html)
        window.addEventListener('message', function(event) {
            if (typeof event.data === 'string') {
                const area = document.getElementById('report-text-area');
                area.value += (area.value ? '\n' : '') + event.data;
                area.scrollTop = area.scrollHeight;
            }
        });

        // Hodiny v top-baru
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function copyReport() {
            const area = document.getElementById('report-text-area');
            area.select();
            document.execCommand('copy');
            alert('Spis byl zkopírován do schránky.');
        }
    </script>
</body>
</html>
