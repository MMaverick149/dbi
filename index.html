<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Policejní Systém - San Andreas</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 200px; height: 100vh; background-color: #161b22; padding: 20px; border-right: 1px solid #30363d; }
        .sidebar h2 { color: #58a6ff; font-size: 1.1em; margin-bottom: 20px; }
        .sidebar button { 
            width: 100%; padding: 10px; margin-bottom: 10px; background: #21262d; border: 1px solid #30363d;
            color: #8b949e; text-align: left; border-radius: 4px; cursor: pointer;
        }
        .sidebar button:hover { background: #30363d; color: #fff; }

        /* Hlavní plocha s iframe */
        .content-area { flex-grow: 1; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Pravý panel se spisem */
        .report-panel { width: 350px; height: 100vh; background-color: #161b22; border-left: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; }
        .report-panel h3 { color: #58a6ff; margin-top: 0; font-size: 1.1em; }
        #report-text-area { flex-grow: 1; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 15px; resize: none; font-family: monospace; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Menu</h2>
    <button onclick="document.getElementById('content-frame').src='tresty.html'">Trestní zákoník</button>
    <button>Evidence vozidel</button>
    <button>Databáze osob</button>
</div>

<div class="content-area">
    <iframe id="content-frame" src="tresty.html"></iframe>
</div>

<div class="report-panel">
    <h3>Generátor spisu</h3>
    <textarea id="report-text-area" placeholder="Zde se objeví vybrané paragrafy..."></textarea>
</div>

<script>
    // OPRAVA [object Object]: Přijímáme pouze textovou zprávu
    window.addEventListener('message', function(event) {
        if (typeof event.data === 'string') {
            const textArea = document.getElementById('report-text-area');
            textArea.value += (textArea.value ? '\n' : '') + event.data;
            textArea.scrollTop = textArea.scrollHeight;
        }
    });
</script>

</body>
</html>
