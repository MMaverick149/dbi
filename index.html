<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Evidence</title>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .sidebar-header { color: #ffa657; font-size: 14px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { width: 100%; padding: 12px; margin-bottom: 8px; background: #21262d; border: 1px solid var(--border); color: #8b949e; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.2s; }
        .nav-item:hover { background: #30363d; color: #fff; border-color: var(--accent); }
        .nav-item.active { background: #1f6feb; color: #fff; border-color: var(--accent); }
        .main { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .right-panel { width: 350px; background: var(--side); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; }
        .right-panel h3 { color: var(--accent); font-size: 13px; margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        textarea { flex-grow: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; resize: none; font-family: monospace; font-size: 11px; border-radius: 4px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-copy { background: #238636; color: white; }
        .btn-clear { background: #f85149; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">SASP COMMAND</div>
    <button class="nav-item active" onclick="loadPage(this, 'dashboard.html')">🏠 Přehled systému</button>
    <button class="nav-item" onclick="loadPage(this, 'evidence.html')">📋 Nový Spis</button>
    <button class="nav-item" style="color: #58a6ff; border-color: #58a6ff;" onclick="loadPage(this, 'evidence.html?new=true')">➕ Nový spis</button>
<button class="nav-item" style="color: #58a6ff; border-color: #58a6ff;" onclick="window.open('https://genk.cz/hry/gta5/zakony-fivem/the-penal-code-of-the-state-of-san-andreas-002-19-r17/', '_blank')">📑 Zákoník</button></div>

<div class="main">
    <iframe id="content-frame" src="dashboard.html"></iframe>
</div>

<script>
    function loadPage(btn, url) {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('content-frame').src = url;
    }

    window.addEventListener('message', function(e) {
        if (e.data.action === 'open_case') {
            loadPage(null, 'evidence.html?id=' + e.data.caseId);
        } else if (typeof e.data === 'string') {
            document.getElementById('report-area').value = e.data;
        }
    });

    function copyText() {
        const area = document.getElementById('report-area');
        area.select();
        document.execCommand('copy');
        alert("Zkopírováno do schránky!");
    }
</script>
</body>
</html>
