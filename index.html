<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Policejní Systém - Index</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar pro navigaci */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #161b22;
            padding: 20px;
            border-right: 1px solid #30363d;
            position: fixed;
        }

        .sidebar h2 { color: #58a6ff; font-size: 1.1em; }
        .sidebar a {
            display: block;
            color: #8b949e;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            background: #21262d;
        }
        .sidebar a:hover { background: #30363d; color: #fff; }

        /* Hlavní plocha pro iframe */
        .content-area {
            margin-left: 260px;
            width: calc(100% - 600px);
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pravý panel se spisem */
        .report-panel {
            width: 320px;
            height: 100vh;
            background-color: #161b22;
            border-left: 1px solid #30363d;
            padding: 20px;
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
        }

        #report-text-area {
            flex-grow: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px;
            resize: none;
            font-family: monospace;
            border-radius: 4px;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }
        .btn-clear { background: #f85149; color: white; }
        .btn-copy { background: #238636; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Menu</h2>
    <a href="tresty.html" target="law-frame">Trestní zákoník</a>
    <a href="#" onclick="alert('Zde budou další moduly...')">Evidence vozidel</a>
    <a href="#" onclick="alert('Zde bude databáze osob...')">Databáze osob</a>
</div>

<div class="content-area">
    <iframe name="law-frame" src="tresty.html"></iframe>
</div>

<div class="report-panel">
    <h3 style="color: #58a6ff; margin-top: 0;">Generátor spisu</h3>
    <textarea id="report-text-area" placeholder="Kliknutím v zákoníku přidáte paragrafy..."></textarea>
    
    <div class="controls">
        <button class="btn btn-clear" onclick="clearReport()">Vymazat</button>
        <button class="btn btn-copy" onclick="copyReport()">Kopírovat</button>
    </div>
</div>

<script>
    // Tato funkce přijímá data z iframe (tresty.html)
    window.addEventListener('message', function(event) {
        const textArea = document.getElementById('report-text-area');
        textArea.value += (textArea.value ? '\n' : '') + event.data;
        textArea.scrollTop = textArea.scrollHeight;
    });

    function clearReport() {
        document.getElementById('report-text-area').value = '';
    }

    function copyReport() {
        const textArea = document.getElementById('report-text-area');
        textArea.select();
        document.execCommand('copy');
        alert('Zkopírováno do schránky!');
    }
</script>

</body>
</html>
