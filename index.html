<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSPD - Case Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #1c212b;
            --accent-blue: #4a9eff;
            --text-gray: #9ba3af;
            --border: #2d333b;
            --gold: #d4af37;
            --danger: #f85149;
            --success: #2ea043;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #e1e4e8; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .user-card { background: #0b0e14; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--border); }
        .role-badge { font-size: 10px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-top: 5px; display: inline-block; text-transform: uppercase; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--text-gray); padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 13px; text-decoration: none; width: 100%; transition: 0.2s; }
        .nav-btn:hover { background: #1c212b; color: white; }
        .nav-btn.active { background: var(--accent-blue); color: #0b0e14; font-weight: bold; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border: 1px solid var(--border); margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .status-pill { background: #333; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .login-box { background: var(--sidebar-bg); padding: 30px; border: 1px solid var(--border); border-radius: 8px; width: 350px; text-align: center; }
        select { background: #0b0e14; border: 1px solid var(--border); color: white; padding: 10px; width: 100%; margin-top: 10px; border-radius: 4px; outline: none; }
        .btn-blue { background: var(--accent-blue); color: black; border: none; padding: 12px; border-radius: 4px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--gold); margin-bottom: 5px;">LSPD TERMINAL</h2>
        <select id="login-select"></select>
        <button class="btn-blue" onclick="confirmLogin()">PŘIHLÁSIT SE</button>
    </div>
</div>

<div class="sidebar">
    <div class="user-card">
        <div id="u-name" style="font-weight: bold;">--</div>
        <div id="u-call" style="color: var(--gold); font-size: 11px;">--</div>
        <div id="u-role" class="role-badge">--</div>
    </div>
    
    <button class="nav-btn active"><i class="fa-solid fa-folder"></i> Evidence Spisů</button>
    <button class="nav-btn" onclick="createNewCase()"><i class="fa-solid fa-plus-circle"></i> Nový Spis</button>
    
    <div id="admin-link-wrapper" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); display: none;">
        <a href="admin.html" class="nav-btn" style="color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3);">
            <i class="fa-solid fa-user-shield"></i> ADMINISTRACE
        </a>
    </div>
    <button class="nav-btn" onclick="logout()" style="color: var(--danger); margin-top: 10px;"><i class="fa-solid fa-power-off"></i> Odhlásit</button>
</div>

<div class="main">
    <h2 style="font-weight: 300;">Centrální Databáze Spisů</h2>
    <table>
        <thead>
            <tr><th>STATUS</th><th>ID</th><th>NÁZEV</th><th>AUTOR</th><th>STAV</th></tr>
        </thead>
        <tbody id="case-table-body"></tbody>
    </table>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];
    let members = JSON.parse(localStorage.getItem('lspd_members')) || [];
    let loggedUser = JSON.parse(localStorage.getItem('lspd_logged_session')) || null;

    function init() {
        if (!loggedUser) {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('login-select').innerHTML = members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        } else {
            // Kontrola role
            const dbUser = members.find(m => m.name === loggedUser.name);
            if (dbUser) { 
                loggedUser = dbUser; 
                localStorage.setItem('lspd_logged_session', JSON.stringify(dbUser));
            }

            document.getElementById('u-name').innerText = loggedUser.name;
            document.getElementById('u-call').innerText = loggedUser.callsign || "Bez volačky";
            document.getElementById('u-role').innerText = loggedUser.rank;

            if (loggedUser.rank === "COMMAND") {
                document.getElementById('admin-link-wrapper').style.display = 'block';
            }
            renderCases();
        }
    }

    function createNewCase() {
        const id = prompt("Zadejte Číslo Spisu (např. #2026-001):");
        if (!id) return;
        const title = prompt("Zadejte Název Případu:");
        if (!title) return;

        const newCase = {
            id: id,
            title: title,
            author: loggedUser.name,
            status: "OTEVŘENÝ",
            desc: "",
            date: new Date().toLocaleString('cs-CZ')
        };

        cases.unshift(newCase);
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        renderCases();
    }

    function renderCases() {
        const tbody = document.getElementById('case-table-body');
        if (cases.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:gray;">Žádné spisy k zobrazení</td></tr>';
            return;
        }
        tbody.innerHTML = cases.map(c => `
            <tr>
                <td><i class="fa-solid fa-folder-open" style="color:var(--accent-blue)"></i></td>
                <td><b>${c.id}</b></td>
                <td>${c.title}</td>
                <td>${c.author}</td>
                <td><span class="status-pill" style="color:${c.status === 'UZAVŘENÝ' ? 'var(--success)' : 'var(--gold)'}">${c.status}</span></td>
            </tr>
        `).join('');
    }

    function confirmLogin() {
        const name = document.getElementById('login-select').value;
        const user = members.find(m => m.name === name);
        localStorage.setItem('lspd_logged_session', JSON.stringify(user));
        location.reload();
    }

    function logout() { localStorage.removeItem('lspd_logged_session'); location.reload(); }

    init();
</script>
</body>
</html>
